<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Futebol">
<meta name="description" content="Campeonatos de Futebol - Jogos, Times e Resultados">
<title>⚽ Futebol Live</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   RESET & DESIGN TOKENS
══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

:root {
  /* Paleta principal — dark sport */
  --bg0:      #060b18;
  --bg1:      #0a1020;
  --bg2:      #101828;
  --bg3:      #1a2540;
  --bg4:      #1f2d4a;

  --accent:   #00e5a0;
  --accent2:  #00c4ff;
  --accent3:  #ff4d6d;
  --gold:     #ffcc00;

  --txt0:     #f0f4ff;
  --txt1:     #a8b8d8;
  --txt2:     #5a6e90;
  --border:   rgba(255,255,255,.08);
  --border2:  rgba(255,255,255,.14);

  --radius-s: 8px;
  --radius-m: 14px;
  --radius-l: 20px;
  --radius-xl:28px;

  --font-display: 'Bebas Neue', sans-serif;
  --font-body:    'Outfit', sans-serif;

  --glow-green: 0 0 20px rgba(0,229,160,.25);
  --glow-blue:  0 0 20px rgba(0,196,255,.2);
}

html { height: 100%; scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg0);
  color: var(--txt0);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: env(safe-area-inset-bottom, 80px);
}

/* ══════════════════════════════════════════
   FUNDO ANIMADO
══════════════════════════════════════════ */
.bg-orbs {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.orb {
  position: absolute; border-radius: 50%; filter: blur(80px); opacity: .12;
  animation: orbFloat 12s ease-in-out infinite;
}
.orb1 { width: 500px; height: 500px; background: var(--accent); top: -150px; right: -100px; animation-delay: 0s; }
.orb2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; left: -80px; animation-delay: -4s; }
.orb3 { width: 300px; height: 300px; background: var(--accent3); top: 40%; left: 40%; animation-delay: -8s; }
@keyframes orbFloat {
  0%,100% { transform: translate(0,0) scale(1); }
  33%      { transform: translate(30px,-40px) scale(1.08); }
  66%      { transform: translate(-20px,30px) scale(.94); }
}

/* ══════════════════════════════════════════
   HEADER
══════════════════════════════════════════ */
header {
  position: sticky; top: 0; z-index: 900;
  background: rgba(6,11,24,.85);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 62px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.header-logo {
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.logo-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
  box-shadow: var(--glow-green);
}
.logo-text {
  font-family: var(--font-display);
  font-size: 1.5em; letter-spacing: 1px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header-actions { display: flex; align-items: center; gap: 8px; }

/* Botão header */
.hbtn {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: var(--radius-xl);
  border: 1px solid var(--border2); background: var(--bg3);
  color: var(--txt0); font: 600 .82em var(--font-body);
  cursor: pointer; transition: all .2s; white-space: nowrap;
}
.hbtn:hover { background: var(--bg4); border-color: var(--accent); color: var(--accent); }
.hbtn.active { background: var(--accent); border-color: var(--accent); color: var(--bg0); }
.hbtn svg { width: 15px; height: 15px; flex-shrink: 0; }

/* ══════════════════════════════════════════
   FAIXA "JOGOS HOJE"
══════════════════════════════════════════ */
@keyframes blink { 0%,100%{opacity:.4} 50%{opacity:1} }
/* ══════════════════════════════════════════
   MAIN LAYOUT
══════════════════════════════════════════ */
main {
  position: relative; z-index: 1;
  max-width: 1400px; margin: 0 auto;
  padding: 0 16px;
}

/* ══════════════════════════════════════════
   TELA DE BUSCA DE JOGOS
══════════════════════════════════════════ */
@keyframes fadeUp { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:translateY(0) } }

/* Search box */
.btn-search svg { width: 16px; height: 16px; fill: var(--bg0); }

/* Seções abaixo do search */
/* Tags genéricas */
.tags-row { display: flex; flex-wrap: wrap; gap: 7px; }
.tag {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius-xl); padding: 5px 14px;
  font: 500 .8em var(--font-body); color: var(--txt1);
  cursor: pointer; transition: all .2s;
  display: flex; align-items: center; gap: 5px;
}
.tag:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,.08); }
.tag.fav { border-color: var(--gold); color: var(--gold); background: rgba(255,204,0,.07); }
.tag.fav:hover { background: rgba(255,204,0,.14); }
.tag .tag-icon { font-size: .85em; }
.tag .tag-remove {
  margin-left: 2px; width: 14px; height: 14px; border-radius: 50%;
  background: rgba(255,255,255,.12); border: none; color: var(--txt1);
  font-size: .7em; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.tag .tag-remove:hover { background: var(--accent3); color: #fff; }

/* ══════════════════════════════════════════
   RESULTADO DE JOGOS
══════════════════════════════════════════ */
/* Estado vazio / loading */


.estado-txt strong { color: var(--txt1); }

/* Loader */


 40%{transform:scale(1);opacity:1} }

/* Info do time */


/* Seção de jogos */


/* Card de jogo */


 50%{opacity:.4} }


/* Badge */
.badge {
  padding: 2px 9px; border-radius: 20px;
  font: 700 .66em var(--font-body); letter-spacing: .3px;
}
.badge-live { background: rgba(255,77,109,.2); color: var(--accent3); border: 1px solid rgba(255,77,109,.3); animation: blink 1.2s infinite; }
.badge-prox { background: rgba(0,196,255,.1); color: var(--accent2); border: 1px solid rgba(0,196,255,.2); }
.badge-past { background: rgba(0,229,160,.08); color: var(--accent); border: 1px solid rgba(0,229,160,.15); }

/* Placar */


/* Botão WhatsApp */


/* Cache aviso */


/* Aviso IA */


/* Offline aviso */


/* ══════════════════════════════════════════
   GRADE DE CAMPEONATOS
══════════════════════════════════════════ */
#telaGrade { padding: 24px 0; }

#colsWrap {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 18px; align-items: start;
}

/* Coluna */
.column {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-l); padding: 18px;
  position: relative; transition: border-color .2s;
}
.column.card-drag-over {
  border: 2px dashed var(--accent); background: rgba(0,229,160,.04);
}

.col-badge {
  display: none; position: absolute; top: 10px; left: 10px;
  background: var(--accent); color: var(--bg0); border-radius: 50%;
  width: 20px; height: 20px; font: 700 .68em var(--font-body);
  align-items: center; justify-content: center;
}
body.admin-mode .col-badge { display: flex; }

.col-head { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 14px; position: relative; }
.col-title {
  font-family: var(--font-display); font-size: 1.15em; letter-spacing: .5px;
  color: var(--txt0); flex: 1; text-align: center; padding: 0 28px;
  cursor: default; transition: color .2s;
}
body.admin-mode .col-title { cursor: pointer; }
body.admin-mode .col-title:hover { color: var(--accent); }

.col-rename-input {
  flex: 1; font-family: var(--font-display); font-size: 1.1em;
  color: var(--txt0); background: var(--bg3);
  border: 2px solid var(--accent); border-radius: var(--radius-s);
  padding: 4px 8px; text-align: center; outline: none; display: none; width: 100%;
}
.col-rename-input.show { display: block; }

.col-acts { display: none; position: absolute; right: 0; top: 0; flex-direction: column; gap: 3px; }
body.admin-mode .col-acts { display: flex; }
.ca {
  border: none; border-radius: 6px; width: 24px; height: 24px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: .72em; transition: transform .12s, filter .12s;
}
.ca:hover { transform: scale(1.2); }
.ca-ren { background: rgba(0,196,255,.2); color: var(--accent2); }
.ca-del { background: rgba(255,77,109,.2); color: var(--accent3); }

.col-hint { display: none; text-align: center; font-size: .65em; color: var(--accent); opacity: .6; margin-bottom: 8px; }
body.admin-mode .col-hint { display: block; }

/* Cards de campeonato */
.champs-list {
  display: flex; flex-wrap: wrap; gap: 10px;
  justify-content: flex-start; align-items: flex-start;
}
.champs-list.empty-list { justify-content: center; align-items: center; min-height: 80px; }

.champ-card {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-m); padding: 12px 10px 10px;
  flex: 1 1 100px; max-width: 150px; min-width: 90px;
  text-decoration: none; color: inherit;
  display: flex; flex-direction: column; align-items: center;
  position: relative; cursor: pointer;
  transition: all .22s;
}
body.admin-mode .champ-card { cursor: grab; }
body.admin-mode .champ-card:active { cursor: grabbing; }
.champ-card:hover {
  transform: translateY(-5px);
  border-color: var(--accent);
  box-shadow: 0 8px 24px rgba(0,229,160,.15);
}
.champ-card.dragging { opacity: .4; border: 2px dashed var(--accent); transform: scale(.95); }

.champ-card img {
  width: 100%; height: 72px; object-fit: contain;
  border-radius: var(--radius-s); background: var(--bg4);
  padding: 4px; margin-bottom: 8px;
  border: 1px solid var(--border);
}
.champ-card h3 {
  font-size: .76em; font-weight: 500; text-align: center;
  color: var(--txt1); line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; min-height: 2.1em; width: 100%;
}
.champ-card:hover h3 { color: var(--txt0); }

.card-order-num {
  display: none; position: absolute; top: 5px; left: 5px;
  background: rgba(0,229,160,.85); color: var(--bg0); border-radius: 50%;
  width: 18px; height: 18px; font: 700 .6em var(--font-body);
  align-items: center; justify-content: center;
}
body.admin-mode .card-order-num { display: flex; }

.del-card {
  display: none; position: absolute; top: 5px; right: 5px;
  background: rgba(255,77,109,.85); color: #fff;
  border: none; border-radius: 50%; width: 20px; height: 20px;
  font-size: .85em; cursor: pointer; align-items: center; justify-content: center;
  transition: all .15s;
}
.del-card:hover { background: var(--accent3); transform: scale(1.2); }
body.admin-mode .del-card { display: flex; }

.card-move-btns {
  display: none; flex-direction: row; gap: 3px; margin-top: 6px; width: 100%; justify-content: center;
}
body.admin-mode .card-move-btns { display: flex; }
.cmv {
  border: none; border-radius: 5px; padding: 3px 6px;
  font: 700 .65em var(--font-body); cursor: pointer; transition: all .12s;
}
.cmv:hover:not(:disabled) { transform: scale(1.1); }
.cmv:disabled { opacity: .2; cursor: default; }
.cmv-l { background: rgba(0,196,255,.2); color: var(--accent2); }
.cmv-r { background: rgba(255,255,255,.08); color: var(--txt1); }

.empty-msg { width: 100%; text-align: center; font-size: .82em; color: var(--txt2); padding: 14px 0; }

/* ══════════════════════════════════════════
   PAINÉIS ADMIN
══════════════════════════════════════════ */
#adminPanels { padding: 16px 0 0; }

.acard {
  display: none; background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius-l); padding: 24px 26px; margin-bottom: 14px;
  opacity: 0; transform: translateY(12px);
  transition: opacity .3s, transform .3s;
}
.acard.active { display: block; opacity: 1; transform: translateY(0); }
.acard h2 {
  font-family: var(--font-display); font-size: 1.3em; letter-spacing: .5px;
  color: var(--accent); margin-bottom: 14px;
  padding-bottom: 10px; border-bottom: 1px solid var(--border);
}
.acard p { font-size: .86em; color: var(--txt2); margin-bottom: 14px; line-height: 1.6; }

.form-label { display: block; margin-bottom: 5px; font-size: .82em; font-weight: 600; color: var(--txt1); }
.form-input, .form-select {
  width: 100%; padding: 10px 13px; margin-bottom: 12px;
  background: var(--bg3); border: 1.5px solid var(--border2);
  border-radius: var(--radius-s); color: var(--txt0);
  font: .92em var(--font-body); outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.form-input:focus, .form-select:focus {
  border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,160,.1);
}
.form-select option { background: var(--bg2); }

.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 10px 20px; border: none; border-radius: var(--radius-xl);
  font: 700 .87em var(--font-body); cursor: pointer;
  transition: all .2s; margin-right: 6px;
}
.btn:hover { transform: translateY(-2px); }
.btn-accent { background: linear-gradient(135deg,var(--accent),var(--accent2)); color: var(--bg0); }
.btn-green  { background: rgba(0,229,160,.15); color: var(--accent); border: 1px solid rgba(0,229,160,.3); }
.btn-green:hover { background: rgba(0,229,160,.25); }
.btn-orange { background: rgba(255,204,0,.15); color: var(--gold); border: 1px solid rgba(255,204,0,.3); }
.btn-orange:hover { background: rgba(255,204,0,.25); }

.msg { display: none; margin-top: 10px; padding: 8px 12px; border-radius: var(--radius-s); font-size: .82em; font-weight: 600; }
.msg.ok  { display: block; background: rgba(0,229,160,.1); color: var(--accent); border: 1px solid rgba(0,229,160,.25); }
.msg.err { display: block; background: rgba(255,77,109,.1); color: var(--accent3); border: 1px solid rgba(255,77,109,.25); }

/* Order list */
#orderList { list-style: none; margin: 0 0 14px; }
.oitem {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-m); padding: 10px 14px; margin-bottom: 7px;
}
.onum { background: var(--accent); color: var(--bg0); border-radius: 50%; width: 22px; height: 22px; min-width: 22px; display: flex; align-items: center; justify-content: center; font: 700 .7em var(--font-body); }
.oname { flex: 1; font-weight: 600; font-size: .9em; color: var(--txt0); }
.ocount { font-size: .74em; color: var(--txt2); white-space: nowrap; }
.obtn-wrap { display: flex; gap: 3px; }
.obtn { border: none; border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: .85em; font-weight: 700; display: flex; align-items: center; justify-content: center; transition: all .12s; }
.obtn:hover:not(:disabled) { transform: scale(1.15); }
.obtn:disabled { opacity: .2; cursor: default; }
.obtn-up { background: rgba(0,196,255,.2); color: var(--accent2); }
.obtn-down { background: rgba(255,255,255,.08); color: var(--txt1); }

/* ══════════════════════════════════════════
   ADMIN TRIGGER / EXIT
══════════════════════════════════════════ */
#adminTrigger {
  position: fixed; bottom: 16px; right: 16px; width: 18px; height: 18px;
  border-radius: 50%; background: transparent; border: none;
  cursor: default; z-index: 9999; opacity: 0; transition: opacity .5s;
}
#adminTrigger:hover { opacity: .2; background: #999; cursor: pointer; }
#adminDot {
  position: fixed; bottom: 20px; right: 19px; width: 8px; height: 8px;
  border-radius: 50%; background: var(--accent3); display: none;
  pointer-events: none; z-index: 9997; animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{transform:scale(1);opacity:.6} 50%{transform:scale(1.6);opacity:1} }
body.admin-mode #adminDot { display: block; }

#exitBtn {
  display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--accent3); color: #fff; border: none; border-radius: var(--radius-xl);
  padding: 12px 28px; font: 700 .92em var(--font-body);
  cursor: pointer; z-index: 9998; white-space: nowrap;
  box-shadow: 0 4px 18px rgba(255,77,109,.4);
  transition: all .2s; align-items: center; gap: 8px;
}
#exitBtn:hover { transform: translateX(-50%) translateY(-2px); }
body.admin-mode #exitBtn { display: flex; }

/* ══════════════════════════════════════════
   RESPONSIVO
══════════════════════════════════════════ */
@media (max-width: 640px) {
  header { padding: 0 12px; }
  .logo-text { font-size: 1.2em; }
  .hbtn span { display: none; }
  .hbtn { padding: 8px 10px; }
  main { padding: 0 10px; }
  #colsWrap { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  
  
  
  
}
@media (max-width: 380px) {
  #colsWrap { grid-template-columns: 1fr; }
}

/* ══════════════════════════════════════════
   SCROLLBAR CUSTOM
══════════════════════════════════════════ */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg1); }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--txt2); }

/* ══ ALERTAS ══ */
.alerta-tab {
  padding: 8px 18px; border-radius: var(--radius-xl);
  border: 1px solid var(--border2); background: var(--bg3);
  color: var(--txt1); font: 600 .82em var(--font-body);
  cursor: pointer; transition: all .2s;
}
.alerta-tab.ativo { background: var(--accent); border-color: var(--accent); color: var(--bg0); }
.alerta-tab:hover:not(.ativo) { border-color: var(--accent2); color: var(--accent2); }


.jogo-alerta-card:hover { border-color: var(--border2); }
.jogo-alerta-card.hoje-jogo {
  border-color: var(--accent) !important;
  background: rgba(0,229,160,.06) !important;
  box-shadow: 0 0 0 1px rgba(0,229,160,.2);
}
.jogo-alerta-card.passado { opacity: .45; }
.jal-data {
  min-width: 70px; text-align: center;
  background: var(--bg4); border-radius: var(--radius-s);
  padding: 6px 8px;
}
.jal-dia { font-family: var(--font-display); font-size: 1.4em; color: var(--txt0); line-height: 1; }
.jal-mes { font-size: .65em; color: var(--txt2); text-transform: uppercase; letter-spacing: .5px; }
.jal-info { flex: 1; min-width: 0; }
.jal-adversario { font-weight: 600; font-size: .9em; color: var(--txt0); }
.jal-meta { font-size: .72em; color: var(--txt2); margin-top: 2px; }
.jal-hora { font-weight: 700; color: var(--accent2); }
.jal-del { background: none; border: none; color: var(--txt2); cursor: pointer; padding: 4px; border-radius: 6px; transition: color .15s; font-size: 1em; }
.jal-del:hover { color: var(--accent3); }
.hoje-pulse {
  position: absolute; top: 8px; right: 8px;
  background: var(--accent); color: var(--bg0);
  border-radius: 20px; padding: 2px 9px;
  font: 700 .65em var(--font-body); letter-spacing: .3px;
}

.alerta-hoje-banner {
  background: linear-gradient(135deg, rgba(0,229,160,.15), rgba(0,196,255,.1));
  border: 1px solid rgba(0,229,160,.3);
  border-radius: var(--radius-m); padding: 14px 18px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.alerta-hoje-icon { font-size: 2em; flex-shrink: 0; }
.alerta-hoje-titulo { font-family: var(--font-display); font-size: 1.1em; color: var(--accent); letter-spacing: .3px; }
.alerta-hoje-sub { font-size: .8em; color: var(--txt1); margin-top: 2px; }


.realizado-card { opacity: .55; }
.realizado-card:hover { opacity: .85; }

</style>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<!-- HEADER -->
<header>
  <div class="header-logo">
    <div class="logo-icon">⚽</div>
    <span class="logo-text">FUTEBOL LIVE</span>
  </div>
  <div class="header-actions">
    <button class="hbtn" id="btnAlertas" onclick="toggleTelaAlertas()">

<script>
/* ══════════════════════════════════════════════
   ESTADO
══════════════════════════════════════════════ */
let cols = [], isAdmin = false, dragChampId = null, dragChampCol = null;


/* ══════════════════════════════════════════════
   UTILITÁRIOS
══════════════════════════════════════════════ */
function uid() { return 'x' + Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function hoje() { return new Date().toLocaleDateString('pt-BR'); }
/* ══════════════════════════════════════════════
   LOCAL STORAGE / MIGRATE
══════════════════════════════════════════════ */
const STORE = 'cf_v5';
function sanitize(raw) {
  if (!Array.isArray(raw)) return [];
  return raw.filter(c=>c&&c.key).map((c,i)=>({
    key:String(c.key), name:String(c.name||''), order:isFinite(+c.order)?+c.order:i,
    championships:Array.isArray(c.championships)?c.championships.map(ch=>({id:ch.id?String(ch.id):uid(),name:String(ch.name||''),image:String(ch.image||''),link:String(ch.link||'')})):[]
  })).sort((a,b)=>a.order-b.order);
}
function loadLocal() {
  try { const raw=localStorage.getItem(STORE); if(raw){cols=sanitize(JSON.parse(raw));return;} migrateOld(); } catch {}
}
function saveLocal() { cols.forEach((c,i)=>c.order=i); localStorage.setItem(STORE,JSON.stringify(cols)); }
function scheduleSave() { saveLocal(); }
function migrateOld() {
  const keys=['camp_v4','campeonatosData_v3','campeonatosData_v2','championshipsData'];
  for(const k of keys){
    try{
      const raw=localStorage.getItem(k); if(!raw)continue;
      const p=JSON.parse(raw);
      if(Array.isArray(p)&&p.length){cols=sanitize(p);saveLocal();return;}
      if(p?.columns){let ord=0;cols=[];for(const ck in p.columns){const c=p.columns[ck];cols.push({key:String(ck),name:String(c.name||ck),order:ord++,championships:(Array.isArray(c.championships)?c.championships:[]).map(ch=>({id:String(ch.id||uid()),name:String(ch.name||''),image:String(ch.image||''),link:String(ch.link||'')}))});}if(cols.length){saveLocal();return;}}
    }catch{}
  }
}


/* ══════════════════════════════════════════════
   RENDER GRADE
══════════════════════════════════════════════ */
function renderAll(){renderGrid();if(isAdmin){rebuildColSelect();renderOrderPanel();}}
function rebuildColSelect(){
  const sel=document.getElementById('cColSel');const prev=sel.value;
  sel.innerHTML='<option value="">— Selecione —</option>';
  cols.forEach(c=>{const o=document.createElement('option');o.value=c.key;o.textContent=c.name;sel.appendChild(o);});
  if(cols.find(c=>c.key===prev))sel.value=prev;
}
function renderGrid(){
  const wrap=document.getElementById('colsWrap');wrap.innerHTML='';
  if(!cols.length){wrap.innerHTML='<p style="text-align:center;color:var(--txt2);padding:40px;width:100%;grid-column:1/-1">Nenhuma coluna criada ainda.</p>';return;}
  cols.forEach((col,idx)=>wrap.appendChild(buildColEl(col,idx)));
}
function buildColEl(col,idx){
  const div=document.createElement('div');div.className='column';div.id='col-'+col.key;div.dataset.key=col.key;
  div.addEventListener('dragover',e=>{if(dragChampId!==null){e.preventDefault();div.classList.add('card-drag-over');}});
  div.addEventListener('dragleave',e=>{if(!div.contains(e.relatedTarget))div.classList.remove('card-drag-over');});
  div.addEventListener('drop',onCardDrop);
  const badge=document.createElement('div');badge.className='col-badge';badge.textContent=idx+1;div.appendChild(badge);
  const head=document.createElement('div');head.className='col-head';
  const titleEl=document.createElement('span');titleEl.className='col-title';titleEl.textContent=col.name;
  const renInput=document.createElement('input');renInput.type='text';renInput.className='col-rename-input';renInput.value=col.name;
  const acts=document.createElement('div');acts.className='col-acts';
  const btnRen=document.createElement('button');btnRen.className='ca ca-ren';btnRen.innerHTML='✏️';btnRen.title='Renomear';
  const btnDel=document.createElement('button');btnDel.className='ca ca-del';btnDel.innerHTML='🗑️';btnDel.title='Excluir';
  acts.append(btnRen,btnDel);head.append(titleEl,renInput,acts);
  const hint=document.createElement('div');hint.className='col-hint';hint.textContent='✏ clique no título para renomear';
  const startRen=()=>{if(!isAdmin)return;renInput.value=col.name;titleEl.style.display='none';renInput.classList.add('show');setTimeout(()=>{renInput.focus();renInput.select();},10);};
  const commitRen=()=>{const n=renInput.value.trim();titleEl.style.display='';renInput.classList.remove('show');if(n&&n!==col.name){col.name=n;titleEl.textContent=n;scheduleSave();rebuildColSelect();renderOrderPanel();}};
  btnRen.addEventListener('click',e=>{e.stopPropagation();startRen();});
  titleEl.addEventListener('click',startRen);
  renInput.addEventListener('blur',commitRen);
  renInput.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();commitRen();}if(e.key==='Escape'){titleEl.style.display='';renInput.classList.remove('show');}});
  btnDel.addEventListener('click',e=>{e.stopPropagation();if(!isAdmin)return;const n=col.championships.length;if(confirm(n?`Excluir "${col.name}"?\n${n} campeonato(s) serão removidos!`:`Excluir "${col.name}"?`)){cols=cols.filter(c=>c.key!==col.key);scheduleSave();renderAll();}});
  div.append(head,hint);
  const list=document.createElement('div');list.className='champs-list';list.id='list-'+col.key;div.appendChild(list);
  fillCards(col,list);return div;
}
function fillCards(col,listEl){
  listEl.innerHTML='';listEl.classList.remove('empty-list');
  if(!col.championships.length){listEl.classList.add('empty-list');const p=document.createElement('p');p.className='empty-msg';p.textContent='Nenhum campeonato aqui.';listEl.appendChild(p);return;}
  col.championships.forEach((ch,idx)=>{
    const card=document.createElement('a');card.href=ch.link||'#';card.target='_blank';card.className='champ-card';card.draggable=true;card.dataset.id=ch.id;card.dataset.col=col.key;
    card.addEventListener('dragstart',e=>{if(!isAdmin){e.preventDefault();return;}dragChampId=ch.id;dragChampCol=col.key;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',ch.id);setTimeout(()=>card.classList.add('dragging'),0);});
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');dragChampId=null;dragChampCol=null;document.querySelectorAll('.card-drag-over').forEach(d=>d.classList.remove('card-drag-over'));});
    const numEl=document.createElement('div');numEl.className='card-order-num';numEl.textContent=idx+1;card.appendChild(numEl);
    const delBtn=document.createElement('button');delBtn.className='del-card';delBtn.innerHTML='&times;';delBtn.title='Excluir';delBtn.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();deleteChamp(col.key,ch.id);});card.appendChild(delBtn);
    const img=document.createElement('img');img.src=ch.image||'';img.alt=ch.name;img.loading='lazy';img.onerror=function(){this.src='https://placehold.co/80x80/1a2540/00e5a0?text=⚽';};card.appendChild(img);
    const h3=document.createElement('h3');h3.textContent=ch.name;card.appendChild(h3);
    const moveBtns=document.createElement('div');moveBtns.className='card-move-btns';
    const mvL=document.createElement('button');mvL.className='cmv cmv-l';mvL.innerHTML='←';mvL.disabled=idx===0;
    mvL.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();if(idx===0)return;const ch2=col.championships;[ch2[idx-1],ch2[idx]]=[ch2[idx],ch2[idx-1]];scheduleSave();refreshList(col.key);});
    const mvR=document.createElement('button');mvR.className='cmv cmv-r';mvR.innerHTML='→';mvR.disabled=idx===col.championships.length-1;
    mvR.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();if(idx===col.championships.length-1)return;const ch2=col.championships;[ch2[idx],ch2[idx+1]]=[ch2[idx+1],ch2[idx]];scheduleSave();refreshList(col.key);});
    moveBtns.append(mvL,mvR);card.appendChild(moveBtns);listEl.appendChild(card);
  });
}
function refreshList(colKey){const col=cols.find(c=>c.key===colKey);const list=document.getElementById('list-'+colKey);if(col&&list)fillCards(col,list);}
function renderOrderPanel(){
  const ul=document.getElementById('orderList');ul.innerHTML='';
  cols.forEach((col,idx)=>{
    const li=document.createElement('li');li.className='oitem';
    const num=document.createElement('div');num.className='onum';num.textContent=idx+1;
    const nm=document.createElement('span');nm.className='oname';nm.textContent=col.name;
    const ct=document.createElement('span');ct.className='ocount';ct.textContent=col.championships.length+' camp.';
    const bw=document.createElement('div');bw.className='obtn-wrap';
    const up=document.createElement('button');up.className='obtn obtn-up';up.innerHTML='↑';up.disabled=idx===0;up.addEventListener('click',()=>{if(idx===0)return;[cols[idx-1],cols[idx]]=[cols[idx],cols[idx-1]];renderOrderPanel();});
    const dn=document.createElement('button');dn.className='obtn obtn-down';dn.innerHTML='↓';dn.disabled=idx===cols.length-1;dn.addEventListener('click',()=>{if(idx===cols.length-1)return;[cols[idx],cols[idx+1]]=[cols[idx+1],cols[idx]];renderOrderPanel();});
    bw.append(up,dn);li.append(num,nm,ct,bw);ul.appendChild(li);
  });
}
function applyColOrder(){scheduleSave();renderGrid();rebuildColSelect();showMsg('msgOrder','✅ Ordem aplicada!','ok');}
function onCardDrop(e){
  e.preventDefault();const tgtDiv=e.currentTarget;tgtDiv.classList.remove('card-drag-over');
  if(!isAdmin||dragChampId===null)return;
  const tgtKey=tgtDiv.dataset.key;const srcKey=dragChampCol;if(!tgtKey||srcKey===tgtKey)return;
  const srcCol=cols.find(c=>c.key===srcKey);const tgtCol=cols.find(c=>c.key===tgtKey);if(!srcCol||!tgtCol)return;
  const idx=srcCol.championships.findIndex(c=>c.id===dragChampId);if(idx===-1)return;
  const[moved]=srcCol.championships.splice(idx,1);tgtCol.championships.push(moved);
  scheduleSave();refreshList(srcKey);refreshList(tgtKey);renderOrderPanel();
}

/* ══════════════════════════════════════════════
   CRUD
══════════════════════════════════════════════ */
function addChamp(){
  const name=document.getElementById('cName').value.trim();const image=document.getElementById('cImg').value.trim();const link=document.getElementById('cLink').value.trim();const colKey=document.getElementById('cColSel').value;
  if(!name||!image||!link){showMsg('msgChamp','Preencha nome, imagem e link!','err');return;}
  if(!colKey){showMsg('msgChamp','Selecione uma coluna!','err');return;}
  const col=cols.find(c=>c.key===colKey);if(!col){showMsg('msgChamp','Coluna não encontrada.','err');return;}
  col.championships.push({id:uid(),name,image,link});scheduleSave();refreshList(colKey);renderOrderPanel();
  showMsg('msgChamp',`✅ "${name}" adicionado!`,'ok');
  document.getElementById('cName').value='';document.getElementById('cImg').value='';document.getElementById('cLink').value='';
}
function deleteChamp(colKey,champId){
  if(!isAdmin)return;const col=cols.find(c=>c.key===colKey);if(!col)return;
  const idx=col.championships.findIndex(c=>c.id===champId);if(idx===-1)return;
  if(confirm(`Excluir "${col.championships[idx].name}"?`)){col.championships.splice(idx,1);scheduleSave();refreshList(colKey);renderOrderPanel();}
}
function addCol(){
  const name=document.getElementById('colName').value.trim();if(!name){showMsg('msgCol','Digite um nome!','err');return;}
  const key='c'+Date.now().toString(36);cols.push({key,name,order:cols.length,championships:[]});scheduleSave();renderAll();
  showMsg('msgCol',`✅ Coluna "${name}" criada!`,'ok');document.getElementById('colName').value='';
}

/* ══════════════════════════════════════════════
   ADMIN
══════════════════════════════════════════════ */
document.getElementById('adminTrigger').addEventListener('click',()=>{if(isAdmin)exitAdmin();else showPanel('pLogin');});
function showPanel(id){['pLogin','pChamp','pCol','pOrder'].forEach(p=>{document.getElementById(p).classList.toggle('active',p===id);});}
async function enterAdmin(){
  const name=document.getElementById('aName').value.trim();const phone=document.getElementById('aPhone').value.trim();const email=document.getElementById('aEmail').value.trim();
  if(!name||!phone||!email){showMsg('msgLogin','Preencha todos os campos.','err');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showMsg('msgLogin','E-mail inválido.','err');return;}
  
  isAdmin=true;document.body.classList.add('admin-mode');
  ['pChamp','pCol','pOrder'].forEach(id=>document.getElementById(id).classList.add('active'));
  document.getElementById('pLogin').classList.remove('active');renderAll();showMsg('msgChamp',`Bem-vindo, ${name}! ✓`,'ok');
}
function exitAdmin(){
  isAdmin=false;document.body.classList.remove('admin-mode');
  ['pLogin','pChamp','pCol','pOrder'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById('aName').value='';document.getElementById('aPhone').value='';document.getElementById('aEmail').value='';
  renderGrid();
}
function showMsg(id,txt,type){const el=document.getElementById(id);el.textContent=txt;el.className='msg '+type;clearTimeout(el._t);el._t=setTimeout(()=>{el.className='msg';el.textContent='';},4500);}

function preloadJogosFlamengo() {
  const PRELOAD_KEY = 'fl_preload_flamengo_v1';
  if (localStorage.getItem(PRELOAD_KEY)) return; // já carregado antes

  const ano = new Date().getFullYear();
  const novos = JOGOS_FLAMENGO_PRELOAD.map(j => {
    const [d, m] = j.data.split('/');
    const dataISO = `${ano}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
    // Extrai adversário do campo jogo (remove placar e nome Flamengo)
    let adversario = j.jogo
      .replace(/\d+x\d+/gi, '')          // remove placar
      .replace(/\(.*?\)/g, '')            // remove parênteses
      .replace(/flamengo/gi, '')           // remove o próprio time
      .replace(/^[\sx×]+|[\sx×]+$/gi, '') // remove separadores das pontas
      .replace(/\s{2,}/g, ' ')
      .trim();
    if (!adversario) adversario = j.jogo.trim();

    return {
      id:            'pre_' + dataISO + '_' + Math.random().toString(36).slice(2,6),
      time:          'Flamengo',
      adversario:    adversario.slice(0, 40),
      data:          `${d.padStart(2,'0')}/${m.padStart(2,'0')}/${ano}`,
      dataISO,
      hora:          '',
      competicao:    j.comp,
      placar:        j.status === 'realizado' ? j.jogo.match(/\d+x\d+/i)?.[0] || '' : '',
      statusJogo:    j.status,   // 'realizado' | 'futuro'
      linhaOriginal: j.jogo,
    };
  });

  const existentes = getAlertas();
  const vistos = new Set(existentes.map(j => j.dataISO));
  const final  = [...existentes, ...novos.filter(j => !vistos.has(j.dataISO))];
  saveAlertas(final);
  localStorage.setItem(PRELOAD_KEY, '1');
}

/* ── Parser inteligente de tabela ── */
function parsearLinhas(texto, timeBase) {
  const meses = {jan:1,fev:2,mar:3,abr:4,mai:5,jun:6,jul:7,ago:8,set:9,out:10,nov:11,dez:12,
                 january:1,february:2,march:3,april:4,may:5,june:6,july:7,august:8,september:9,october:10,november:11,december:12};
  const jogos = [];
  const linhas = texto.split('\n').map(l => l.trim()).filter(l => l.length > 3);

  for (const linha of linhas) {
    try {
      let data = null, hora = null, adversario = null, competicao = '', local = '';

      // ── Extrair data ──
      // DD/MM/YYYY ou DD/MM/YY ou DD/MM
      let m = linha.match(/(\d{1,2})[\/\-\.](\d{1,2})(?:[\/\-\.](\d{2,4}))?/);
      if (m) {
        const d = +m[1], mo = +m[2], y = m[3] ? (m[3].length===2 ? 2000 + +m[3] : +m[3]) : new Date().getFullYear();
        if (d >= 1 && d <= 31 && mo >= 1 && mo <= 12) data = new Date(y, mo-1, d);
      }

      // DD de MêsNome
      if (!data) {
        m = linha.match(/(\d{1,2})\s+(?:de\s+)?([a-záéíóúâêîôûã]+)/i);
        if (m && meses[m[2].toLowerCase().slice(0,3)]) {
          const d = +m[1], mo = meses[m[2].toLowerCase().slice(0,3)];
          data = new Date(new Date().getFullYear(), mo-1, d);
        }
      }

      if (!data) continue;

      // ── Extrair hora ──
      m = linha.match(/(\d{1,2})[h:hH](\d{0,2})/);
      if (m) hora = m[1].padStart(2,'0') + ':' + (m[2]||'00').padStart(2,'0');

      // ── Extrair adversário ──
      // Remove a data da linha para facilitar
      let resto = linha
        .replace(/\d{1,2}[\/\-\.]\d{1,2}(?:[\/\-\.]\d{2,4})?/g, '')
        .replace(/\d{1,2}\s+(?:de\s+)?[a-záéíóúâêîôûã]+/gi, '')
        .replace(/\d{1,2}[h:hH]\d{0,2}/gi, '')
        .replace(/[-–|·]/g, ' ')
        .replace(/\bx\b|\bvs\.?\b|\bvsba\b/gi, '|SEP|')
        .trim();

      // Separar pelo marcador de jogo
      const partes = resto.split('|SEP|').map(p => p.trim()).filter(Boolean);

      if (partes.length >= 2) {
        // Tem "x" ou "vs" — descobre qual é o adversário
        const p0 = partes[0].trim(), p1 = partes[1].trim();
        const tb = (timeBase || '').toLowerCase();
        if (tb && p0.toLowerCase().includes(tb)) {
          adversario = p1.split(/[|\-–·]/)[0].trim();
        } else {
          adversario = p0.split(/[|\-–·]/)[0].trim() || p1.split(/[|\-–·]/)[0].trim();
        }
      } else if (partes.length === 1) {
        adversario = partes[0].split(/[|\-–·]/)[0].trim();
      }

      // Limpa adversário de tokens numéricos soltos
      if (adversario) adversario = adversario.replace(/^\d+\s*/, '').replace(/\s*\d+$/, '').trim();

      // ── Extrair campeonato (palavras-chave comuns) ──
      const compMatch = linha.match(/brasileir[ãa]o|copa do brasil|libertadores|sul-americana|champions|premier|laliga|série [abcd]|estadual|carioca|paulista|gaúcho|mineiro|baiano|pernambucano/i);
      if (compMatch) competicao = compMatch[0];

      if (!adversario || adversario.length < 2) continue;

      jogos.push({
        id:          'a' + Date.now().toString(36) + Math.random().toString(36).slice(2,5),
        time:        timeBase || '',
        adversario:  adversario.slice(0,40),
        data:        data.toLocaleDateString('pt-BR'),
        dataISO:     data.toISOString().split('T')[0],
        hora:        hora || '',
        competicao:  competicao,
        local:       local,
        linhaOriginal: linha,
      });
    } catch {}
  }

  // Remove duplicatas por dataISO+adversario
  const vistos = new Set();
  return jogos.filter(j => {
    const k = j.dataISO + j.adversario.toLowerCase();
    if (vistos.has(k)) return false;
    vistos.add(k); return true;
  });
}

  const texto = document.getElementById('alertaTabela').value;
  const time  = document.getElementById('alertaTime').value.trim();
  if (!texto.trim() || !time) {
    alert('Preencha o nome do time e cole a tabela de jogos.');
    return;
  }

  const novos = parsearLinhas(texto, time);
  if (!novos.length) {
    alert('Nenhum jogo identificado. Verifique o formato do texto.');
    return;
  }

  const existentes = getAlertas();
  const todos = [...existentes, ...novos];
  // Remove dupes globais
  const vistos = new Set(existentes.map(j => j.dataISO + j.adversario.toLowerCase()));
  const final  = [...existentes, ...novos.filter(j => !vistos.has(j.dataISO + j.adversario.toLowerCase()))];

  saveAlertas(final);

}

/* ── Render lista ── */
function renderAlertaLista() {
  const lista = document.getElementById('alertaLista');
  const todos = getAlertas().sort((a,b) => a.dataISO.localeCompare(b.dataISO));
  const hoje  = new Date().toISOString().split('T')[0];

  if (!todos.length) {
    lista.innerHTML = `<div class="estado-wrap" style="padding:30px 0"><span class="estado-icon">🔔</span><p class="estado-txt">Nenhum alerta salvo ainda.<br>Adicione jogos na aba "Adicionar Jogos".</p></div>`;
    return;
  }

  // Agrupar por time
  const grupos = {};
  todos.forEach(j => {
    if (!grupos[j.time]) grupos[j.time] = [];
    grupos[j.time].push(j);
  });

  // Estatísticas rápidas
  const total   = todos.length;
  const futuros = todos.filter(j => j.dataISO >= hoje).length;
  const realiz  = todos.filter(j => j.statusJogo === 'realizado').length;

  let html = `<div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap">
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-m);padding:10px 16px;flex:1;min-width:90px;text-align:center">

      <div style="font-family:var(--font-display);font-size:1.6em;color:var(--accent2)">${futuros}</div>
      <div style="font-size:.7em;color:var(--txt2)">Próximos</div>
    </div>

      <div style="font-size:.7em;color:var(--txt2)">Realizados</div>

  for (const [time, jogos] of Object.entries(grupos)) {

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px">

      </div>`;

    jogos.forEach(j => {
      const realizado = j.statusJogo === 'realizado';
      const passado   = j.dataISO < hoje && !realizado;
      const ehHoje    = j.dataISO === hoje;
      const dt   = parseDateISO(j.dataISO);
      const dia  = dt.toLocaleDateString('pt-BR',{day:'2-digit'});
      const mes  = dt.toLocaleDateString('pt-BR',{month:'short'}).replace('.','');
      const dsem = dt.toLocaleDateString('pt-BR',{weekday:'short'}).replace('.','');

      // Extrai placar da linha original se realizado
      const placarMatch = j.linhaOriginal && j.linhaOriginal.match(/\d+\s*[xX×]\s*\d+/);
      const placar = placarMatch ? placarMatch[0].replace(/\s/g,'') : (j.placar||'');

      html += `
        <div class="jogo-alerta-card${ehHoje?' hoje-jogo':''}${realizado?' realizado-card':''}">
          ${ehHoje  ? '<span class="hoje-pulse">HOJE</span>' : ''}
          ${realizado ? `<span class="hoje-pulse" style="background:var(--txt2);animation:none">${placar||'FIM'}</span>` : ''}
          <div class="jal-data">
            <div class="jal-dia">${dia}</div>
            <div class="jal-mes">${mes}</div>
            <div class="jal-mes" style="color:${ehHoje?'var(--accent)':'var(--accent2)'}">${dsem}</div>
          </div>
          <div class="jal-info">
            <div class="jal-adversario" style="${realizado?'color:var(--txt2)':''}">
              ${j.linhaOriginal || (time+' × '+j.adversario)}
            </div>
            <div class="jal-meta">
              ${j.hora ? `<span class="jal-hora">${j.hora}</span> · ` : ''}
              <span style="color:${realizado?'var(--txt2)':'var(--txt1)'}">${j.competicao||'Jogo'}</span>
              ${realizado ? '<span style="color:var(--txt2);margin-left:4px">· Realizado</span>' : ''}
            </div>
          </div>
          <button class="jal-del" onclick="removerAlerta('${j.id}')" title="Remover">✕</button>

    });
    html += '</div>';

  html += `<div style="text-align:center;margin-top:10px">

  lista.innerHTML = html;

function parseDateISO(iso) {
  const [y,m,d] = iso.split('-'); return new Date(+y,+m-1,+d);
}

  const todos  = getAlertas();

  if (btn) btn.textContent = futuros ? `Alertas (${futuros})` : 'Alertas';

  // Destaque no botão se tiver jogo hoje

  box.style.display = '';
  box.innerHTML = `
    <div class="alerta-hoje-banner">
      <div class="alerta-hoje-icon">🔔</div>
      <div style="flex:1">
        <div class="alerta-hoje-titulo">⚽ JOGO${jogos.length>1?'S':''} HOJE!</div>
        ${jogos.map(j=>`
          <div class="alerta-hoje-sub" style="margin-top:4px">
            <strong>${j.linhaOriginal || (j.time+' × '+j.adversario)}</strong>
            ${j.hora?`<span style="color:var(--gold);margin-left:6px">🕐 ${j.hora}</span>`:''}
            <span style="color:var(--txt2);margin-left:6px;font-size:.9em">${j.competicao||''}</span>
          </div>`).join('')}
      </div>
    </div>`;
}

/* ── Notificações do navegador ── */
function pedirPermissaoNotificacao() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    Notification.requestPermission().then(p => {
      if (p === 'granted') agendarNotificacoesHoje();
    });
  } else if (Notification.permission === 'granted') {
    agendarNotificacoesHoje();
  }
}

function agendarNotificacoesHoje() {
  if (Notification.permission !== 'granted') return;
  const hoje  = new Date().toISOString().split('T')[0];
  const jogos = getAlertas().filter(j => j.dataISO === hoje);
  jogos.forEach(j => {
    new Notification(`⚽ Jogo hoje! ${j.time} × ${j.adversario}`, {
      body: `${j.hora ? j.hora + ' · ' : ''}${j.competicao || 'Futebol Live'}`,
      icon: 'https://placehold.co/64x64/00e5a0/060b18?text=⚽'
    });
  });
}

function carregarExemplo() {
  document.getElementById('alertaTime').value = 'Flamengo';
  document.getElementById('alertaTabela').value =
`22/03/2026 - Flamengo x Vasco - 16:00 - Brasileirão

28/03 Flamengo x Corinthians 20:30

05/04 Flamengo vs Santos 19h Brasileirão`;

}

function limparTextarea() {
  document.getElementById('alertaTabela').value = '';
  document.getElementById('alertaPreview').innerHTML = '';
}

/* ── Verificação ao carregar + a cada hora ── */
function rotinaDiariaAlertas() {
  atualizarBadgeAlertas();
  if (Notification.permission === 'granted') agendarNotificacoesHoje();
}
