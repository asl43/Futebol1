<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Futebol Live</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#060b18;--bg1:#0a1020;--bg2:#101828;--bg3:#1a2540;--bg4:#1f2d4a;
  --acc:#00e5a0;--acc2:#00c4ff;--acc3:#ff4d6d;--gold:#ffcc00;
  --t0:#f0f4ff;--t1:#a8b8d8;--t2:#5a6e90;
  --brd:rgba(255,255,255,.08);--brd2:rgba(255,255,255,.14);
  --rs:8px;--rm:14px;--rl:20px;--rxl:28px;
  --fd:'Bebas Neue',sans-serif;--fb:'Outfit',sans-serif;
}
body.light{
  --bg0:#eef2f8;--bg1:#e4eaf2;--bg2:#fff;--bg3:#f0f4f8;--bg4:#e0e8f0;
  --t0:#0d1b2a;--t1:#2d4060;--t2:#6b7d96;
  --brd:rgba(0,0,0,.09);--brd2:rgba(0,0,0,.15);
}
html,body{min-height:100vh}
body{font-family:var(--fb);background:var(--bg0);color:var(--t0);transition:background .3s,color .3s}

/* ORBS */
.orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.1;animation:orbf 12s ease-in-out infinite}
.o1{width:500px;height:500px;background:var(--acc);top:-150px;right:-100px}
.o2{width:400px;height:400px;background:var(--acc2);bottom:-100px;left:-80px;animation-delay:-4s}
.o3{width:300px;height:300px;background:var(--acc3);top:40%;left:40%;animation-delay:-8s}
@keyframes orbf{0%,100%{transform:translate(0,0)}33%{transform:translate(30px,-40px)}66%{transform:translate(-20px,30px)}}

/* HEADER */
header{position:sticky;top:0;z-index:900;background:rgba(6,11,24,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--brd);padding:0 14px;height:58px;display:flex;align-items:center;justify-content:space-between;gap:8px}
body.light header{background:rgba(238,242,248,.95)}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-ico{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-txt{font-family:var(--fd);font-size:1.35em;letter-spacing:1px;background:linear-gradient(90deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hbtns{display:flex;align-items:center;gap:5px}
.hbtn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--rxl);border:1px solid var(--brd2);background:var(--bg3);color:var(--t0);font:600 .76em var(--fb);cursor:pointer;transition:all .2s;white-space:nowrap}
.hbtn:hover{border-color:var(--acc);color:var(--acc)}
.hbtn.on{background:var(--acc);border-color:var(--acc);color:var(--bg0)}
.hbtn svg{width:13px;height:13px;fill:currentColor;flex-shrink:0}
@media(max-width:480px){.hbtn span{display:none}.hbtn{padding:7px 9px}}

/* MAIN */
main{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 12px 80px}

/* TELAS */
.tela{display:none;padding:18px 0;animation:fup .3s ease}
.tela.on{display:block}
@keyframes fup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* CARD CONTAINER */
.card{background:var(--bg2);border:1px solid var(--brd2);border-radius:var(--rl);overflow:hidden;margin-bottom:14px}
.card-head{background:linear-gradient(135deg,#1a2540,#0f1e3a);padding:16px 20px;border-bottom:1px solid var(--brd)}
.card-head h2{font-family:var(--fd);font-size:1.25em;letter-spacing:.5px;color:var(--acc);margin:0}
.card-head p{font-size:.76em;color:var(--t2);margin:3px 0 0}
.card-body{padding:16px 18px}

/* PRÓXIMO JOGO CARD */
.prox-card{background:linear-gradient(135deg,rgba(0,229,160,.12),rgba(0,196,255,.08));border:1px solid rgba(0,229,160,.25);border-radius:var(--rl);padding:16px 18px;margin-bottom:16px;position:relative;overflow:hidden}
.prox-label{font-size:.65em;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--acc);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.prox-dot{width:7px;height:7px;border-radius:50%;background:var(--acc);animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}
.prox-jogo{font:700 1em var(--fb);color:var(--t0);margin-bottom:4px}
.prox-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:.76em;color:var(--t2);align-items:center}
.prox-hora{font-weight:700;color:var(--gold)}
.prox-comp{color:var(--t2)}
.prox-escudo{width:36px;height:36px;object-fit:contain;border-radius:6px;background:rgba(255,255,255,.07);padding:3px}
.countdown-wrap{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
.cd-box{background:rgba(0,0,0,.3);border-radius:var(--rs);padding:6px 10px;text-align:center;min-width:52px}
.cd-num{font-family:var(--fd);font-size:1.5em;color:var(--acc);line-height:1}
.cd-lbl{font-size:.58em;color:var(--t2);text-transform:uppercase;letter-spacing:.4px}

/* TIME CORES */
.time-flamengo  {--tc:#e8002d;--tc2:#000}
.time-corinthians{--tc:#000;--tc2:#fff}
.time-palmeiras  {--tc:#006633;--tc2:#fff}
.time-saopaulo   {--tc:#c0272d;--tc2:#fff}
.time-fluminense {--tc:#6d0038;--tc2:#6cac47}
.time-botafogo   {--tc:#000;--tc2:#fff}
.time-vasco      {--tc:#000;--tc2:#fff}
.time-santos     {--tc:#000;--tc2:#fff}
.time-gremio     {--tc:#003087;--tc2:#fbcf0b}
.time-internacional{--tc:#cf1020;--tc2:#fff}
.jcard .time-stripe{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:var(--rm) 0 0 var(--rm);background:var(--tc,var(--acc))}
.jcard .escudo-mini{width:24px;height:24px;object-fit:contain;border-radius:4px;flex-shrink:0}

/* TABS */
.tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px;border-bottom:1px solid var(--brd);padding-bottom:10px}
.tab{padding:6px 13px;border-radius:var(--rxl);border:1px solid var(--brd2);background:var(--bg3);color:var(--t1);font:600 .75em var(--fb);cursor:pointer;transition:all .2s}
.tab:hover{border-color:var(--acc2);color:var(--acc2)}
.tab.on{background:var(--acc);border-color:var(--acc);color:var(--bg0)}
.tab-content{display:none}
.tab-content.on{display:block}

/* FORM */
.flabel{display:block;font-size:.78em;font-weight:600;color:var(--t1);margin-bottom:4px}
.finput,.fselect{width:100%;padding:9px 12px;margin-bottom:10px;background:var(--bg3);border:1.5px solid var(--brd2);border-radius:var(--rs);color:var(--t0);font:.88em var(--fb);outline:none;transition:border-color .2s}
.finput:focus,.fselect:focus{border-color:var(--acc)}
.fselect option{background:var(--bg2)}
body.light .finput,body.light .fselect{background:#fff;color:#0d1b2a}
textarea.finput{min-height:140px;resize:vertical;font-family:monospace;line-height:1.6}

/* BOTÕES */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border:none;border-radius:var(--rxl);font:700 .82em var(--fb);cursor:pointer;transition:all .2s}
.btn:hover{transform:translateY(-1px)}
.btn-acc{background:linear-gradient(135deg,var(--acc),var(--acc2));color:var(--bg0)}
.btn-grn{background:rgba(0,229,160,.15);color:var(--acc);border:1px solid rgba(0,229,160,.3)}
.btn-grn:hover{background:rgba(0,229,160,.25)}
.btn-red{background:rgba(255,77,109,.15);color:var(--acc3);border:1px solid rgba(255,77,109,.3)}
.btn-ora{background:rgba(255,204,0,.15);color:var(--gold);border:1px solid rgba(255,204,0,.3)}
.btn-blu{background:rgba(0,196,255,.12);color:var(--acc2);border:1px solid rgba(0,196,255,.25)}
.btn-blu:hover{background:rgba(0,196,255,.22)}
.msg{display:none;padding:7px 11px;border-radius:var(--rs);font-size:.8em;font-weight:600;margin-top:7px}
.msg.ok{display:block;background:rgba(0,229,160,.1);color:var(--acc);border:1px solid rgba(0,229,160,.25)}
.msg.err{display:block;background:rgba(255,77,109,.1);color:var(--acc3);border:1px solid rgba(255,77,109,.25)}

/* HOJE BANNER */
.hoje-banner{background:linear-gradient(135deg,rgba(0,229,160,.14),rgba(0,196,255,.08));border:1px solid rgba(0,229,160,.3);border-radius:var(--rm);padding:14px 16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:12px}
.hb-ico{font-size:1.8em;flex-shrink:0}
.hb-titulo{font-family:var(--fd);font-size:1em;color:var(--acc);letter-spacing:.3px}
.hb-sub{font-size:.8em;color:var(--t1);margin-top:3px}

/* FILTROS + ORDENAÇÃO */
.filtros{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.filtros .fselect{margin:0;flex:1;min-width:120px;max-width:190px}
.btn-sm{padding:5px 11px;font-size:.73em;border-radius:var(--rxl);border:1px solid var(--brd2);background:var(--bg3);color:var(--t1);cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-sm:hover{border-color:var(--acc);color:var(--acc)}
.btn-sm.on{border-color:var(--acc);color:var(--acc);background:rgba(0,229,160,.08)}
.sort-btns{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.sort-lbl{font-size:.7em;color:var(--t2);margin-right:2px}

/* STATS MINI */
.stats-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.stat-mini{flex:1;min-width:65px;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rm);padding:9px 7px;text-align:center}
.stat-mini-num{font-family:var(--fd);font-size:1.5em;line-height:1}
.stat-mini-lbl{font-size:.62em;color:var(--t2);margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.n-azul{color:var(--acc2)}.n-verde{color:var(--acc)}.n-cin{color:var(--t2)}.n-ouro{color:var(--gold)}.n-verm{color:var(--acc3)}

/* JOGO CARD */
.jcard{background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rm);padding:11px 13px 11px 17px;margin-bottom:7px;display:flex;align-items:center;gap:11px;position:relative;transition:border-color .2s;overflow:hidden}
.jcard:hover{border-color:var(--brd2)}
.jcard.hoje{border-color:var(--acc);background:rgba(0,229,160,.05)}
.jcard.realizado{opacity:.5}
.badge-hoje{display:none;position:absolute;top:6px;right:7px;background:var(--acc);color:var(--bg0);border-radius:20px;padding:2px 8px;font:700 .6em var(--fb);letter-spacing:.3px;align-items:center}
.jcard.hoje .badge-hoje{display:flex}
.badge-placar{position:absolute;top:6px;right:7px;background:var(--t2);color:#fff;border-radius:20px;padding:2px 8px;font:700 .6em var(--fb)}
.jcard-data{min-width:50px;text-align:center;background:var(--bg4);border-radius:var(--rs);padding:5px 4px;flex-shrink:0}
.jcard-dia{font-family:var(--fd);font-size:1.3em;color:var(--t0);line-height:1}
.jcard-mes{font-size:.58em;color:var(--t2);text-transform:uppercase;letter-spacing:.3px}
.jcard-dsem{font-size:.58em;color:var(--acc2)}
.jcard.hoje .jcard-dsem{color:var(--acc)}
.jcard-info{flex:1;min-width:0}
.jcard-jogo{font-weight:600;font-size:.85em;color:var(--t0);line-height:1.3}
.jcard.realizado .jcard-jogo{color:var(--t2)}
.jcard-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px;align-items:center}
.jcard-hora{font-weight:700;font-size:.7em;color:var(--gold)}
.jcard-comp{font-size:.68em;color:var(--t2)}
.jcard-btns{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.btn-wpp{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.25);color:#25d366;font:600 .63em var(--fb);cursor:pointer;transition:all .15s}
.btn-wpp:hover{background:rgba(37,211,102,.2)}
.btn-wpp svg{width:10px;height:10px;fill:#25d366}
.btn-res{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;background:rgba(0,196,255,.1);border:1px solid rgba(0,196,255,.25);color:var(--acc2);font:600 .63em var(--fb);cursor:pointer;transition:all .15s}
.btn-res:hover{background:rgba(0,196,255,.2)}
.btn-edit{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;background:rgba(255,204,0,.1);border:1px solid rgba(255,204,0,.25);color:var(--gold);font:600 .63em var(--fb);cursor:pointer;transition:all .15s}
.btn-edit:hover{background:rgba(255,204,0,.2)}
.jcard-del{background:none;border:none;color:var(--t2);cursor:pointer;padding:3px;border-radius:5px;font-size:.85em;flex-shrink:0;transition:color .15s}
.jcard-del:hover{color:var(--acc3)}

/* SEQUÊNCIA V/E/D */
.seq{display:flex;gap:3px;margin-top:5px}
.seq-dot{width:16px;height:16px;border-radius:50%;font:700 .55em var(--fb);display:flex;align-items:center;justify-content:center}
.seq-v{background:var(--acc);color:var(--bg0)}
.seq-e{background:var(--gold);color:var(--bg0)}
.seq-d{background:var(--acc3);color:#fff}

/* CALENDÁRIO */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.cal-mes{font-family:var(--fd);font-size:1.15em;color:var(--t0);letter-spacing:.5px}
.cal-nbtn{background:var(--bg3);border:1px solid var(--brd2);border-radius:var(--rs);padding:5px 12px;color:var(--t1);font:.83em var(--fb);cursor:pointer;transition:all .15s}
.cal-nbtn:hover{border-color:var(--acc);color:var(--acc)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-hd{text-align:center;font-size:.6em;font-weight:700;color:var(--t2);padding:4px 0;text-transform:uppercase;letter-spacing:.4px}
.cal-cell{min-height:46px;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rs);padding:4px;font-size:.65em;position:relative}
.cal-cell.tem{border-color:var(--acc);background:rgba(0,229,160,.07);cursor:pointer}
.cal-cell.tem:hover{background:rgba(0,229,160,.14);transform:scale(1.04)}
.cal-cell.hj{border-color:var(--acc2);box-shadow:0 0 0 1px var(--acc2)}
.cal-cell.out{opacity:.25}
.cal-num{font-weight:700;color:var(--t1)}
.cal-cell.hj .cal-num{color:var(--acc2)}
.cal-dot{font-size:.58em;color:var(--acc);line-height:1.3;margin-top:2px}

/* STATS COMPLETO */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:7px;margin-bottom:14px}
.stat-card{background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rm);padding:10px 8px;text-align:center}
.stat-num{font-family:var(--fd);font-size:1.7em;line-height:1}
.stat-lbl{font-size:.6em;color:var(--t2);margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.prog-wrap{background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rm);padding:10px 13px;margin-bottom:7px}
.prog-lbl{font-size:.73em;color:var(--t1);display:flex;justify-content:space-between;margin-bottom:5px}
.prog-bar{height:6px;background:var(--bg4);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .6s}

/* TIMES PRÉ */
.time-card{background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rm);padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:all .2s}
.time-card:hover{border-color:var(--acc);background:rgba(0,229,160,.06)}
.time-card.loaded{border-color:var(--acc);background:rgba(0,229,160,.07)}
.time-card.soon{opacity:.5;cursor:not-allowed}
.tc-escudo{width:36px;height:36px;object-fit:contain;border-radius:7px;background:rgba(255,255,255,.06);padding:3px;flex-shrink:0}
.tc-info{flex:1}
.tc-nome{font-weight:700;font-size:.88em;color:var(--t0)}
.tc-desc{font-size:.68em;color:var(--t2);margin-top:2px}
.tc-badge{font-size:.63em;padding:3px 8px;border-radius:20px;font-weight:700;white-space:nowrap}
.tc-badge.ok{background:rgba(0,229,160,.15);color:var(--acc);border:1px solid rgba(0,229,160,.3)}
.tc-badge.add{background:rgba(0,196,255,.1);color:var(--acc2);border:1px solid rgba(0,196,255,.25)}
.tc-badge.em{background:var(--bg4);color:var(--t2);border:1px solid var(--brd)}

/* IMPORTAR URL */
.import-box{background:rgba(0,196,255,.06);border:1px solid rgba(0,196,255,.2);border-radius:var(--rm);padding:13px 15px;margin-bottom:14px}
.import-box h4{font-family:var(--fd);font-size:.95em;color:var(--acc2);letter-spacing:.3px;margin-bottom:8px}
.import-status{font-size:.78em;padding:7px 11px;border-radius:var(--rs);margin-top:8px;display:none}
.import-status.ok{display:block;background:rgba(0,229,160,.1);color:var(--acc);border:1px solid rgba(0,229,160,.25)}
.import-status.err{display:block;background:rgba(255,77,109,.1);color:var(--acc3);border:1px solid rgba(255,77,109,.25)}
.import-status.loading{display:block;background:rgba(0,196,255,.1);color:var(--acc2);border:1px solid rgba(0,196,255,.25)}

/* GRADE CAMPEONATOS */
#colsWrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;align-items:start}
.column{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rl);padding:14px;position:relative;transition:border-color .2s}
.column.drag-over{border:2px dashed var(--acc);background:rgba(0,229,160,.04)}
.col-badge{display:none;position:absolute;top:7px;left:7px;background:var(--acc);color:var(--bg0);border-radius:50%;width:19px;height:19px;font:700 .62em var(--fb);align-items:center;justify-content:center}
body.admin-mode .col-badge{display:flex}
.col-head{display:flex;align-items:flex-start;gap:5px;margin-bottom:11px;position:relative}
.col-title{font-family:var(--fd);font-size:1.05em;letter-spacing:.3px;color:var(--t0);flex:1;text-align:center;padding:0 22px;cursor:default;transition:color .2s}
body.admin-mode .col-title{cursor:pointer}
body.admin-mode .col-title:hover{color:var(--acc)}
.col-rin{flex:1;font-family:var(--fd);font-size:.95em;color:var(--t0);background:var(--bg3);border:2px solid var(--acc);border-radius:var(--rs);padding:3px 7px;text-align:center;outline:none;display:none;width:100%}
.col-rin.show{display:block}
.col-acts{display:none;position:absolute;right:0;top:0;flex-direction:column;gap:3px}
body.admin-mode .col-acts{display:flex}
.ca{border:none;border-radius:5px;width:22px;height:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.68em;transition:transform .12s}
.ca:hover{transform:scale(1.2)}
.ca-ren{background:rgba(0,196,255,.2);color:var(--acc2)}
.ca-del{background:rgba(255,77,109,.2);color:var(--acc3)}
.col-hint{display:none;text-align:center;font-size:.6em;color:var(--acc);opacity:.6;margin-bottom:7px}
body.admin-mode .col-hint{display:block}
.champs-list{display:flex;flex-wrap:wrap;gap:8px}
.champs-list.empty{justify-content:center;align-items:center;min-height:65px}
.champ-card{background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rm);padding:10px 8px 8px;flex:1 1 95px;max-width:145px;min-width:82px;text-decoration:none;color:inherit;display:flex;flex-direction:column;align-items:center;position:relative;cursor:pointer;transition:all .2s}
body.admin-mode .champ-card{cursor:grab}
.champ-card:hover{border-color:var(--acc);transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,229,160,.14)}
.champ-card.dragging{opacity:.4;border:2px dashed var(--acc)}
.champ-card img{width:100%;height:64px;object-fit:contain;border-radius:var(--rs);background:var(--bg4);padding:4px;border:1px solid var(--brd);margin-bottom:6px}
.champ-card h3{font-size:.7em;font-weight:500;text-align:center;color:var(--t1);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:1.9em;width:100%}
.champ-card:hover h3{color:var(--t0)}
.cord{display:none;position:absolute;top:4px;left:4px;background:rgba(0,229,160,.85);color:var(--bg0);border-radius:50%;width:15px;height:15px;font:700 .53em var(--fb);align-items:center;justify-content:center}
body.admin-mode .cord{display:flex}
.cdel{display:none;position:absolute;top:4px;right:4px;background:rgba(255,77,109,.85);color:#fff;border:none;border-radius:50%;width:17px;height:17px;font-size:.75em;cursor:pointer;align-items:center;justify-content:center;transition:all .15s}
.cdel:hover{background:var(--acc3);transform:scale(1.2)}
body.admin-mode .cdel{display:flex}
.cmvs{display:none;flex-direction:row;gap:2px;margin-top:4px;width:100%;justify-content:center}

.cmv:disabled{opacity:.2;cursor:default}
.cmv-l{background:rgba(0,196,255,.2);color:var(--acc2)}
.cmv-r{background:rgba(255,255,255,.08);color:var(--t1)}
.empty-msg{width:100%;text-align:center;font-size:.78em;color:var(--t2);padding:11px 0}
.acard{display:none;background:var(--bg2);border:1px solid var(--brd2);border-radius:var(--rl);padding:18px 20px;margin-bottom:11px;animation:fup .3s ease}
.acard.on{display:block}
.acard h2{font-family:var(--fd);font-size:1.15em;color:var(--acc);margin-bottom:11px;padding-bottom:7px;border-bottom:1px solid var(--brd)}
#orderList{list-style:none;margin-bottom:11px}
.oitem{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rm);padding:8px 11px;margin-bottom:5px}
.onum{background:var(--acc);color:var(--bg0);border-radius:50%;width:21px;height:21px;min-width:21px;display:flex;align-items:center;justify-content:center;font:700 .62em var(--fb)}
.oname{flex:1;font-weight:600;font-size:.86em;color:var(--t0)}
.ocount{font-size:.7em;color:var(--t2)}
.obtn-wrap{display:flex;gap:3px}
.obtn{border:none;border-radius:5px;width:25px;height:25px;cursor:pointer;font-size:.78em;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .12s}
.obtn:hover:not(:disabled){transform:scale(1.15)}
.obtn:disabled{opacity:.2;cursor:default}

.obtn-dn{background:rgba(255,255,255,.08);color:var(--t1)}
#adminTrigger{position:fixed;bottom:16px;right:16px;width:18px;height:18px;border-radius:50%;background:transparent;border:none;cursor:default;z-index:9999;opacity:0;transition:opacity .5s;padding:0}
#adminTrigger:hover{opacity:.2;background:#999;cursor:pointer}
#adminDot{position:fixed;bottom:20px;right:19px;width:8px;height:8px;border-radius:50%;background:var(--acc3);display:none;pointer-events:none;z-index:9997;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.6);opacity:1}}
body.admin-mode #adminDot{display:block}
#exitBtn{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--acc3);color:#fff;border:none;border-radius:var(--rxl);padding:10px 24px;font:700 .88em var(--fb);cursor:pointer;z-index:9998;white-space:nowrap;box-shadow:0 4px 14px rgba(255,77,109,.4);align-items:center;gap:6px;transition:all .2s}
#exitBtn:hover{transform:translateX(-50%) translateY(-2px)}

.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:8000;align-items:center;justify-content:center;padding:14px}
.modal-ov.on{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--brd2);border-radius:var(--rl);padding:20px;max-width:360px;width:100%;animation:fup .25s ease}
.modal-box h3{font-family:var(--fd);font-size:1.1em;color:var(--acc);margin-bottom:11px;letter-spacing:.3px}

@media(max-width:600px){#colsWrap{grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:9px}main{padding:0 9px 80px}}
@media(max-width:380px){#colsWrap{grid-template-columns:1fr 1fr}}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--bg1)}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:99px}

<body>
<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
<header>
  <div class="logo"><div class="logo-ico">⚽</div><span class="logo-txt">FUTEBOL LIVE</span></div>
  <div class="hbtns">
    <button class="hbtn" id="btnTema" onclick="toggleTema()">
      <svg id="temaIco" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
      <span id="btnTemaTxt">Tema</span>
    </button>
    <button class="hbtn on" id="btnAlertas" onclick="showTela('Alertas')">
      <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
      <span id="btnAlertasTxt">Alertas</span>
    </button>
    <button class="hbtn" id="btnGrade" onclick="showTela('Grade')">
      <svg viewBox="0 0 24 24"><path d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm6 0h5v-6h-5v6zm6 0h5v-6h-5v6zm-6-7h5V5h-5v6zm6-6v6h5V5h-5z"/></svg>
      <span>Campeonatos</span>
    </button>
  </div>
</header>
<main>
<!-- TELA ALERTAS -->
<div class="tela on" id="telaAlertas">
  <!-- PRÓXIMO JOGO -->
  <div id="proxCard"></div>
  <div class="card">
    <div class="card-head">
      <h2>🔔 MEUS ALERTAS DE JOGOS</h2>
      <p>Cole a tabela de jogos de um time — o sistema te avisa no dia do jogo.</p>
    </div>
    <div class="card-body">
      <div id="hojeBox"></div>
      <div class="tabs">
        <button class="tab on" id="tabAdicionar"  onclick="showTab('Adicionar')">➕ Adicionar</button>
        <button class="tab"   id="tabLista"        onclick="showTab('Lista')">📋 Lista</button>
        <button class="tab"   id="tabCalendario"   onclick="showTab('Calendario')">📅 Calendário</button>
        <button class="tab"   id="tabStats"        onclick="showTab('Stats')">📊 Stats</button>
        <button class="tab"   id="tabTimes"        onclick="showTab('Times')">⚽ Times</button>
      </div>
      <!-- TAB ADICIONAR -->
      <div class="tab-content on" id="tcAdicionar">
        <div class="import-box">
          <h4>🔗 Importar de URL</h4>
          <p style="font-size:.75em;color:var(--t2);margin-bottom:8px">Cole a URL de um site com a tabela de jogos — o sistema tenta extrair automaticamente.</p>
          <div style="display:flex;gap:7px">
            <input class="finput" type="url" id="inURL" placeholder="https://..." style="margin:0;flex:1">
            <button class="btn btn-blu" onclick="importarURL()" style="white-space:nowrap">🔍 Importar</button>
          </div>
          <div id="importStatus"></div>
        </div>
        <label class="flabel">Nome do time monitorado</label>
        <input class="finput" type="text" id="inTime" placeholder="Ex: Flamengo">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;flex-wrap:wrap;gap:5px">
          <label class="flabel" style="margin:0">Cole a tabela de jogos</label>
          <div style="display:flex;gap:5px">
            <button class="btn-sm" onclick="loadExemplo()">📋 Exemplo</button>
            <button class="btn-sm" onclick="document.getElementById('inTabela').value='';document.getElementById('preview').innerHTML=''">🗑 Limpar</button>
          </div>
        </div>
        <textarea class="finput" id="inTabela" placeholder="Cole aqui qualquer formato:&#10;&#10;22/03/2026 - Flamengo x Vasco - 16:00 - Brasileirão&#10;23/03 Flamengo vs Athletico 21h Copa do Brasil&#10;25/03 Flamengo x Corinthians 20:30&#10;&#10;Um jogo por linha."></textarea>
        <div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:3px">
          <button class="btn btn-acc" onclick="salvarAlertas()">🔔 Salvar Alertas</button>
          <button class="btn btn-grn" onclick="previewAlertas()">👁 Pré-visualizar</button>
        </div>
        <div id="preview" style="margin-top:12px"></div>
      </div>
      <!-- TAB LISTA -->
      <div class="tab-content" id="tcLista">
        <div class="filtros">
          <select class="fselect" id="fComp" onchange="renderLista()"><option value="">Todos campeonatos</option></select>
          <select class="fselect" id="fMes"  onchange="renderLista()">
            <option value="">Todos os meses</option>
            <option value="01">Janeiro</option><option value="02">Fevereiro</option><option value="03">Março</option>
            <option value="04">Abril</option><option value="05">Maio</option><option value="06">Junho</option>
            <option value="07">Julho</option><option value="08">Agosto</option><option value="09">Setembro</option>
            <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
          </select>
          <select class="fselect" id="fTime" onchange="renderLista()"><option value="">Todos os times</option></select>
          <button class="btn-sm" onclick="limparFiltros()">✕</button>
        </div>
        <div class="sort-btns">
          <span class="sort-lbl">Ordenar:</span>
          <button class="btn-sm on" id="sortData" onclick="setSort('data')">📅 Data</button>
          <button class="btn-sm" id="sortComp"    onclick="setSort('comp')">🏆 Campeonato</button>
          <button class="btn-sm" id="sortTime"    onclick="setSort('time')">⚽ Time</button>
        </div>
        <div id="listaWrap"></div>
      </div>
      <!-- TAB CALENDÁRIO -->
      <div class="tab-content" id="tcCalendario"><div id="calWrap"></div></div>
      <!-- TAB STATS -->
      <div class="tab-content" id="tcStats"><div id="statsWrap"></div></div>
      <!-- TAB TIMES -->
      <div class="tab-content" id="tcTimes"><div id="timesWrap"></div></div>
    </div>
  </div>
</div>
<!-- TELA GRADE -->
<div class="tela" id="telaGrade">
  <div id="adminPanels">
    <div class="acard" id="pLogin">
      <h2>MODO ADMIN</h2>
      <label class="flabel">Nome completo</label><input class="finput" type="text" id="aName" placeholder="Seu nome">
      <label class="flabel">Telefone</label><input class="finput" type="text" id="aPhone" placeholder="(XX) XXXXX-XXXX">
      <label class="flabel">E-mail</label><input class="finput" type="email" id="aEmail" placeholder="seu@email.com">
      <div id="msgLogin" class="msg"></div>
      <button class="btn btn-acc" onclick="enterAdmin()">🚀 Entrar</button>
    </div>
    <div class="acard" id="pChamp">
      <h2>➕ ADICIONAR CAMPEONATO</h2>
      <label class="flabel">Nome</label><input class="finput" type="text" id="cName" placeholder="Ex: Copa do Brasil">
      <label class="flabel">URL da Imagem</label><input class="finput" type="text" id="cImg" placeholder="https://...">
      <label class="flabel">URL do Campeonato</label><input class="finput" type="text" id="cLink" placeholder="https://...">
      <label class="flabel">Coluna</label><select class="fselect" id="cColSel"></select>
      <div id="msgChamp" class="msg"></div>
      <button class="btn btn-grn" onclick="addChamp()">✅ Adicionar</button>
    </div>
    <div class="acard" id="pCol">
      <h2>📂 NOVA COLUNA</h2>
      <label class="flabel">Nome</label><input class="finput" type="text" id="colName" placeholder="Ex: Campeonatos Estaduais">
      <div id="msgCol" class="msg"></div>
      <button class="btn btn-acc" onclick="addCol()">🗂 Criar</button>
    </div>
    <div class="acard" id="pOrder">
      <h2>🔢 ORDENAR COLUNAS</h2>
      <ul id="orderList"></ul>
      <button class="btn btn-ora" onclick="applyColOrder()">💾 Aplicar Ordem</button>
      <div id="msgOrder" class="msg"></div>
    </div>
  </div>
  <div id="colsWrap" style="margin-top:14px"></div>
</div>
</main>
<div class="modal-ov" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box"><h3 id="modalTitulo"></h3><div id="modalCorpo"></div></div>
</div>
<div id="toast"></div>
<button id="adminTrigger" aria-label="admin"></button>
<div id="adminDot"></div>
<button id="exitBtn" onclick="exitAdmin()">🚪 Sair do Admin</button>
<script>
/* ═══════ ESTADO ═══════ */
let cols=[], isAdmin=false, dragId=null, dragCol=null, sortMode='data';
const STORE='cf_v5', ASTORE='fl_alertas_v2';
let cdTimer=null;

/* ═══════ UTILS ═══════ */
function uid(){return 'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function getAlertas(){try{return JSON.parse(localStorage.getItem(ASTORE)||'[]')}catch{return[]}}
function saveAlertas(a){localStorage.setItem(ASTORE,JSON.stringify(a))}
function parseDateISO(iso){const[y,m,d]=iso.split('-');return new Date(+y,+m-1,+d)}
function isoHoje(){return new Date().toISOString().split('T')[0]}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2500)}
function showMsg(id,txt,type){const el=document.getElementById(id);if(!el)return;el.textContent=txt;el.className='msg '+type;clearTimeout(el._t);el._t=setTimeout(()=>{el.className='msg';el.textContent=''},4000)}
function escJs(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}

/* ═══════ CORES POR TIME ═══════ */
const TIME_CORES={
  'flamengo':     {cor1:'#e8002d',cor2:'#000',escudo:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Flamengo_escudo.svg/200px-Flamengo_escudo.svg.png'},
  'corinthians':  {cor1:'#000',cor2:'#fff',escudo:'https://upload.wikimedia.org/wikipedia/pt/thumb/c/c3/Sport_Club_Corinthians_Paulista.svg/200px-Sport_Club_Corinthians_Paulista.svg.png'},
  'palmeiras':    {cor1:'#006633',cor2:'#fff',escudo:'https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Palmeiras_logo.svg/200px-Palmeiras_logo.svg.png'},
  'são paulo':    {cor1:'#c0272d',cor2:'#fff',escudo:'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Brasao_do_Sao_Paulo_Futebol_Clube.svg/200px-Brasao_do_Sao_Paulo_Futebol_Clube.svg.png'},
  'fluminense':   {cor1:'#6d0038',cor2:'#6cac47',escudo:'https://upload.wikimedia.org/wikipedia/commons/thumb/9/97/Fluminense_FC_escudo.svg/200px-Fluminense_FC_escudo.svg.png'},
  'botafogo':     {cor1:'#000',cor2:'#fff',escudo:'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Botafogo_de_Futebol_e_Regatas_logo.svg/200px-Botafogo_de_Futebol_e_Regatas_logo.svg.png'},
  'vasco':        {cor1:'#000',cor2:'#fff',escudo:'https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Club_de_Regatas_Vasco_da_Gama_logo.svg/200px-Club_de_Regatas_Vasco_da_Gama_logo.svg.png'},
  'grêmio':       {cor1:'#003087',cor2:'#fbcf0b',escudo:'https://upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Gremio_Foot-Ball_Porto_Alegrense_logo.svg/200px-Gremio_Foot-Ball_Porto_Alegrense_logo.svg.png'},
  'internacional':{cor1:'#cf1020',cor2:'#fff',escudo:'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b0/Internacional_FC_logo.svg/200px-Internacional_FC_logo.svg.png'},
  'athletico-pr': {cor1:'#cc0000',cor2:'#000',escudo:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Athletico_Paranaense_logo.svg/200px-Athletico_Paranaense_logo.svg.png'},
};
function getCores(time){return TIME_CORES[(time||'').toLowerCase().trim()]||{cor1:'var(--acc)',cor2:'var(--bg0)',escudo:''}}

/* ═══════ NAVEGAÇÃO TELAS ═══════ */
function showTela(nome){
  document.querySelectorAll('.tela').forEach(t=>t.classList.remove('on'));
  document.getElementById('tela'+nome).classList.add('on');
  ['btnAlertas','btnGrade'].forEach(id=>{const b=document.getElementById(id);if(b)b.classList.remove('on')});
  if(nome==='Alertas'){document.getElementById('btnAlertas').classList.add('on');verificarHoje();atualizarBadge();renderProxCard()}
  if(nome==='Grade')document.getElementById('btnGrade').classList.add('on');
}

/* ═══════ TEMA ═══════ */
function toggleTema(){
  const l=document.body.classList.toggle('light');
  localStorage.setItem('fl_tema',l?'light':'dark');
  document.getElementById('btnTemaTxt').textContent=l?'☀ Claro':'🌙 Escuro';
  const ico=document.getElementById('temaIco');
  ico.innerHTML=l?'<path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2v2.95zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8z"/>':'<path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>';
}

/* ═══════ TABS ═══════ */
function showTab(nome){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('on'));
  document.getElementById('tab'+nome).classList.add('on');
  document.getElementById('tc'+nome).classList.add('on');
  if(nome==='Lista'){popularFiltros();renderLista()}
  if(nome==='Calendario')renderCal();
  if(nome==='Stats')renderStats();
  if(nome==='Times')renderTimes();
}

/* ═══════ PRÓXIMO JOGO CARD ═══════ */
function renderProxCard(){
  const wrap=document.getElementById('proxCard');
  const hoje=isoHoje();
  const prox=getAlertas().filter(j=>j.statusJogo!=='realizado'&&j.dataISO>=hoje).sort((a,b)=>a.dataISO.localeCompare(b.dataISO))[0];
  if(!prox){wrap.innerHTML='';return}
  const cores=getCores(prox.time);
  const escudo=cores.escudo?'<img src="'+cores.escudo+'" class="prox-escudo" onerror="this.style.display=\'none\'">':`<span style="font-size:1.6em">⚽</span>`;
  wrap.innerHTML='<div class="prox-card" style="border-color:'+cores.cor1+'40">'
    +'<div class="prox-label"><div class="prox-dot"></div> PRÓXIMO JOGO</div>'
    +'<div style="display:flex;align-items:center;gap:12px">'
    +escudo
    +'<div style="flex:1">'
    +'<div class="prox-jogo">'+(prox.jogoOriginal||prox.time+' × '+prox.adversario)+'</div>'
    +'<div class="prox-meta">'
    +'<span>📅 '+prox.data+'</span>'
    +(prox.hora?'<span class="prox-hora">🕐 '+prox.hora+'</span>':'')
    +(prox.competicao?'<span class="prox-comp">🏆 '+prox.competicao+'</span>':'')
    +'</div>'
    +'</div></div>'
    +'<div class="countdown-wrap" id="cdWrap"></div>'
    +'</div>';
  iniciarCountdown(prox);
}

function iniciarCountdown(jogo){
  clearInterval(cdTimer);
  const wrap=document.getElementById('cdWrap');
  if(!wrap)return;
  function tick(){
    const wrap2=document.getElementById('cdWrap');
    if(!wrap2){clearInterval(cdTimer);return}
    const[dd,mm,yy]=jogo.data.split('/');
    const[hh,min]=jogo.hora?jogo.hora.split(':').map(Number):[0,0];
    const alvo=new Date(+yy,+mm-1,+dd,hh,min||0,0);
    const diff=alvo-new Date();
    if(diff<=0){wrap2.innerHTML='<div style="font-size:.8em;color:var(--acc);font-weight:700">⚽ É hoje!</div>';clearInterval(cdTimer);return}
    const dias=Math.floor(diff/86400000),horas=Math.floor((diff%86400000)/3600000),mins=Math.floor((diff%3600000)/60000),segs=Math.floor((diff%60000)/1000);
    wrap2.innerHTML='<div class="cd-box"><div class="cd-num">'+String(dias).padStart(2,'0')+'</div><div class="cd-lbl">dias</div></div>'
      +'<div class="cd-box"><div class="cd-num">'+String(horas).padStart(2,'0')+'</div><div class="cd-lbl">horas</div></div>'
      +'<div class="cd-box"><div class="cd-num">'+String(mins).padStart(2,'0')+'</div><div class="cd-lbl">min</div></div>'

/* ═══════ NOTIFICAÇÕES ANTECIPADAS ═══════ */
function verificarNotifAntecipadas(){
  if(Notification.permission!=='granted')return;
  const agora=new Date();
  const amanha=new Date(agora);amanha.setDate(amanha.getDate()+1);
  const isoAmanha=amanha.toISOString().split('T')[0];
  // 1 dia antes
  getAlertas().filter(j=>j.dataISO===isoAmanha&&j.statusJogo!=='realizado').forEach(j=>{
    const key='notif_dia_'+j.id;
    if(!localStorage.getItem(key)){
      new Notification('⚽ Amanhã tem jogo! '+(j.jogoOriginal||j.time+' × '+j.adversario),{body:'📅 '+j.data+(j.hora?' às '+j.hora:'')+' · '+(j.competicao||'')});
      localStorage.setItem(key,'1');
    }
  });
  // 2 horas antes (se tem horário)
  getAlertas().filter(j=>j.hora&&j.statusJogo!=='realizado').forEach(j=>{
    try{
      const[dd,mm,yy]=j.data.split('/');
      const[hh,min]=j.hora.split(':').map(Number);
      const jdt=new Date(+yy,+mm-1,+dd,hh,min,0);
      const diff=(jdt-agora)/60000;
      if(diff>0&&diff<=120){
        const key='notif_2h_'+j.id;
        if(!localStorage.getItem(key)){
          new Notification('⏰ Jogo em '+Math.round(diff)+'min! '+(j.jogoOriginal||j.time+' × '+j.adversario),{body:j.hora+' · '+(j.competicao||'')});
          localStorage.setItem(key,'1');
        }
      }
    }catch{}
  });
}

/* ═══════ PARSER ═══════ */
function parsearLinhas(texto,timeBase){
  const jogos=[],vistos=new Set();
  const ano=new Date().getFullYear();
  texto.split('\n').map(l=>l.trim()).filter(l=>l.length>3).forEach(linha=>{
    try{
      let data=null,hora=null,adversario='',comp='';
      let m=linha.match(/(\d{1,2})[\/\-\.](\d{1,2})(?:[\/\-\.](\d{2,4}))?/);
      if(m){const d=+m[1],mo=+m[2],y=m[3]?(m[3].length===2?2000+ +m[3]:+m[3]):ano;if(d>=1&&d<=31&&mo>=1&&mo<=12)data=new Date(y,mo-1,d)}
      if(!data)return;
      m=linha.match(/(\d{1,2})[hH:](\d{0,2})(?:\s*(?:min|h))?(?:\s|$)/);
      if(!m)m=linha.match(/(\d{2}):(\d{2})/);
      if(m)hora=m[1].padStart(2,'0')+':'+(m[2]||'00').padStart(2,'0');
      let resto=linha.replace(/\d{1,2}[\/\-\.]\d{1,2}(?:[\/\-\.]\d{2,4})?/g,'').replace(/\d{1,2}[hH:]\d{0,2}/gi,'').replace(/[-–|·]/g,' ').replace(/\bx\b|\bvs\.?\b/gi,'|SEP|').trim();
      const partes=resto.split('|SEP|').map(p=>p.trim()).filter(Boolean);
      if(partes.length>=2){
        const tb=(timeBase||'').toLowerCase();
        adversario=tb&&partes[0].toLowerCase().includes(tb)?partes[1].split(/[|·]/)[0].trim():partes[0].split(/[|·]/)[0].trim();
      }else if(partes.length===1)adversario=partes[0].split(/[|·]/)[0].trim();
      adversario=adversario.replace(/^\d+\s*/,'').replace(/\s*\d+$/,'').trim().slice(0,40);
      const cmatch=linha.match(/brasileir[ãa]o|copa do brasil|libertadores|sul-americana|champions|série [abcd]|carioca|paulista|estadual|supercopa|recopa/i);
      if(cmatch)comp=cmatch[0];
      if(!adversario||adversario.length<2)return;
      const iso=data.getFullYear()+'-'+String(data.getMonth()+1).padStart(2,'0')+'-'+String(data.getDate()).padStart(2,'0');
      const key=iso+'|'+adversario.toLowerCase();
      if(vistos.has(key))return;
      vistos.add(key);
      jogos.push({id:uid(),time:timeBase||'',adversario,jogoOriginal:linha.trim(),data:data.toLocaleDateString('pt-BR'),dataISO:iso,hora:hora||'',competicao:comp,statusJogo:'futuro'});
    }catch{}
  });
  return jogos;
}

  if(!texto.trim()){prev.innerHTML='<p style="font-size:.82em;color:var(--t2)">Cole alguma tabela para pré-visualizar.</p>';return}

}

function salvarAlertas(){
  const texto=document.getElementById('inTabela').value.trim(),time=document.getElementById('inTime').value.trim();
  if(!texto||!time){showToast('⚠️ Preencha o time e cole a tabela');return}
  const novos=parsearLinhas(texto,time);
  if(!novos.length){showToast('⚠️ Nenhum jogo identificado');return}
  const exist=getAlertas(),vistos=new Set(exist.map(j=>j.dataISO+'|'+j.adversario.toLowerCase()));
  saveAlertas([...exist,...novos.filter(j=>!vistos.has(j.dataISO+'|'+j.adversario.toLowerCase()))]);
  atualizarBadge();renderProxCard();
  document.getElementById('inTabela').value='';document.getElementById('inTime').value='';document.getElementById('preview').innerHTML='';
  showToast('✅ '+novos.length+' jogo(s) salvo(s)!');
  if(Notification.permission==='default')Notification.requestPermission();
  setTimeout(()=>showTab('Lista'),600);
}

/* ═══════ IMPORTAR URL ═══════ */
async function importarURL(){
  const url=document.getElementById('inURL').value.trim();
  const st=document.getElementById('importStatus');
  if(!url){st.className='import-status err';st.textContent='Cole uma URL válida.';return}
  st.className='import-status loading';st.textContent='🔍 Buscando conteúdo da página...';
  try{
    // Usa proxy CORS público para buscar HTML da página
    const proxy='https://api.allorigins.win/get?url='+encodeURIComponent(url);
    const r=await fetch(proxy);
    const d=await r.json();
    const html=d.contents||'';
    // Extrai texto puro
    const tmp=document.createElement('div');tmp.innerHTML=html;
    const texto=tmp.innerText||tmp.textContent||'';
    // Tenta detectar o time pelo nome do time no campo
    const time=document.getElementById('inTime').value.trim()||'';
    // Filtra linhas que parecem ter jogos
    const linhas=texto.split('\n').filter(l=>{
      const lt=l.trim();
      return lt.length>5&&lt.length<200&&/\d{1,2}[\/\-\.]\d{1,2}/.test(lt)&&(/\bx\b|\bvs\.?\b/i.test(lt)||/\d{1,2}[hH:]\d{0,2}/.test(lt));
    });
    if(!linhas.length){st.className='import-status err';st.textContent='⚠️ Nenhum jogo encontrado na página. Tente copiar o texto manualmente.';return}
    document.getElementById('inTabela').value=linhas.slice(0,60).join('\n');
    st.className='import-status ok';st.textContent='✅ '+linhas.length+' linha(s) importada(s)! Revise abaixo e salve.';
    previewAlertas();
  }catch(e){st.className='import-status err';st.textContent='❌ Erro ao acessar a URL. Alguns sites bloqueiam acesso externo. Copie o texto manualmente.'}
}

/* ═══════ SEQUÊNCIA V/E/D ═══════ */
function getSequencia(time,jogosRealizados){
  const ult=jogosRealizados.filter(j=>j.time===time&&j.statusJogo==='realizado').sort((a,b)=>b.dataISO.localeCompare(a.dataISO)).slice(0,5).reverse();
  return ult.map(j=>{
    const m=(j.jogoOriginal||'').match(/(\d+)\s*[xX×]\s*(\d+)/);
    if(!m)return null;
    let g1=+m[1],g2=+m[2],gt,ga;
    const l=(j.jogoOriginal||'').toLowerCase(),tl=(time||'').toLowerCase();
    if(l.indexOf(tl)<=l.search(/\d/)){gt=g1;ga=g2}else{gt=g2;ga=g1}
    if(gt>ga)return'V';if(gt===ga)return'E';return'D';
  }).filter(Boolean);
}

  if(ft)todos=todos.filter(j=>j.time===ft);

  else if(sortMode==='comp')todos.sort((a,b)=>(a.competicao||'').localeCompare(b.competicao||''));

  const all=getAlertas();

        +'<span style="font-family:var(--fd);font-size:1.05em;color:'+cores.cor1+';letter-spacing:.3px">'+time+'</span>'
        +(seq.length?'<div class="seq">'+seq.map(r=>'<div class="seq-dot seq-'+r.toLowerCase()+'">'+r+'</div>').join('')+'</div>':'')
        +'</div>'
        +'<button onclick="remTodos(\''+escJs(time)+'\')" style="font-size:.68em;color:var(--acc3);background:none;border:1px solid rgba(255,77,109,.25);border-radius:20px;padding:3px 8px;cursor:pointer">🗑 Remover</button>'
        +'</div>';
      jogos.forEach(j=>html+=jogoCardHTML(j,hoje,cores));
      html+='</div>';
    }
  }else{
    todos.forEach(j=>{const cores=getCores(j.time);html+=jogoCardHTML(j,hoje,cores)});

function salvarPlacar(id){
  const val=document.getElementById('inputPlacar')?.value.trim();if(!val)return;
  const pf=val.replace(/[-–]/g,'x').replace(/\s/g,'');
  const arr=getAlertas().map(j=>{
    if(j.id!==id)return j;
    const nova=j.jogoOriginal?j.jogoOriginal.replace(/\d+\s*[xX×]\s*\d+/g,pf)||j.jogoOriginal+' '+pf:j.time+' '+pf+' '+j.adversario;
    return{...j,placar:pf,statusJogo:'realizado',jogoOriginal:nova};
  });
  saveAlertas(arr);closeModal();renderProxCard();renderLista();showToast('✅ Placar salvo!');
}

let calA=new Date().getFullYear(),calM=new Date().getMonth();
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DIAS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function renderCal(){
  const wrap=document.getElementById('calWrap');
  const todos=getAlertas();
  const hoje=new Date();
  const mapa={};todos.forEach(j=>{if(!mapa[j.dataISO])mapa[j.dataISO]=[];mapa[j.dataISO].push(j)});
  const prim=new Date(calA,calM,1);
  const ini=new Date(prim);ini.setDate(ini.getDate()-prim.getDay());
  let html='<div class="cal-nav">'
    +'<button class="cal-nbtn" onclick="navCal(-1)">← Anterior</button>'
    +'<span class="cal-mes">'+MESES[calM]+' '+calA+'</span>'
    +'<button class="cal-nbtn" onclick="navCal(1)">Próximo →</button>'
    +'</div><div class="cal-grid">'+DIAS.map(d=>'<div class="cal-hd">'+d+'</div>').join('');
  const cur=new Date(ini);
  for(let w=0;w<6;w++)for(let d=0;d<7;d++){
    const iso=cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
    const fora=cur.getMonth()!==calM,ehHj=cur.toDateString()===hoje.toDateString(),js=mapa[iso]||[];
    const cls='cal-cell'+(fora?' out':'')+(js.length?' tem':'')+(ehHj?' hj':'');
    const oc=js.length?'onclick="calDia(\''+iso+'\')"':'';
    html+='<div class="'+cls+'" '+oc+'><div class="cal-num">'+cur.getDate()+'</div>'+js.slice(0,2).map(j=>'<div class="cal-dot">● '+(j.competicao||j.adversario||'').slice(0,10)+'</div>').join('')+(js.length>2?'<div style="font-size:.55em;color:var(--t2)">+'+( js.length-2)+'</div>':'')+'</div>';
    cur.setDate(cur.getDate()+1);
  }
  html+='</div>';
  const mesJ=Object.entries(mapa).filter(([iso])=>iso.slice(0,7)===calA+'-'+String(calM+1).padStart(2,'0')).flatMap(([,js])=>js).sort((a,b)=>a.dataISO.localeCompare(b.dataISO));
  if(mesJ.length)html+='<div style="margin-top:14px;padding:12px;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rm)"><p style="font-size:.68em;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">'+mesJ.length+' jogo(s) em '+MESES[calM]+'</p>'
    +mesJ.map(j=>'<div style="display:flex;gap:9px;align-items:center;padding:5px 0;border-bottom:1px solid var(--brd);font-size:.76em"><span style="color:var(--acc2);font-weight:700;min-width:38px">'+j.data.slice(0,5)+'</span>'+(j.hora?'<span style="color:var(--gold);min-width:38px">'+j.hora+'</span>':'')+'<span style="flex:1;color:var(--t1)">'+(j.jogoOriginal||j.time+' × '+j.adversario)+'</span><span style="color:var(--t2);font-size:.85em">'+(j.competicao||'')+'</span></div>').join('')
    +'</div>';
  wrap.innerHTML=html;
}
function navCal(d){calM+=d;if(calM>11){calM=0;calA++}if(calM<0){calM=11;calA--}renderCal()}
function calDia(iso){
  const js=getAlertas().filter(j=>j.dataISO===iso);if(!js.length)return;
  const dt=parseDateISO(iso);

/* ═══════ ESTATÍSTICAS ═══════ */
function renderStats(){
  const wrap=document.getElementById('statsWrap');
  const todos=getAlertas();
  const times=[...new Set(todos.map(j=>j.time))];
  if(!times.length){wrap.innerHTML='<div style="text-align:center;padding:28px;color:var(--t2)">📊 Nenhum jogo cadastrado ainda.</div>';return}
  let html='';
  times.forEach(time=>{
    const jogos=todos.filter(j=>j.time===time&&j.statusJogo==='realizado');
    if(!jogos.length)return;
    const cores=getCores(time);
    let v=0,e=0,d=0,gf=0,gc=0;
    jogos.forEach(j=>{
      const m=(j.jogoOriginal||'').match(/(\d+)\s*[xX×]\s*(\d+)/);if(!m)return;
      let g1=+m[1],g2=+m[2],gt,ga;
      const l=(j.jogoOriginal||'').toLowerCase(),tl=(time||'').toLowerCase();
      if(l.indexOf(tl)<=l.search(/\d/)){gt=g1;ga=g2}else{gt=g2;ga=g1}
      gf+=gt;gc+=ga;if(gt>ga)v++;else if(gt===ga)e++;else d++;
    });
    const tot=v+e+d,ap=tot?Math.round(((v*3+e)/(tot*3))*100):0,sl=gf-gc;
    const seq=getSequencia(time,jogos);
    html+='<div style="margin-bottom:20px">'
      +'<div style="display:flex;align-items:center;gap:9px;margin-bottom:11px">'
      +(cores.escudo?'<img src="'+cores.escudo+'" style="width:28px;height:28px;object-fit:contain;border-radius:5px" onerror="this.style.display=\'none\'">':'')
      +'<span style="font-family:var(--fd);font-size:1.1em;color:'+cores.cor1+';letter-spacing:.3px">📊 '+time+'</span>'
      +(seq.length?'<div class="seq">'+seq.map(r=>'<div class="seq-dot seq-'+r.toLowerCase()+'">'+r+'</div>').join('')+'</div>':'')
      +'</div>'
      +'<div class="stats-grid">'
      +'<div class="stat-card"><div class="stat-num n-azul">'+tot+'</div><div class="stat-lbl">Jogos</div></div>'
      +'<div class="stat-card"><div class="stat-num n-verde">'+v+'</div><div class="stat-lbl">Vitórias</div></div>'
      +'<div class="stat-card"><div class="stat-num n-ouro">'+e+'</div><div class="stat-lbl">Empates</div></div>'
      +'<div class="stat-card"><div class="stat-num n-verm">'+d+'</div><div class="stat-lbl">Derrotas</div></div>'
      +'<div class="stat-card"><div class="stat-num n-verde">'+gf+'</div><div class="stat-lbl">Gols Pró</div></div>'
      +'<div class="stat-card"><div class="stat-num n-verm">'+gc+'</div><div class="stat-lbl">Gols Sofridos</div></div>'
      +'<div class="stat-card"><div class="stat-num '+(sl>=0?'n-verde':'n-verm')+'">'+(sl>=0?'+':'')+sl+'</div><div class="stat-lbl">Saldo</div></div>'
      +'<div class="stat-card"><div class="stat-num n-ouro">'+ap+'%</div><div class="stat-lbl">Aproveit.</div></div>'
      +'</div>'
      +'<div class="prog-wrap"><div class="prog-lbl"><span>Aproveitamento</span><span style="color:var(--acc)">'+ap+'%</span></div><div class="prog-bar"><div class="prog-fill" style="width:'+ap+'%;background:'+(ap>=60?'var(--acc)':ap>=40?'var(--gold)':'var(--acc3)')+'"></div></div></div>'
      +'</div>';
  });
  if(!html)html='<div style="text-align:center;padding:28px;color:var(--t2)">Nenhum jogo realizado ainda para estatísticas.</div>';
  wrap.innerHTML=html;
}

    {id:'d2',name:'Brasileirão Série B',image:'https://upload.wikimedia.org/wikipedia/pt/f/f4/Campeonato_Brasileiro_S%C3%A9rie_B_logo.png',link:'https://www.google.com/search?q=Brasileirão+Série+B'},
    {id:'d3',name:'Copa do Brasil',image:'https://upload.wikimedia.org/wikipedia/pt/8/8b/Copa_do_Brasil_logo.png',link:'https://www.google.com/search?q=Copa+do+Brasil'},
  ]},
  {key:'mundiais',name:'Campeonatos Mundiais',order:1,championships:[]},
];
function renderAll(){renderGrid();if(isAdmin){rebuildColSelect();renderOrderPanel()}}
function rebuildColSelect(){const s=document.getElementById('cColSel');const p=s.value;s.innerHTML='<option value="">— Selecione —</option>';cols.forEach(c=>{const o=document.createElement('option');o.value=c.key;o.textContent=c.name;s.appendChild(o)});if(cols.find(c=>c.key===p))s.value=p}
function renderGrid(){const w=document.getElementById('colsWrap');w.innerHTML='';if(!cols.length){w.innerHTML='<p style="text-align:center;color:var(--t2);padding:38px;grid-column:1/-1">Nenhuma coluna criada ainda.</p>';return}cols.forEach((c,i)=>w.appendChild(buildCol(c,i)))}
function buildCol(col,idx){
  const div=document.createElement('div');div.className='column';div.id='col-'+col.key;div.dataset.key=col.key;
  div.addEventListener('dragover',e=>{if(dragId){e.preventDefault();div.classList.add('drag-over')}});
  div.addEventListener('dragleave',e=>{if(!div.contains(e.relatedTarget))div.classList.remove('drag-over')});
  div.addEventListener('drop',onDrop);
  const badge=document.createElement('div');badge.className='col-badge';badge.textContent=idx+1;div.appendChild(badge);
  const head=document.createElement('div');head.className='col-head';
  const title=document.createElement('span');title.className='col-title';title.textContent=col.name;
  const rin=document.createElement('input');rin.type='text';rin.className='col-rin';rin.value=col.name;
  const acts=document.createElement('div');acts.className='col-acts';
  const bRen=document.createElement('button');bRen.className='ca ca-ren';bRen.innerHTML='✏️';bRen.title='Renomear';
  const bDel=document.createElement('button');bDel.className='ca ca-del';bDel.innerHTML='🗑️';bDel.title='Excluir';
  acts.append(bRen,bDel);head.append(title,rin,acts);
  const hint=document.createElement('div');hint.className='col-hint';hint.textContent='✏ clique no título para renomear';
  const startRen=()=>{if(!isAdmin)return;rin.value=col.name;title.style.display='none';rin.classList.add('show');setTimeout(()=>{rin.focus();rin.select()},10)};
  const commitRen=()=>{const n=rin.value.trim();title.style.display='';rin.classList.remove('show');if(n&&n!==col.name){col.name=n;title.textContent=n;scheduleSave();rebuildColSelect();renderOrderPanel()}};
  bRen.addEventListener('click',e=>{e.stopPropagation();startRen()});
  title.addEventListener('click',startRen);
  rin.addEventListener('blur',commitRen);
  rin.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();commitRen()}if(e.key==='Escape'){title.style.display='';rin.classList.remove('show')}});
  bDel.addEventListener('click',e=>{e.stopPropagation();if(!isAdmin)return;if(confirm('Excluir "'+col.name+'"?')){cols=cols.filter(c=>c.key!==col.key);scheduleSave();renderAll()}});
  div.append(head,hint);
  const list=document.createElement('div');list.className='champs-list';list.id='list-'+col.key;div.appendChild(list);
  fillCards(col,list);return div;
}
function fillCards(col,listEl){
  listEl.innerHTML='';listEl.className='champs-list';
  if(!col.championships.length){listEl.classList.add('empty');const p=document.createElement('p');p.className='empty-msg';p.textContent='Nenhum campeonato aqui.';listEl.appendChild(p);return}
  col.championships.forEach((ch,idx)=>{
    const card=document.createElement('a');card.href=ch.link||'#';card.target='_blank';card.className='champ-card';card.draggable=true;
    card.addEventListener('dragstart',e=>{if(!isAdmin){e.preventDefault();return}dragId=ch.id;dragCol=col.key;e.dataTransfer.effectAllowed='move';setTimeout(()=>card.classList.add('dragging'),0)});
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');dragId=null;dragCol=null;document.querySelectorAll('.drag-over').forEach(d=>d.classList.remove('drag-over'))});
    const num=document.createElement('div');num.className='cord';num.textContent=idx+1;card.appendChild(num);
    const del=document.createElement('button');del.className='cdel';del.innerHTML='&times;';del.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();delChamp(col.key,ch.id)});card.appendChild(del);
    const img=document.createElement('img');img.src=ch.image||'';img.alt=ch.name;img.loading='lazy';img.onerror=function(){this.src='https://placehold.co/80x80/1a2540/00e5a0?text=⚽'};card.appendChild(img);
    const h3=document.createElement('h3');h3.textContent=ch.name;card.appendChild(h3);
    const mvs=document.createElement('div');mvs.className='cmvs';
    const ml=document.createElement('button');ml.className='cmv cmv-l';ml.innerHTML='←';ml.disabled=idx===0;ml.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();if(idx===0)return;const a=col.championships;[a[idx-1],a[idx]]=[a[idx],a[idx-1]];scheduleSave();refreshList(col.key)});
    const mr=document.createElement('button');mr.className='cmv cmv-r';mr.innerHTML='→';mr.disabled=idx===col.championships.length-1;mr.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();if(idx===col.championships.length-1)return;const a=col.championships;[a[idx],a[idx+1]]=[a[idx+1],a[idx]];scheduleSave();refreshList(col.key)});
    mvs.append(ml,mr);card.appendChild(mvs);listEl.appendChild(card);
  });
}
function refreshList(k){const c=cols.find(x=>x.key===k);const l=document.getElementById('list-'+k);if(c&&l)fillCards(c,l)}
function onDrop(e){
  e.preventDefault();const tgt=e.currentTarget;tgt.classList.remove('drag-over');
  if(!isAdmin||!dragId)return;
  const tk=tgt.dataset.key,sk=dragCol;if(!tk||sk===tk)return;
  const sc=cols.find(c=>c.key===sk),tc=cols.find(c=>c.key===tk);if(!sc||!tc)return;
  const i=sc.championships.findIndex(c=>c.id===dragId);if(i===-1)return;
  const[m]=sc.championships.splice(i,1);tc.championships.push(m);
  scheduleSave();refreshList(sk);refreshList(tk);renderOrderPanel();
}
function renderOrderPanel(){
  const ul=document.getElementById('orderList');ul.innerHTML='';
  cols.forEach((col,idx)=>{
    const li=document.createElement('li');li.className='oitem';
    const n=document.createElement('div');n.className='onum';n.textContent=idx+1;
    const nm=document.createElement('span');nm.className='oname';nm.textContent=col.name;
    const ct=document.createElement('span');ct.className='ocount';ct.textContent=col.championships.length+' camp.';
    const bw=document.createElement('div');bw.className='obtn-wrap';
    const up=document.createElement('button');up.className='obtn obtn-up';up.innerHTML='↑';up.disabled=idx===0;up.addEventListener('click',()=>{if(idx===0)return;[cols[idx-1],cols[idx]]=[cols[idx],cols[idx-1]];renderOrderPanel()});
    const dn=document.createElement('button');dn.className='obtn obtn-dn';dn.innerHTML='↓';dn.disabled=idx===cols.length-1;dn.addEventListener('click',()=>{if(idx===cols.length-1)return;[cols[idx],cols[idx+1]]=[cols[idx+1],cols[idx]];renderOrderPanel()});
    bw.append(up,dn);li.append(n,nm,ct,bw);ul.appendChild(li);
  });
}
function applyColOrder(){scheduleSave();renderGrid();rebuildColSelect();showMsg('msgOrder','✅ Ordem aplicada!','ok')}
function addChamp(){
  const name=document.getElementById('cName').value.trim(),image=document.getElementById('cImg').value.trim(),link=document.getElementById('cLink').value.trim(),colKey=document.getElementById('cColSel').value;
  if(!name||!image||!link){showMsg('msgChamp','Preencha nome, imagem e link!','err');return}
  if(!colKey){showMsg('msgChamp','Selecione uma coluna!','err');return}
  const col=cols.find(c=>c.key===colKey);if(!col){showMsg('msgChamp','Coluna não encontrada.','err');return}
  col.championships.push({id:uid(),name,image,link});scheduleSave();refreshList(colKey);renderOrderPanel();
  showMsg('msgChamp','✅ "'+name+'" adicionado!','ok');
  document.getElementById('cName').value='';document.getElementById('cImg').value='';document.getElementById('cLink').value='';
}
function delChamp(colKey,champId){const col=cols.find(c=>c.key===colKey);if(!col)return;const i=col.championships.findIndex(c=>c.id===champId);if(i===-1)return;if(confirm('Excluir "'+col.championships[i].name+'"?')){col.championships.splice(i,1);scheduleSave();refreshList(colKey);renderOrderPanel()}}
function addCol(){const name=document.getElementById('colName').value.trim();if(!name){showMsg('msgCol','Digite um nome!','err');return}const key='c'+Date.now().toString(36);cols.push({key,name,order:cols.length,championships:[]});scheduleSave();renderAll();showMsg('msgCol','✅ Coluna "'+name+'" criada!','ok');document.getElementById('colName').value=''}
document.getElementById('adminTrigger').addEventListener('click',()=>{if(isAdmin)exitAdmin();else showPanel('pLogin')});
function showPanel(id){['pLogin','pChamp','pCol','pOrder'].forEach(p=>document.getElementById(p).classList.toggle('on',p===id))}
function enterAdmin(){const name=document.getElementById('aName').value.trim(),phone=document.getElementById('aPhone').value.trim(),email=document.getElementById('aEmail').value.trim();if(!name||!phone||!email){showMsg('msgLogin','Preencha todos os campos.','err');return}if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showMsg('msgLogin','E-mail inválido.','err');return}isAdmin=true;document.body.classList.add('admin-mode');['pChamp','pCol','pOrder'].forEach(id=>document.getElementById(id).classList.add('on'));document.getElementById('pLogin').classList.remove('on');renderAll();showMsg('msgChamp','Bem-vindo, '+name+'! ✓','ok')}
function exitAdmin(){isAdmin=false;document.body.classList.remove('admin-mode');['pLogin','pChamp','pCol','pOrder'].forEach(id=>document.getElementById(id).classList.remove('on'));document.getElementById('aName').value='';document.getElementById('aPhone').value='';document.getElementById('aEmail').value='';renderGrid()}

  if(localStorage.getItem('fl_tema')==='light'){document.body.classList.add('light');document.getElementById('btnTemaTxt').textContent='☀ Claro';document.getElementById('temaIco').innerHTML='<path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2v2.95zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8z"/>'}
  loadLocal();
  if(!cols.length)cols=DEFAULTS.map(c=>({...c,championships:c.championships.map(ch=>({...ch}))}));
  renderGrid();
  preloadFlamengo();
  verificarHoje();
  atualizarBadge();
  renderProxCard();
  if(Notification.permission==='default')Notification.requestPermission();
  setInterval(()=>{verificarHoje();atualizarBadge();renderProxCard();verificarNotifAntecipadas()},60*60*1000);
  verificarNotifAntecipadas();
});
