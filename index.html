<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campeonatos de Futebol</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* --- Variáveis CSS para Cores --- */
        :root {
            --primary-color: #1a73e8; /* Azul Google */
            --primary-dark: #0f48a1;
            --accent-color: #ffb300; /* Laranja/Amarelo vibrante */
            --accent-dark: #cc8c00;
            --success-color: #34a853; /* Verde Google */
            --success-dark: #2b8443;
            --danger-color: #ea4335; /* Vermelho Google */
            --danger-dark: #bb3328;
            --light-bg: rgba(240, 243, 245, 0.95); /* Fundo mais claro e suave */
            --dark-text: #202124;
            --light-text: #5f6368;
            --white-bg: rgba(255, 255, 255, 0.98); /* Fundo quase opaco para clareza */
            --border-color: #dadce0;
            --shadow-light: rgba(0, 0, 0, 0.05);
            --shadow-medium: rgba(0, 0, 0, 0.12);
            --shadow-heavy: rgba(0, 0, 0, 0.2);
        }

        /* --- Estilos Gerais --- */
        html, body {
            height: 100%;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        body {
            font-family: 'Roboto', sans-serif;
            text-align: center;
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ_nKWFUu62dYTds0SG-X4A1e5FEkHToj1pHA&s');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--dark-text);
            padding-bottom: 50px;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
        }

        h2 {
            font-family: 'Poppins', sans-serif;
            color: var(--primary-dark);
            margin-bottom: 25px;
            font-size: 2em;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 12px;
            position: relative; /* Para o efeito de linha */
            display: inline-block; /* Para a linha ficar no tamanho do texto */
        }

        h2::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -2px; /* Ajuste para sobrepor a borda */
            width: 100%;
            height: 4px; /* Mais grossa */
            background-color: var(--primary-color);
            border-radius: 2px;
            transform: scaleX(0.8); /* Linha um pouco menor que o título */
        }

        /* --- Cabeçalho e Botão de Modo Admin --- */
        header {
            background-color: var(--white-bg);
            padding: 18px 30px;
            box-shadow: 0 4px 15px var(--shadow-medium);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; /* Sticky header */
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(5px); /* Efeito de vidro */
        }

        header h1 {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            font-size: 2.2em;
            color: var(--primary-dark);
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.05);
        }

        #adminModeToggle {
            background-color: var(--accent-color);
            color: var(--dark-text);
            padding: 12px 25px;
            border: none;
            border-radius: 30px; /* Mais arredondado */
            cursor: pointer;
            font-size: 1.05em;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px var(--shadow-light);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #adminModeToggle:hover {
            background-color: var(--accent-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px var(--shadow-medium);
        }

        #adminModeToggle.active-admin {
            background-color: var(--danger-color);
            color: white; /* Mais contraste */
        }

        #adminModeToggle.active-admin:hover {
            background-color: var(--danger-dark);
            transform: translateY(-2px);
        }

        /* --- Formulários e Containers (Visibilidade controlada por JS) --- */
        .admin-section {
            display: none;
            background-color: var(--white-bg);
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 8px 25px var(--shadow-heavy);
            max-width: 750px;
            margin: 40px auto;
            text-align: left;
            border: 1px solid var(--border-color);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease-out, transform 0.5s ease-out;
        }

        .admin-section.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .admin-section p {
            color: var(--light-text);
            margin-bottom: 25px;
            font-size: 1.05em;
        }

        .form-container label, .add-column-container label {
            display: block;
            margin-bottom: 12px;
            font-weight: 600;
            color: var(--dark-text);
            font-size: 1.1em;
        }

        .form-container input[type="text"],
        .form-container select,
        .add-column-container input[type="text"],
        .form-container input[type="email"] {
            width: calc(100% - 28px); /* Padding ajustado */
            padding: 14px;
            margin-bottom: 22px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 1.05em;
            box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.03);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .form-container input[type="text"]:focus,
        .form-container select:focus,
        .add-column-container input[type="text"]:focus,
        .form-container input[type="email"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.2); /* Sombra de foco mais forte */
            outline: none;
        }

        .form-container button, .add-column-container button {
            background-color: var(--success-color);
            color: white;
            padding: 14px 30px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.15em;
            font-weight: 600;
            transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
            margin-right: 15px;
            box-shadow: 0 4px 10px var(--shadow-light);
        }

        .form-container button:hover, .add-column-container button:hover {
            background-color: var(--success-dark);
            transform: translateY(-3px);
            box-shadow: 0 6px 15px var(--shadow-medium);
        }

        .add-column-container button {
            background-color: var(--primary-color);
        }

        .add-column-container button:hover {
            background-color: var(--primary-dark);
        }

        /* Feedback visual */
        .form-message {
            margin-top: -15px;
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: 500;
            display: none; /* Oculto por padrão */
        }

        .form-message.success {
            background-color: rgba(52, 168, 83, 0.1);
            color: var(--success-dark);
            border: 1px solid var(--success-color);
            display: block;
        }

        .form-message.error {
            background-color: rgba(234, 67, 53, 0.1);
            color: var(--danger-dark);
            border: 1px solid var(--danger-color);
            display: block;
        }


        /* --- Container das Colunas --- */
        .columns-container {
            flex-grow: 1; /* Ocupa o espaço restante */
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1600px;
            margin: 40px auto;
            padding: 30px;
            background-color: var(--white-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px var(--shadow-heavy);
            min-height: 250px;
            border: 1px solid var(--border-color);
        }


        /* --- Estilo de Cada Coluna --- */
        .column {
            flex: 1;
            min-width: 290px;
            max-width: 420px;
            background-color: var(--light-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 6px 15px var(--shadow-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 220px;
            transition: all 0.3s ease;
        }

        .column.drag-over {
            background-color: rgba(26, 115, 232, 0.1);
            border: 2px dashed var(--primary-color);
            box-shadow: 0 0 0 6px rgba(26, 115, 232, 0.25);
            transform: scale(1.01);
        }

        /* --- Container dos Campeonatos (dentro de cada coluna) --- */
        .championships-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            width: 100%;
            margin-top: 20px;
            min-height: 160px;
            flex-grow: 1;
            padding-top: 10px; /* Espaçamento para o título */
        }


        /* --- Estilo de Cada Cartão de Campeonato --- */
        .championship-card {
            background-color: var(--white-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px;
            width: 200px; /* Ligeiramente maior */
            box-shadow: 0 4px 12px var(--shadow-light);
            transition: all 0.25s ease-in-out;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            cursor: grab;
        }

        .championship-card.dragging {
            opacity: 0.7;
            border: 2px dashed var(--primary-color);
            box-shadow: 0 0 0 5px rgba(26, 115, 232, 0.2);
            transform: scale(0.97);
        }

        .championship-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 22px var(--shadow-medium);
            border-color: var(--primary-color);
        }


        .championship-card img {
            max-width: 100%;
            height: 120px; /* Um pouco maior */
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 15px;
            background-color: #f8f8f8;
            padding: 8px;
            border: 1px solid #eee;
        }


        .championship-card h3 {
            font-size: 1.2em;
            margin: 0;
            color: var(--dark-text);
            text-align: center;
            min-height: 3em; /* Para 2 linhas de texto */
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            font-weight: 500;
        }


        /* --- Botão de Excluir (Visível apenas no modo admin) --- */
        .delete-btn {
            background-color: var(--danger-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px; /* Ligeiramente maior */
            height: 32px;
            font-size: 1.3em;
            line-height: 1;
            cursor: pointer;
            position: absolute;
            top: 10px; /* Ajustado */
            right: 10px; /* Ajustado */
            display: none;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.25);
        }


        .delete-btn:hover {
            background-color: var(--danger-dark);
            transform: scale(1.15);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.35);
        }


        body.admin-mode .delete-btn {
            display: flex;
        }


        /* --- Responsividade --- */
        @media (max-width: 1200px) {
            .columns-container {
                max-width: 1100px;
                padding: 25px;
                gap: 25px;
            }
            .column {
                min-width: 270px;
                max-width: 380px;
            }
            .championship-card {
                width: 180px;
            }
        }


        @media (max-width: 992px) {
            header h1 {
                font-size: 2em;
            }
            #adminModeToggle {
                padding: 10px 20px;
                font-size: 1em;
            }
            .admin-section {
                padding: 30px;
                margin: 30px auto;
                max-width: 650px;
            }
            .columns-container {
                padding: 20px;
                gap: 20px;
            }
            .column {
                min-width: 240px;
                max-width: 340px;
            }
            .championship-card {
                width: 160px;
            }
            .championship-card img {
                height: 100px;
            }
        }


        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                padding: 15px;
            }
            header h1 {
                margin-bottom: 15px;
                font-size: 1.8em;
            }
            #adminModeToggle {
                position: static;
                transform: none;
                margin-top: 10px;
                width: 100%; /* Ocupa largura total em telas menores */
                justify-content: center; /* Centraliza o texto e ícone */
            }
            h2 {
                font-size: 1.7em;
            }
            .admin-section {
                margin: 20px;
                padding: 25px;
            }
            .form-container input[type="text"],
            .form-container select,
            .add-column-container input[type="text"],
            .form-container input[type="email"] {
                width: calc(100% - 24px);
            }
            .form-container button, .add-column-container button {
                width: 100%;
                margin-right: 0;
                margin-bottom: 15px; /* Espaçamento entre botões */
            }
            .columns-container {
                flex-direction: column;
                align-items: center;
                padding: 15px;
                gap: 25px;
            }
            .column {
                width: 90%;
                min-width: unset;
                max-width: 90%;
                padding: 20px;
            }
            .championships-list {
                justify-content: space-around;
            }
            .championship-card {
                width: 48%; /* Duas colunas de cards por linha na lista */
                max-width: 200px;
                padding: 15px;
            }
            .championship-card img {
                height: 90px;
                margin-bottom: 10px;
            }
            .delete-btn {
                width: 28px;
                height: 28px;
                font-size: 1.1em;
            }
        }


        @media (max-width: 480px) {
            header h1 {
                font-size: 1.6em;
            }
            .admin-section {
                margin: 15px;
                padding: 20px;
            }
            h2 {
                font-size: 1.5em;
                margin-bottom: 20px;
                padding-bottom: 8px;
            }
            .form-container input[type="text"],
            .form-container select,
            .add-column-container input[type="text"],
            .form-container input[type="email"] {
                padding: 12px;
                margin-bottom: 18px;
            }
            .form-container button, .add-column-container button {
                padding: 12px 20px;
                font-size: 1em;
                margin-bottom: 10px;
            }
            .columns-container {
                padding: 10px;
                gap: 20px;
            }
            .column {
                width: 95%;
                padding: 15px;
            }
            .championship-card {
                width: 100%; /* Um card por linha em telas muito pequenas */
                max-width: 240px;
                margin: 0 auto; /* Centraliza o card */
            }
            .championship-card img {
                height: 80px;
            }
        }
    </style>
</head>

        <label for="columnSelect">Adicionar à Coluna:</label>

        <div id="addChampMessage" class="form-message"></div>

        <button onclick="addChampionship()">Adicionar Campeonato</button>

    <div id="addColumnSection" class="admin-section">

                        { id: Date.now() + 4, name: "Brasileirão Série D", image: "https://upload.wikimedia.org/wikipedia/pt/thumb/e/e6/Campeonato_Brasileiro_de_Futebol_de_2022_-_S%C3%A9rie_D.png/250px-Campeonato_Brasileiro_de_Futebol_de_2022_-_S%C3%A9rie_D.png", link: "https://www.google.com/search?q=classifica%C3%A7%C3%B5es+de+brasileir%C3%A3o+s%C3%A9rie+d&client=firefox-b-d&sca_esv=dcff718841928c00&biw=1920&bih=919&sxsrf=AE3TifMptF8k3b9lq1hPbhhi1QSTzg_ufw%3A1750269293115&ei=bf1SaLnlBp6v5OUPq7nnuQk&ved=0ahUKEwj5z-ibxfuNAxWeF7kGHavcOZcQ4dUDCBA&uact=5&oq=classifica%C3%A7%C3%B5es+de+brasileir%C3%A3o+s%C3%A9rie+d&gs_lp=Egxnd3Mtd2l6LXNlcnAiKWNsYXNzaWZpY2HDp8O1ZXMgZGUgYnJhc2lsZWlyw6NvIHPDqXJpZSBkMgoQIxiABBgnGIoFMg0QABiABBixAxgUGIcCMgUQABiABDIFEAAYgAQyBRAAGIAEMgUQABiABDIFEAAYgAQyBRAAGIAEMgUQABiABDIFEAAYgARIlRBQvQZYxQdwAXgAkAEAmAHCAaABlwSqAQMwLjO4AQPIAQD4AQGYAgOgAogDwgIKEAAYsAMY1gQYR8ICDRAAGIAEGLADGEMYigXCAhMQLhiABBiwAxhDGMgDGIoF2AEBwgIWEC4YgAQYsAMYQxjUAhjIAxiKBdgBAcICDRAAGIAEGLEDGEMYigXCAgoQABiABBhDGIoFwgIIEAAYgAQYsQOYAwCIBgGQBhS6BgYIARABGAiSBwMxLjKgB8QysgcDMC4yuAfmAsIHBzItMS4xLjHIBy0&sclient=gws-wiz-serp" }
                    ]
                },
                "mundiais": {
                    name: "Campeonatos Mundiais",
                    championships: []
                }
            },
            adminInfo: {
                name: "",
                phone: "",
                email: ""
            }
        };


        let isAdminMode = false;
        let draggedItem = null;


        // --- Funções de Manipulação de Dados (localStorage) ---
        function loadData() {
            const savedData = localStorage.getItem('championshipsData');
            if (savedData) {
                const loadedData = JSON.parse(savedData);
                if (loadedData.columns) {
                    for (const colKey in loadedData.columns) {
                        if (loadedData.columns[colKey].championships) {
                            loadedData.columns[colKey].championships = loadedData.columns[colKey].championships.map(champ => {
                                if (!champ.id) {
                                    champ.id = Date.now() + Math.random(); // Garante IDs únicos
                                }
                                return champ;
                            });
                        }
                    }
                }
                data = loadedData;
            }
        }


        function saveData() {
            localStorage.setItem('championshipsData', JSON.stringify(data));
        }

        // --- Funções de Feedback de Mensagem ---
        function showMessage(element, message, type) {
            element.textContent = message;
            element.className = `form-message ${type}`; // Adiciona tipo (success/error)
            setTimeout(() => {
                element.className = 'form-message'; // Oculta a mensagem após 3 segundos
                element.textContent = '';
            }, 3000);
        }

        // --- Funções de Renderização da Interface ---
        function renderColumns() {
            columnsContainer.innerHTML = '';
            columnSelect.innerHTML = '<option value="">Selecione uma coluna</option>'; // Opção padrão

            // Renderiza as opções do select para adicionar campeonato
            for (const key in data.columns) {
                if (data.columns.hasOwnProperty(key)) {
                    const column = data.columns[key];
                    const option = document.createElement('option');
                    option.value = key;
                    option.textContent = column.name;
                    columnSelect.appendChild(option);
                }
            }

            // Renderiza as colunas e seus campeonatos
            for (const key in data.columns) {
                if (data.columns.hasOwnProperty(key)) {
                    const column = data.columns[key];
                    const columnDiv = document.createElement('div');
                    columnDiv.classList.add('column');
                    columnDiv.id = `column-${key}`;


                    columnDiv.addEventListener('dragover', dragOver);
                    columnDiv.addEventListener('dragleave', dragLeave);
                    columnDiv.addEventListener('drop', drop);


                    const columnTitle = document.createElement('h2');
                    columnTitle.textContent = column.name;
                    columnDiv.appendChild(columnTitle);


                    const championshipsListDiv = document.createElement('div');
                    championshipsListDiv.classList.add('championships-list');
                    championshipsListDiv.id = `championships-list-${key}`;
                    columnDiv.appendChild(championshipsListDiv);


                    columnsContainer.appendChild(columnDiv);


                    renderChampionships(key);
                }
            }
        }


        function renderChampionships(columnKey) {
            const listContainer = document.getElementById(`championships-list-${columnKey}`);
            if (!listContainer) return;


            listContainer.innerHTML = '';


            data.columns[columnKey].championships.forEach((champ) => {
                const cardLink = document.createElement('a');
                cardLink.href = champ.link;
                cardLink.target = "_blank";
                cardLink.classList.add('championship-card');
                cardLink.draggable = true;
                cardLink.dataset.id = champ.id;
                cardLink.dataset.column = columnKey;


                cardLink.addEventListener('dragstart', dragStart);


                const champImage = document.createElement('img');
                champImage.src = champ.image;
                champImage.alt = champ.name;
                champImage.onerror = function() {
                    this.src = 'https://via.placeholder.com/120x120?text=Sem+Imagem'; // Imagem de fallback
                };
                cardLink.appendChild(champImage);


                const champName = document.createElement('h3');
                champName.textContent = champ.name;
                cardLink.appendChild(champName);


                const deleteButton = document.createElement('button');
                deleteButton.classList.add('delete-btn');
                deleteButton.textContent = 'X';
                deleteButton.title = `Excluir ${champ.name}`;
                deleteButton.onclick = (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    deleteChampionship(columnKey, champ.id);
                };
                cardLink.appendChild(deleteButton);


                listContainer.appendChild(cardLink);
            });
            updateAdminModeVisuals();
        }


        // --- Modo Admin ---
        adminModeToggle.addEventListener('click', () => {
            if (isAdminMode) {
                exitAdminMode();
            } else {
                showAdminLogin();
            }
        });


        function showAdminLogin() {
            // Oculta todas as seções admin antes de mostrar a de login
            addChampionshipSection.classList.remove('active');
            addColumnSection.classList.remove('active');
            adminLoginForm.classList.add('active'); // Mostra apenas o formulário de login

            adminModeToggle.textContent = 'Modo Admin Ativo';
            adminModeToggle.classList.remove('active-admin');
            document.body.classList.remove('admin-mode');
            updateAdminModeVisuals();
        }


        async function enterAdminMode() {
            const adminName = document.getElementById('adminName').value.trim();
            const adminPhone = document.getElementById('adminPhone').value.trim();
            const adminEmail = document.getElementById('adminEmail').value.trim();


            if (!adminName || !adminPhone || !adminEmail) {
                showMessage(loginMessage, 'Por favor, preencha todos os campos.', 'error');
                return;
            }

            if (!validateEmail(adminEmail)) {
                showMessage(loginMessage, 'Por favor, insira um e-mail válido.', 'error');
                return;
            }

            data.adminInfo.name = adminName;
            data.adminInfo.phone = adminPhone;
            data.adminInfo.email = adminEmail;
            saveData();


            // Envia dados para o Google Sheets (se a URL estiver configurada)
            const success = await sendAdminLoginToGoogleSheets(adminName, adminPhone, adminEmail);

            if(success) {
                isAdminMode = true;
                adminModeToggle.textContent = 'Sair do Modo Admin';
                adminModeToggle.classList.add('active-admin');
                document.body.classList.add('admin-mode');

                adminLoginForm.classList.remove('active');
                addChampionshipSection.classList.add('active');
                addColumnSection.classList.add('active');

                updateAdminModeVisuals();
                alert(`Bem-vindo, ${adminName}! Modo Admin ativado.`);
            } else {
                showMessage(loginMessage, 'Falha ao entrar no modo Admin. Tente novamente.', 'error');
            }
        }


        function exitAdminMode() {
            isAdminMode = false;
            adminModeToggle.textContent = 'Ativar Modo Admin';
            adminModeToggle.classList.remove('active-admin');
            document.body.classList.remove('admin-mode');
            

            adminLoginForm.classList.remove('active');
            addChampionshipSection.classList.remove('active');
            addColumnSection.classList.remove('active');
            

            document.getElementById('adminName').value = '';
            document.getElementById('adminPhone').value = '';
            document.getElementById('adminEmail').value = '';
            updateAdminModeVisuals();
            alert('Modo Admin desativado.');
        }


        function updateAdminModeVisuals() {
            const deleteButtons = document.querySelectorAll('.delete-btn');
            deleteButtons.forEach(btn => {
                btn.style.display = isAdminMode ? 'flex' : 'none';
            });
        }

        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(String(email).toLowerCase());
        }


        // Function to send data to Google Sheets
        async function sendAdminLoginToGoogleSheets(name, phone, email) {
            if (!GOOGLE_APPS_SCRIPT_URL || GOOGLE_APPS_SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE') {
                console.warn("URL do Google Apps Script não configurada. Os dados não serão enviados para o Google Sheets.");
                showMessage(loginMessage, 'Aviso: URL do Apps Script não configurada. Dados não serão salvos.', 'error');
                return true; // Permite entrar no modo admin mesmo sem o Apps Script
            }


            const formData = new FormData();
            formData.append('name', name);
            formData.append('phone', phone);
            formData.append('email', email);
            formData.append('timestamp', new Date().toLocaleString('pt-BR')); // Adiciona timestamp

            try {
                const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: formData,
                    mode: 'no-cors' // Necessário para CORS com Apps Script
                });
                // Como 'no-cors' não permite ler a resposta, assumimos sucesso se não houver erro de rede.
                // Idealmente, você configuraria o CORS no Apps Script para obter um feedback real.
                console.log('Tentativa de enviar dados de login do Admin para o Google Sheets.');
                showMessage(loginMessage, 'Dados de login enviados. Bem-vindo!', 'success');
                return true;
            } catch (error) {
                console.error('Erro de rede ou ao enviar dados para o Google Apps Script:', error);
                showMessage(loginMessage, 'Erro ao conectar com o servidor. Tente novamente.', 'error');
                return false;
            }
        }


        // --- Funções de Ação (Adicionar/Excluir) ---
        function addChampionship() {
            const name = document.getElementById('championshipName').value.trim();
            const image = document.getElementById('imageLink').value.trim();
            const link = document.getElementById('championshipLink').value.trim();
            const selectedColumnKey = columnSelect.value;


            if (!name || !image || !link || !selectedColumnKey) {
                showMessage(addChampMessage, 'Por favor, preencha todos os campos do campeonato!', 'error');
                return;
            }
            if (selectedColumnKey === "") {
                showMessage(addChampMessage, 'Por favor, selecione uma coluna.', 'error');
                return;
            }


            const newChampionship = {
                id: Date.now() + Math.random(),
                name,
                image,
                link
            };
            data.columns[selectedColumnKey].championships.push(newChampionship);
            saveData();
            renderChampionships(selectedColumnKey);

            showMessage(addChampMessage, `Campeonato "${name}" adicionado com sucesso!`, 'success');
            document.getElementById('championshipName').value = '';
            document.getElementById('imageLink').value = '';
            document.getElementById('championshipLink').value = '';
            columnSelect.value = ""; // Reseta o select
        }


        function deleteChampionship(columnKey, championshipId) {
            if (!isAdminMode) {
                alert('Você não está no modo administrador.');
                return;
            }


            const column = data.columns[columnKey];
            const champIndex = column.championships.findIndex(champ => champ.id === championshipId);


            if (champIndex > -1) {
                const champName = column.championships[champIndex].name;
                if (confirm(`Tem certeza que deseja excluir "${champName}"?`)) {
                    column.championships.splice(champIndex, 1);
                    saveData();
                    renderChampionships(columnKey);
                    alert(`Campeonato "${champName}" excluído.`);
                }
            }
        }


        function addColumn() {
            const newColumnName = document.getElementById('newColumnName').value.trim();


            if (!newColumnName) {
                showMessage(addColumnMessage, 'Por favor, digite um nome para a nova coluna!', 'error');
                return;
            }


            const columnKey = newColumnName.toLowerCase().replace(/\s+/g, '-'); // Gera uma chave simples para o objeto
            if (data.columns[columnKey]) {
                showMessage(addColumnMessage, 'Já existe uma coluna com esse nome ou um nome similar. Por favor, escolha outro.', 'error');
                return;
            }


            data.columns[columnKey] = {
                name: newColumnName,
                championships: []
            };
            saveData();
            renderColumns(); // Re-renderiza todas as colunas e atualiza o select dropdown

            showMessage(addColumnMessage, `Coluna "${newColumnName}" criada com sucesso!`, 'success');
            document.getElementById('newColumnName').value = ''; // Limpa o campo de input
        }


        // --- Funções Drag and Drop ---
        function dragStart(e) {
            if (!isAdminMode) { // Permite arrastar apenas no modo admin
                e.preventDefault();
                return;
            }
            draggedItem = e.target;
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', draggedItem.dataset.id); // Define o ID do item arrastado
            draggedItem.classList.add('dragging');
        }


        function dragOver(e) {
            e.preventDefault(); // Necessário para permitir o drop
            const columnDiv = e.target.closest('.column');
            if (isAdminMode && columnDiv && draggedItem && columnDiv.id !== `column-${draggedItem.dataset.column}`) {
                columnDiv.classList.add('drag-over');
            }
        }


        function dragLeave(e) {
            const columnDiv = e.target.closest('.column');
            if (columnDiv) {
                columnDiv.classList.remove('drag-over');
            }
        }


        function drop(e) {
            e.preventDefault();
            const targetColumnDiv = e.target.closest('.column');
            if (!isAdminMode || !targetColumnDiv || !draggedItem) {
                if (targetColumnDiv) targetColumnDiv.classList.remove('drag-over');
                if (draggedItem) draggedItem.classList.remove('dragging');
                return;
            }


            targetColumnDiv.classList.remove('drag-over');


            const draggedChampId = parseFloat(draggedItem.dataset.id);
            const sourceColumnKey = draggedItem.dataset.column;
            const targetColumnKey = targetColumnDiv.id.replace('column-', '');


            if (sourceColumnKey === targetColumnKey) {
                draggedItem.classList.remove('dragging'); // Remove dragging class even if not moved
                return; // Soltou na mesma coluna
            }


            // Encontra o campeonato na coluna de origem
            const sourceColumn = data.columns[sourceColumnKey];
            const draggedChampIndex = sourceColumn.championships.findIndex(champ => champ.id === draggedChampId);


            if (draggedChampIndex > -1) {
                const [movedChamp] = sourceColumn.championships.splice(draggedChampIndex, 1);
                movedChamp.id = Date.now() + Math.random(); // Gera novo ID para evitar conflitos se fosse persistido em DB sem cuidado
                data.columns[targetColumnKey].championships.push(movedChamp);

                saveData();
                renderChampionships(sourceColumnKey); // Renderiza a coluna de origem
                renderChampionships(targetColumnKey); // Renderiza a coluna de destino
                showMessage(addChampMessage, `Campeonato movido para "${data.columns[targetColumnKey].name}"!`, 'success');
            }


            draggedItem.classList.remove('dragging');
            draggedItem = null;
        }


        // --- Inicialização ---
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            renderColumns();
            // Inicialmente, as seções de admin devem estar ocultas
            adminLoginForm.classList.remove('active');
            addChampionshipSection.classList.remove('active');
            addColumnSection.classList.remove('active');
            updateAdminModeVisuals(); // Garante que os botões de exclusão estejam ocultos por padrão
        });
    </script>
</body>
