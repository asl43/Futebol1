<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campeonatos de Futebol</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════ RESET & VARS ═══════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
:root {
  --blue:    #1a73e8;
  --blue-d:  #0f48a1;
  --blue-l:  #e8f0fe;
  --green:   #34a853;
  --green-d: #2b8443;
  --red:     #ea4335;
  --red-d:   #bb3328;
  --yellow:  #f9ab00;
  --bg:      #f0f4f8;
  --card-bg: #ffffff;
  --col-bg:  #f8fafd;
  --txt:     #1a1a2e;
  --txt-s:   #5f6368;
  --border:  #dde3ea;
  --shadow:  rgba(0,0,0,.10);
  --shadow-h:rgba(0,0,0,.18);
  --radius:  14px;
  --col-w:   260px;   /* largura mínima de cada coluna */
}

html { height: 100% }
body {
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  background: #0d1b2a url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ_nKWFUu62dYTds0SG-X4A1e5FEkHToj1pHA&s') center/cover fixed;
  color: var(--txt);
  padding-bottom: 100px;
  display: flex;
  flex-direction: column;
}

/* ═══════════════════════════════ HEADER ═══════════════════════════════ */
header {
  background: rgba(255,255,255,.97);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 0 24px;
  height: 62px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: sticky; top: 0; z-index: 800;
  box-shadow: 0 2px 12px rgba(0,0,0,.12);
  border-bottom: 1px solid var(--border);
}
header h1 {
  font-family: 'Poppins', sans-serif;
  font-size: 1.6em; font-weight: 800;
  color: var(--blue-d);
  letter-spacing: -.5px;
}
@media(max-width:480px){ header h1 { font-size: 1.25em } }

/* ═══════════════════════════════ SYNC BAR ═══════════════════════════════ */
#syncBar {
  position: fixed; top: 70px; right: 14px;
  background: rgba(255,255,255,.95);
  border: 1px solid var(--border); border-radius: 20px;
  padding: 5px 12px 5px 8px;
  font-size: .73em; color: var(--txt-s);
  z-index: 700; display: flex; align-items: center; gap: 6px;
  box-shadow: 0 2px 8px var(--shadow);
  backdrop-filter: blur(4px);
}
.sdot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0 }
#syncBar.syncing { color: var(--blue) }   #syncBar.syncing .sdot { background: var(--blue);  animation: blink 1s infinite }
#syncBar.ok      { color: var(--green) }  #syncBar.ok      .sdot { background: var(--green) }
#syncBar.err     { color: var(--red) }    #syncBar.err     .sdot { background: var(--red) }
@keyframes blink { 0%,100%{opacity:.5}50%{opacity:1} }

/* ═══════════════════════════════ TRIGGER ADMIN ═══════════════════════════════ */
#adminTrigger {
  position: fixed; bottom: 16px; right: 16px;
  width: 18px; height: 18px; border-radius: 50%;
  background: transparent; border: none;
  cursor: default; z-index: 9999; opacity: 0;
  transition: opacity .5s; padding: 0;
}
#adminTrigger:hover { opacity: .25; background: #999; cursor: pointer }

#adminDot {
  position: fixed; bottom: 20px; right: 19px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--red); display: none;
  pointer-events: none; z-index: 9997;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{transform:scale(1);opacity:.6} 50%{transform:scale(1.6);opacity:1} }
body.admin-mode #adminDot { display: block }

/* ═══════════════════════════════ BOTÃO SAIR ═══════════════════════════════ */
#exitBtn {
  display: none;
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--red); color: #fff; border: none; border-radius: 30px;
  padding: 13px 30px; font: 700 .95em/1 'Poppins', sans-serif;
  cursor: pointer; z-index: 9998; white-space: nowrap;
  box-shadow: 0 4px 18px rgba(234,67,53,.5);
  transition: background .2s, transform .2s, box-shadow .2s;
  align-items: center; gap: 8px;
}
#exitBtn:hover { background: var(--red-d); transform: translateX(-50%) translateY(-2px) }
body.admin-mode #exitBtn { display: flex }

/* ═══════════════════════════════ PAINEL ADMIN (wrapper) ═══════════════════════════════ */
#adminPanels {
  width: 100%; max-width: 820px;
  margin: 0 auto;
  padding: 0 16px;
}

.acard {
  display: none;
  background: rgba(255,255,255,.97);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 6px 22px var(--shadow);
  padding: 28px 30px;
  margin-top: 22px;
  opacity: 0; transform: translateY(14px);
  transition: opacity .35s, transform .35s;
}
.acard.active { display: block; opacity: 1; transform: translateY(0) }
.acard h2 {
  font-family: 'Poppins', sans-serif; font-size: 1.2em; font-weight: 700;
  color: var(--blue-d); margin-bottom: 16px;
  padding-bottom: 10px; border-bottom: 2px solid var(--blue-l);
}
.acard p { font-size: .88em; color: var(--txt-s); margin-bottom: 16px; line-height: 1.6 }

label { display: block; margin-bottom: 5px; font-size: .88em; font-weight: 600; color: var(--txt) }
input[type=text], input[type=email], select {
  width: 100%; padding: 11px 13px; margin-bottom: 14px;
  border: 1.5px solid var(--border); border-radius: 10px;
  font: .95em 'Inter', sans-serif; background: #fff; color: var(--txt);
  transition: border-color .25s, box-shadow .25s;
}
input:focus, select:focus {
  border-color: var(--blue); outline: none;
  box-shadow: 0 0 0 3px rgba(26,115,232,.15);
}

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 11px 22px; border: none; border-radius: 25px; cursor: pointer;
  font: 700 .9em/1 'Poppins', sans-serif;
  transition: background .2s, transform .15s, box-shadow .2s;
  margin-top: 2px; margin-right: 6px;
}
.btn:hover { transform: translateY(-2px) }
.btn-blue   { background: var(--blue);  color: #fff; box-shadow: 0 3px 10px rgba(26,115,232,.35) }
.btn-blue:hover  { background: var(--blue-d) }
.btn-green  { background: var(--green); color: #fff; box-shadow: 0 3px 10px rgba(52,168,83,.35) }
.btn-green:hover { background: var(--green-d) }
.btn-orange { background: var(--yellow); color: #333; box-shadow: 0 3px 10px rgba(249,171,0,.35) }
.btn-orange:hover { background: #e09900 }

.msg {
  display: none; margin-top: 12px; padding: 9px 14px;
  border-radius: 8px; font-size: .85em; font-weight: 600;
}
.msg.ok  { display: block; background: #e6f4ea; color: #2b6e3b; border: 1px solid #a8d5b5 }
.msg.err { display: block; background: #fce8e6; color: #8b2315; border: 1px solid #f5c0bc }

/* ═══════════════════════════════ PAINEL ORDENAR COLUNAS ═══════════════════════════════ */
#orderList { list-style: none; margin: 0 0 14px }
.oitem {
  display: flex; align-items: center; gap: 10px;
  background: var(--col-bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 11px 14px; margin-bottom: 8px;
  transition: box-shadow .2s;
}
.oitem:hover { box-shadow: 0 3px 12px var(--shadow) }
.onum {
  background: var(--blue); color: #fff; border-radius: 50%;
  width: 24px; height: 24px; min-width: 24px;
  display: flex; align-items: center; justify-content: center;
  font: 700 .72em 'Poppins', sans-serif;
}
.oname  { flex: 1; font-weight: 600; font-size: .93em }
.ocount { font-size: .76em; color: var(--txt-s); white-space: nowrap }
.obtn-wrap { display: flex; gap: 3px }
.obtn {
  border: none; border-radius: 7px; width: 30px; height: 30px;
  cursor: pointer; font-size: .88em; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, transform .1s;
}
.obtn:hover:not(:disabled) { transform: scale(1.15) }
.obtn:disabled { opacity: .25; cursor: default }
.obtn-up   { background: var(--blue);  color: #fff }
.obtn-up:hover:not(:disabled) { background: var(--blue-d) }
.obtn-down { background: #5f6368; color: #fff }
.obtn-down:hover:not(:disabled) { background: #3c4043 }

/* ═══════════════════════════════ GRADE DE COLUNAS ═══════════════════════════════ */
#colsWrap {
  width: 100%;
  max-width: 1800px;
  margin: 24px auto 0;
  padding: 24px 20px;

  /* GRID RESPONSIVO — colunas automáticas pelo conteúdo */
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(var(--col-w), 1fr));
  gap: 20px;
  align-items: start;   /* ← evita colunas esticadas verticalmente */

  background: rgba(255,255,255,.94);
  border-radius: 18px;
  box-shadow: 0 8px 28px var(--shadow);
  border: 1px solid var(--border);
}

/* ═══════════════════════════════ COLUNA ═══════════════════════════════ */
.column {
  background: var(--col-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  position: relative;
  transition: border-color .2s, box-shadow .2s;
  /* SEM min-height fixo — cresce com o conteúdo */
}
.column.card-drag-over {
  border: 2px dashed var(--blue);
  background: var(--blue-l);
  box-shadow: 0 0 0 4px rgba(26,115,232,.15);
}

/* badge de posição */
.col-badge {
  display: none;
  position: absolute; top: 8px; left: 8px;
  background: var(--blue); color: #fff; border-radius: 50%;
  width: 20px; height: 20px;
  font: 700 .68em 'Poppins', sans-serif;
  align-items: center; justify-content: center;
  box-shadow: 0 2px 5px var(--shadow);
}
body.admin-mode .col-badge { display: flex }

/* cabeçalho da coluna */
.col-head {
  display: flex; align-items: flex-start; gap: 6px;
  margin-bottom: 12px; position: relative;
}
.col-title {
  font-family: 'Poppins', sans-serif;
  font-size: 1.05em; font-weight: 700;
  color: var(--blue-d); flex: 1; text-align: center;
  padding: 2px 28px 0;
  line-height: 1.3; word-break: break-word;
  cursor: default; transition: color .2s;
}
body.admin-mode .col-title { cursor: pointer }
body.admin-mode .col-title:hover { color: var(--blue) }

.col-rename-input {
  flex: 1; font-family: 'Poppins', sans-serif;
  font-size: 1em; font-weight: 700; color: var(--blue-d);
  border: 2px solid var(--blue); border-radius: 8px;
  padding: 4px 8px; text-align: center; outline: none;
  display: none; width: 100%; margin-bottom: 0;
}
.col-rename-input.show { display: block }

.col-acts { display: none; position: absolute; right: 0; top: 0; flex-direction: column; gap: 3px }
body.admin-mode .col-acts { display: flex }
.ca {
  border: none; border-radius: 6px; width: 24px; height: 24px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: .72em; transition: transform .12s, filter .12s;
}
.ca:hover { transform: scale(1.2); filter: brightness(.85) }
.ca-ren { background: var(--blue); color: #fff }
.ca-del { background: var(--red);  color: #fff }

.col-hint {
  display: none; text-align: center;
  font-size: .65em; color: var(--blue); opacity: .7; margin-bottom: 8px;
}
body.admin-mode .col-hint { display: block }

/* ═══════════════════════════════ LISTA DE CARDS ═══════════════════════════════ */
/*
  LAYOUT CHAVE:
  - flex column → um card por linha na coluna (sem sobreposição)
  - No modo grade (padrão), usamos flex-wrap + largura auto para preencher
  - Quando a coluna é estreita, cada card ocupa 100% da largura
  Isso resolve o "um por cima do outro" definitivamente.
*/
.champs-list {
  display: flex;
  flex-direction: row;   /* lado a lado quando cabe */
  flex-wrap: wrap;
  gap: 12px;
  justify-content: flex-start;
  align-items: flex-start;
  width: 100%;
}
.champs-list.empty-list {
  justify-content: center;
  align-items: center;
  min-height: 80px;
}

/* Card de campeonato */
.champ-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 10px 10px;
  /* largura fluida — preenche sem quebrar */
  flex: 1 1 110px;      /* cresce/encolhe, base 110px */
  max-width: 160px;
  min-width: 100px;
  text-decoration: none; color: inherit;
  display: flex; flex-direction: column; align-items: center;
  position: relative; cursor: pointer;
  box-shadow: 0 2px 8px var(--shadow);
  transition: transform .2s, box-shadow .2s, border-color .2s;
  user-select: none;
}
body.admin-mode .champ-card { cursor: grab }
body.admin-mode .champ-card:active { cursor: grabbing }
.champ-card:hover { transform: translateY(-4px); box-shadow: 0 8px 18px var(--shadow-h); border-color: var(--blue) }
.champ-card.dragging { opacity: .5; border: 2px dashed var(--blue); transform: scale(.96) }

.champ-card img {
  width: 100%; height: 80px;
  object-fit: contain; border-radius: 6px;
  background: #f5f5f5; padding: 4px;
  border: 1px solid #eee; margin-bottom: 8px;
}
.champ-card h3 {
  font-size: .78em; font-weight: 600; text-align: center;
  color: var(--txt); line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; min-height: 2.2em; width: 100%;
}

/* número de ordem dentro da coluna (admin) */
.card-order-num {
  display: none;
  position: absolute; top: 5px; left: 5px;
  background: rgba(26,115,232,.85); color: #fff;
  border-radius: 50%; width: 18px; height: 18px;
  font: 700 .6em 'Poppins', sans-serif;
  align-items: center; justify-content: center;
}
body.admin-mode .card-order-num { display: flex }

/* botão de excluir card */
.del-card {
  display: none; position: absolute; top: 5px; right: 5px;
  background: var(--red); color: #fff;
  border: none; border-radius: 50%; width: 20px; height: 20px;
  font-size: .85em; font-weight: 900; cursor: pointer; line-height: 1;
  align-items: center; justify-content: center;
  transition: background .15s, transform .15s;
  box-shadow: 0 1px 4px rgba(0,0,0,.25);
}
.del-card:hover { background: var(--red-d); transform: scale(1.2) }
body.admin-mode .del-card { display: flex }

/* Botões reordenar dentro da coluna (admin) */
.card-move-btns {
  display: none;
  flex-direction: row; gap: 3px;
  margin-top: 6px; width: 100%; justify-content: center;
}
body.admin-mode .card-move-btns { display: flex }
.cmv {
  border: none; border-radius: 5px; padding: 3px 7px;
  font-size: .68em; font-weight: 700; cursor: pointer;
  transition: background .12s, transform .1s;
}
.cmv:hover:not(:disabled) { transform: scale(1.12) }
.cmv:disabled { opacity: .25; cursor: default }
.cmv-l { background: var(--blue); color: #fff }
.cmv-l:hover:not(:disabled) { background: var(--blue-d) }
.cmv-r { background: #5f6368; color: #fff }
.cmv-r:hover:not(:disabled) { background: #3c4043 }

/* Placeholder de coluna vazia */
.empty-msg {
  width: 100%; text-align: center;
  font-size: .82em; color: var(--txt-s);
  padding: 14px 0;
}

/* ═══════════════════════════════ RESPONSIVO ═══════════════════════════════ */
/* Telas menores → colunas mais largas para caber melhor */
@media (max-width: 900px) {
  :root { --col-w: 200px }
  #colsWrap { padding: 16px; gap: 14px }
}
@media (max-width: 600px) {
  :root { --col-w: 160px }
  #colsWrap { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); padding: 12px; gap: 10px }
  .acard { padding: 20px 18px }
  .champ-card { max-width: none }
}
@media (max-width: 400px) {
  /* Em telas muito pequenas: 2 colunas fixas */
  #colsWrap { grid-template-columns: 1fr 1fr }
}
</style>
</head>
<body>

<header><h1>⚽ Campeonatos de Futebol</h1></header>

<!-- Trigger invisível + ponto de status -->
<button id="adminTrigger" aria-label="admin"></button>
<div id="adminDot"></div>
<div id="syncBar"><div class="sdot"></div><span id="syncTxt">Local</span></div>

<!-- ════ PAINÉIS ADMIN ════ -->
<div id="adminPanels">

  <!-- Login -->
  <div id="pLogin" class="acard">
    <h2>🔐 Modo Administrador</h2>
    <p>Preencha seus dados para gerenciar campeonatos. Os acessos são registrados.</p>
    <label>Nome completo</label>
    <input type="text"  id="aName"  placeholder="Seu nome">
    <label>Telefone</label>
    <input type="text"  id="aPhone" placeholder="(XX) XXXXX-XXXX">
    <label>E-mail</label>
    <input type="email" id="aEmail" placeholder="seu@email.com">
    <div id="msgLogin" class="msg"></div>
    <button class="btn btn-blue" onclick="enterAdmin()">🚀 Entrar</button>
  </div>

  <!-- Adicionar campeonato -->
  <div id="pChamp" class="acard">
    <h2>➕ Adicionar Campeonato</h2>
    <label>Nome do Campeonato</label>
    <input type="text" id="cName"  placeholder="Ex: Copa do Brasil">
    <label>URL da Imagem</label>
    <input type="text" id="cImg"   placeholder="https://...">
    <label>URL do Campeonato</label>
    <input type="text" id="cLink"  placeholder="https://...">
    <label>Coluna de destino</label>
    <select id="cColSel"></select>
    <div id="msgChamp" class="msg"></div>
    <button class="btn btn-green" onclick="addChamp()">✅ Adicionar</button>
  </div>

  <!-- Nova coluna -->
  <div id="pCol" class="acard">
    <h2>📂 Nova Coluna</h2>
    <label>Nome da Coluna</label>
    <input type="text" id="colName" placeholder="Ex: Campeonatos Estaduais">
    <div id="msgCol" class="msg"></div>
    <button class="btn btn-blue" onclick="addCol()">🗂 Criar Coluna</button>
  </div>

  <!-- Ordenar colunas -->
  <div id="pOrder" class="acard">
    <h2>🔢 Ordenar Colunas</h2>
    <p>Use ↑ ↓ para definir a sequência de exibição das colunas.</p>
    <ul id="orderList"></ul>
    <button class="btn btn-orange" onclick="applyColOrder()">💾 Aplicar Ordem</button>
    <div id="msgOrder" class="msg"></div>
  </div>

</div><!-- /adminPanels -->

<!-- ════ GRADE DE COLUNAS ════ -->
<div id="colsWrap"></div>

<!-- Botão sair -->
<button id="exitBtn" onclick="exitAdmin()">🚪 Sair do Modo Admin</button>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIGURAÇÃO
═══════════════════════════════════════════════════════════════ */
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzbsstKFIxJtAzCd61RicnIPxMG1gEKCTp9ViXxCfa9ZL8b3UPw2J0pSnVOawI5njpD/exec';
// ↑ Cole aqui a URL do seu Apps Script após implantar

/* ═══════════════════════════════════════════════════════════════
   ESTADO GLOBAL
   cols = Array<{
     key: string,       ← identificador único estável
     name: string,
     order: number,
     championships: Array<{id:string, name, image, link}>
   }>
═══════════════════════════════════════════════════════════════ */
let cols          = [];
let isAdmin       = false;
let dragChampId   = null;   // id (string) do card sendo arrastado
let dragChampCol  = null;   // key da coluna de origem
let syncTimer     = null;

/* ── ID único garantidamente string ── */
function uid() {
  return 'x' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

/* ═══════════════════════════════════════════════════════════════
   LOCAL STORAGE
═══════════════════════════════════════════════════════════════ */
const STORE = 'cf_v5';

function sanitize(raw) {
  if (!Array.isArray(raw)) return [];
  return raw
    .filter(c => c && c.key)
    .map((c, i) => ({
      key:   String(c.key),
      name:  String(c.name  || ''),
      order: isFinite(+c.order) ? +c.order : i,
      championships: Array.isArray(c.championships)
        ? c.championships.map(ch => ({
            id:    ch.id ? String(ch.id) : uid(),
            name:  String(ch.name  || ''),
            image: String(ch.image || ''),
            link:  String(ch.link  || '')
          }))
        : []
    }))
    .sort((a, b) => a.order - b.order);
}

function loadLocal() {
  try {
    const raw = localStorage.getItem(STORE);
    if (raw) { cols = sanitize(JSON.parse(raw)); return; }
    migrateOld();
  } catch(e) { console.warn('loadLocal:', e) }
}

function saveLocal() {
  cols.forEach((c, i) => c.order = i);
  localStorage.setItem(STORE, JSON.stringify(cols));
}

function scheduleSave() {
  saveLocal();
  clearTimeout(syncTimer);
  syncTimer = setTimeout(pushSheets, 1500);
}

/* Migra formatos antigos */
function migrateOld() {
  const keys = ['camp_v4','campeonatosData_v3','campeonatosData_v2','championshipsData'];
  for (const k of keys) {
    try {
      const raw = localStorage.getItem(k);
      if (!raw) continue;
      const p = JSON.parse(raw);
      // formato v4 (array)
      if (Array.isArray(p) && p.length) { cols = sanitize(p); saveLocal(); return; }
      // formato antigo (objeto com .columns)
      if (p?.columns) {
        let ord = 0; cols = [];
        for (const ck in p.columns) {
          const c = p.columns[ck];
          cols.push({
            key: String(ck), name: String(c.name || ck), order: ord++,
            championships: (Array.isArray(c.championships) ? c.championships : []).map(ch => ({
              id: String(ch.id || uid()), name: String(ch.name||''),
              image: String(ch.image||''), link: String(ch.link||'')
            }))
          });
        }
        if (cols.length) { saveLocal(); return; }
      }
    } catch(e) {}
  }
}

/* ═══════════════════════════════════════════════════════════════
   SYNC GOOGLE SHEETS (bidirecional)
═══════════════════════════════════════════════════════════════ */
function setSyncStatus(st, txt) {
  document.getElementById('syncBar').className = st;
  document.getElementById('syncTxt').textContent = txt;
}

async function pushSheets() {
  if (!SCRIPT_URL || SCRIPT_URL.includes('YOUR_')) return;
  setSyncStatus('syncing', 'Salvando...');
  const payload = {};
  cols.forEach((c, i) => { payload[c.key] = { name: c.name, order: i, championships: c.championships }; });
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'saveAll', payload: { columns: payload } })
    });
    setSyncStatus('ok', 'Salvo ✓ ' + new Date().toLocaleTimeString('pt-BR'));
  } catch(e) { setSyncStatus('err', 'Erro ao salvar') }
}

async function pullSheets() {
  if (!SCRIPT_URL || SCRIPT_URL.includes('YOUR_')) {
    setSyncStatus('err', 'Apps Script não configurado'); return false;
  }
  setSyncStatus('syncing', 'Carregando...');
  try {
    const r    = await fetch(SCRIPT_URL + '?action=getAll');
    const json = await r.json();
    if (json?.columns && Object.keys(json.columns).length) {
      const arr = [];
      for (const k in json.columns) {
        const c = json.columns[k];
        arr.push({
          key: String(k), name: String(c.name||k),
          order: isFinite(+c.order) ? +c.order : arr.length,
          championships: (Array.isArray(c.championships) ? c.championships : []).map(ch => ({
            id: String(ch.id||uid()), name: String(ch.name||''),
            image: String(ch.image||''), link: String(ch.link||'')
          }))
        });
      }
      cols = arr.sort((a, b) => a.order - b.order);
      saveLocal();
      setSyncStatus('ok', 'Sync ✓ ' + new Date().toLocaleTimeString('pt-BR'));
      return true;
    }
    setSyncStatus('ok', 'Local (Sheets vazio)');
    return false;
  } catch(e) { setSyncStatus('err', 'Falha no Sheets'); return false; }
}

/* ═══════════════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════════════ */
function renderAll() {
  renderGrid();
  if (isAdmin) { rebuildColSelect(); renderOrderPanel(); }
}

/* Select de colunas — sempre em sincronia com cols[] */
function rebuildColSelect() {
  const sel  = document.getElementById('cColSel');
  const prev = sel.value;
  sel.innerHTML = '<option value="">— Selecione a coluna —</option>';
  cols.forEach(c => {
    const o = document.createElement('option');
    o.value = c.key; o.textContent = c.name;
    sel.appendChild(o);
  });
  if (cols.find(c => c.key === prev)) sel.value = prev;
}

/* Grade principal */
function renderGrid() {
  const wrap = document.getElementById('colsWrap');
  wrap.innerHTML = '';
  if (!cols.length) {
    wrap.innerHTML = '<p style="text-align:center;color:#aaa;padding:40px;width:100%">Nenhuma coluna criada.</p>';
    return;
  }
  cols.forEach((col, idx) => wrap.appendChild(buildColEl(col, idx)));
}

function buildColEl(col, idx) {
  const div = document.createElement('div');
  div.className = 'column';
  div.id = 'col-' + col.key;
  div.dataset.key = col.key;

  /* Drop de cards entre colunas */
  div.addEventListener('dragover', e => {
    if (dragChampId !== null) { e.preventDefault(); div.classList.add('card-drag-over'); }
  });
  div.addEventListener('dragleave', e => {
    if (!div.contains(e.relatedTarget)) div.classList.remove('card-drag-over');
  });
  div.addEventListener('drop', onCardDrop);

  /* Badge posição */
  const badge = document.createElement('div');
  badge.className = 'col-badge';
  badge.textContent = idx + 1;
  div.appendChild(badge);

  /* Cabeçalho */
  const head = document.createElement('div');
  head.className = 'col-head';

  const titleEl = document.createElement('span');
  titleEl.className = 'col-title';
  titleEl.textContent = col.name;

  const renInput = document.createElement('input');
  renInput.type = 'text';
  renInput.className = 'col-rename-input';
  renInput.value = col.name;

  const acts = document.createElement('div');
  acts.className = 'col-acts';

  const btnRen = document.createElement('button');
  btnRen.className = 'ca ca-ren'; btnRen.innerHTML = '✏️'; btnRen.title = 'Renomear';

  const btnDel = document.createElement('button');
  btnDel.className = 'ca ca-del'; btnDel.innerHTML = '🗑️'; btnDel.title = 'Excluir coluna';

  acts.append(btnRen, btnDel);
  head.append(titleEl, renInput, acts);

  const hint = document.createElement('div');
  hint.className = 'col-hint';
  hint.textContent = '✏ clique no título para renomear';

  /* Renomear */
  const startRen = () => {
    if (!isAdmin) return;
    renInput.value = col.name;
    titleEl.style.display = 'none';
    renInput.classList.add('show');
    setTimeout(() => { renInput.focus(); renInput.select(); }, 10);
  };
  const commitRen = () => {
    const n = renInput.value.trim();
    titleEl.style.display = '';
    renInput.classList.remove('show');
    if (n && n !== col.name) {
      col.name = n;
      titleEl.textContent = n;
      scheduleSave();
      rebuildColSelect();
      renderOrderPanel();
    }
  };
  btnRen.addEventListener('click', e => { e.stopPropagation(); startRen(); });
  titleEl.addEventListener('click', startRen);
  renInput.addEventListener('blur', commitRen);
  renInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); commitRen(); }
    if (e.key === 'Escape') { titleEl.style.display = ''; renInput.classList.remove('show'); }
  });

  /* Excluir coluna */
  btnDel.addEventListener('click', e => {
    e.stopPropagation();
    if (!isAdmin) return;
    const n = col.championships.length;
    const ok = confirm(n
      ? `Excluir "${col.name}"?\nEla tem ${n} campeonato(s) que serão removidos!`
      : `Excluir a coluna "${col.name}"?`);
    if (ok) {
      cols = cols.filter(c => c.key !== col.key);
      scheduleSave();
      renderAll();
    }
  });

  div.append(head, hint);

  /* Lista de cards */
  const list = document.createElement('div');
  list.className = 'champs-list';
  list.id = 'list-' + col.key;
  div.appendChild(list);

  fillCards(col, list);
  return div;
}

/* ── Preenche cards de uma coluna ── */
function fillCards(col, listEl) {
  listEl.innerHTML = '';
  listEl.classList.remove('empty-list');

  if (!col.championships.length) {
    listEl.classList.add('empty-list');
    const p = document.createElement('p');
    p.className = 'empty-msg';
    p.textContent = 'Nenhum campeonato aqui.';
    listEl.appendChild(p);
    return;
  }

  col.championships.forEach((ch, idx) => {
    const card = document.createElement('a');
    card.href      = ch.link || '#';
    card.target    = '_blank';
    card.className = 'champ-card';
    card.draggable = true;
    card.dataset.id  = ch.id;
    card.dataset.col = col.key;

    /* drag de card */
    card.addEventListener('dragstart', e => {
      if (!isAdmin) { e.preventDefault(); return; }
      dragChampId  = ch.id;
      dragChampCol = col.key;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', ch.id);
      setTimeout(() => card.classList.add('dragging'), 0);
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      dragChampId = null; dragChampCol = null;
      document.querySelectorAll('.card-drag-over').forEach(d => d.classList.remove('card-drag-over'));
    });

    /* Número de ordem (visível no admin) */
    const numEl = document.createElement('div');
    numEl.className = 'card-order-num';
    numEl.textContent = idx + 1;
    card.appendChild(numEl);

    /* Botão excluir */
    const delBtn = document.createElement('button');
    delBtn.className = 'del-card';
    delBtn.innerHTML = '&times;';
    delBtn.title = 'Excluir';
    delBtn.addEventListener('click', e => {
      e.preventDefault(); e.stopPropagation();
      deleteChamp(col.key, ch.id);
    });
    card.appendChild(delBtn);

    /* Imagem */
    const img = document.createElement('img');
    img.src = ch.image || '';
    img.alt = ch.name;
    img.loading = 'lazy';
    img.onerror = function() { this.src = 'https://placehold.co/80x80/e8f0fe/1a73e8?text=⚽'; };
    card.appendChild(img);

    /* Nome */
    const h3 = document.createElement('h3');
    h3.textContent = ch.name;
    card.appendChild(h3);

    /* Botões mover dentro da coluna */
    const moveBtns = document.createElement('div');
    moveBtns.className = 'card-move-btns';

    const mvL = document.createElement('button');
    mvL.className = 'cmv cmv-l'; mvL.innerHTML = '← Antes'; mvL.disabled = idx === 0;
    mvL.addEventListener('click', e => {
      e.preventDefault(); e.stopPropagation();
      if (idx === 0) return;
      const ch2 = col.championships;
      [ch2[idx - 1], ch2[idx]] = [ch2[idx], ch2[idx - 1]];
      scheduleSave(); refreshList(col.key);
    });

    const mvR = document.createElement('button');
    mvR.className = 'cmv cmv-r'; mvR.innerHTML = 'Depois →'; mvR.disabled = idx === col.championships.length - 1;
    mvR.addEventListener('click', e => {
      e.preventDefault(); e.stopPropagation();
      if (idx === col.championships.length - 1) return;
      const ch2 = col.championships;
      [ch2[idx], ch2[idx + 1]] = [ch2[idx + 1], ch2[idx]];
      scheduleSave(); refreshList(col.key);
    });

    moveBtns.append(mvL, mvR);
    card.appendChild(moveBtns);

    listEl.appendChild(card);
  });
}

function refreshList(colKey) {
  const col  = cols.find(c => c.key === colKey);
  const list = document.getElementById('list-' + colKey);
  if (col && list) fillCards(col, list);
}

/* ── Painel de ordenação de colunas ── */
function renderOrderPanel() {
  const ul = document.getElementById('orderList');
  ul.innerHTML = '';
  cols.forEach((col, idx) => {
    const li = document.createElement('li');
    li.className = 'oitem';

    const num = document.createElement('div');
    num.className = 'onum'; num.textContent = idx + 1;

    const nm = document.createElement('span');
    nm.className = 'oname'; nm.textContent = col.name;

    const ct = document.createElement('span');
    ct.className = 'ocount'; ct.textContent = col.championships.length + ' camp.';

    const bw = document.createElement('div');
    bw.className = 'obtn-wrap';

    const up = document.createElement('button');
    up.className = 'obtn obtn-up'; up.innerHTML = '↑'; up.disabled = idx === 0;
    up.addEventListener('click', () => {
      if (idx === 0) return;
      [cols[idx - 1], cols[idx]] = [cols[idx], cols[idx - 1]];
      renderOrderPanel();
    });

    const dn = document.createElement('button');
    dn.className = 'obtn obtn-down'; dn.innerHTML = '↓'; dn.disabled = idx === cols.length - 1;
    dn.addEventListener('click', () => {
      if (idx === cols.length - 1) return;
      [cols[idx], cols[idx + 1]] = [cols[idx + 1], cols[idx]];
      renderOrderPanel();
    });

    bw.append(up, dn);
    li.append(num, nm, ct, bw);
    ul.appendChild(li);
  });
}

function applyColOrder() {
  scheduleSave();
  renderGrid();
  rebuildColSelect();
  showMsg('msgOrder', '✅ Ordem aplicada!', 'ok');
}

/* ═══════════════════════════════════════════════════════════════
   DROP DE CARDS (mover entre colunas via drag-and-drop)
═══════════════════════════════════════════════════════════════ */
function onCardDrop(e) {
  e.preventDefault();
  const tgtDiv = e.currentTarget;
  tgtDiv.classList.remove('card-drag-over');
  if (!isAdmin || dragChampId === null) return;

  const tgtKey = tgtDiv.dataset.key;
  const srcKey = dragChampCol;
  if (!tgtKey || srcKey === tgtKey) return;

  const srcCol = cols.find(c => c.key === srcKey);
  const tgtCol = cols.find(c => c.key === tgtKey);
  if (!srcCol || !tgtCol) return;

  /* Busca exata por string — sem coerção de tipo */
  const idx = srcCol.championships.findIndex(c => c.id === dragChampId);
  if (idx === -1) return;

  const [moved] = srcCol.championships.splice(idx, 1);
  tgtCol.championships.push(moved);
  scheduleSave();
  refreshList(srcKey);
  refreshList(tgtKey);
  renderOrderPanel();
}

/* ═══════════════════════════════════════════════════════════════
   CRUD
═══════════════════════════════════════════════════════════════ */
function addChamp() {
  const name   = document.getElementById('cName').value.trim();
  const image  = document.getElementById('cImg').value.trim();
  const link   = document.getElementById('cLink').value.trim();
  /* Lê o value no momento exato do clique — sem guardar em variável antecipada */
  const colKey = document.getElementById('cColSel').value;

  if (!name || !image || !link) { showMsg('msgChamp','Preencha nome, imagem e link!','err'); return; }
  if (!colKey)                  { showMsg('msgChamp','Selecione uma coluna!','err');           return; }

  const col = cols.find(c => c.key === colKey);
  if (!col) { showMsg('msgChamp','Coluna não encontrada. Recarregue a página.','err'); return; }

  col.championships.push({ id: uid(), name, image, link });
  scheduleSave();

  /* Atualiza apenas a lista afetada — NÃO chama renderAll() para não dessincronizar o select */
  refreshList(colKey);
  renderOrderPanel();

  showMsg('msgChamp', `✅ "${name}" adicionado em "${col.name}"!`, 'ok');
  document.getElementById('cName').value  = '';
  document.getElementById('cImg').value   = '';
  document.getElementById('cLink').value  = '';
  /* Mantém coluna selecionada para facilitar adições em série */
}

function deleteChamp(colKey, champId) {
  if (!isAdmin) return;
  const col = cols.find(c => c.key === colKey);
  if (!col) return;
  const idx = col.championships.findIndex(c => c.id === champId);
  if (idx === -1) return;
  if (confirm(`Excluir "${col.championships[idx].name}"?`)) {
    col.championships.splice(idx, 1);
    scheduleSave();
    refreshList(colKey);
    renderOrderPanel();
  }
}

function addCol() {
  const name = document.getElementById('colName').value.trim();
  if (!name) { showMsg('msgCol','Digite um nome para a coluna!','err'); return; }
  const key = 'c' + Date.now().toString(36);
  cols.push({ key, name, order: cols.length, championships: [] });
  scheduleSave();
  renderAll();
  showMsg('msgCol', `✅ Coluna "${name}" criada!`, 'ok');
  document.getElementById('colName').value = '';
}

/* ═══════════════════════════════════════════════════════════════
   MODO ADMIN
═══════════════════════════════════════════════════════════════ */
document.getElementById('adminTrigger').addEventListener('click', () => {
  if (isAdmin) exitAdmin(); else showPanel('pLogin');
});

function showPanel(id) {
  ['pLogin','pChamp','pCol','pOrder'].forEach(p => {
    document.getElementById(p).classList.toggle('active', p === id);
  });
}

async function enterAdmin() {
  const name  = document.getElementById('aName').value.trim();
  const phone = document.getElementById('aPhone').value.trim();
  const email = document.getElementById('aEmail').value.trim();

  if (!name || !phone || !email)               { showMsg('msgLogin','Preencha todos os campos.','err'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showMsg('msgLogin','E-mail inválido.','err'); return; }

  if (SCRIPT_URL && !SCRIPT_URL.includes('YOUR_')) {
    try {
      await fetch(SCRIPT_URL, {
        method:'POST', mode:'no-cors',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ action:'logAdmin', name, phone, email, timestamp: new Date().toLocaleString('pt-BR') })
      });
    } catch(e) {}
  }

  isAdmin = true;
  document.body.classList.add('admin-mode');

  /* Mostra todos os painéis admin */
  ['pChamp','pCol','pOrder'].forEach(id => document.getElementById(id).classList.add('active'));
  document.getElementById('pLogin').classList.remove('active');

  /* Carrega dados frescos do Sheets */
  const loaded = await pullSheets();
  renderAll();

  showMsg('msgChamp', `Bem-vindo, ${name}! ✓`, 'ok');
}

function exitAdmin() {
  isAdmin = false;
  document.body.classList.remove('admin-mode');
  ['pLogin','pChamp','pCol','pOrder'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById('aName').value  = '';
  document.getElementById('aPhone').value = '';
  document.getElementById('aEmail').value = '';
  renderGrid();
}

/* ═══════════════════════════════════════════════════════════════
   UTILITÁRIO
═══════════════════════════════════════════════════════════════ */
function showMsg(id, txt, type) {
  const el = document.getElementById(id);
  el.textContent = txt;
  el.className   = 'msg ' + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = 'msg'; el.textContent = ''; }, 4500);
}
