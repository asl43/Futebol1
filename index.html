<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campeonatos de Futebol</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:  #1a73e8;
            --primary-d:#0f48a1;
            --green:    #34a853;
            --green-d:  #2b8443;
            --red:      #ea4335;
            --red-d:    #bb3328;
            --yellow:   #ffb300;
            --bg-light: rgba(240,243,245,.96);
            --text:     #202124;
            --text-sub: #5f6368;
            --white:    rgba(255,255,255,.99);
            --border:   #dadce0;
            --sh-sm:    rgba(0,0,0,.05);
            --sh-md:    rgba(0,0,0,.12);
            --sh-lg:    rgba(0,0,0,.2);
        }
        *,*::before,*::after { box-sizing: border-box }
        html, body { height: 100%; min-height: 100vh; margin: 0; padding: 0; overflow-x: hidden }
        body {
            font-family: 'Roboto', sans-serif;
            background: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ_nKWFUu62dYTds0SG-X4A1e5FEkHToj1pHA&s') center/cover fixed;
            color: var(--text); padding-bottom: 90px;
            display: flex; flex-direction: column;
        }

        /* ════════════════ HEADER ════════════════ */
        header {
            background: var(--white); padding: 16px 28px;
            box-shadow: 0 4px 14px var(--sh-md);
            display: flex; justify-content: center; align-items: center;
            position: sticky; top: 0; z-index: 900; backdrop-filter: blur(6px);
        }
        header h1 { font-family: 'Poppins', sans-serif; margin: 0; font-size: 2em; color: var(--primary-d) }

        /* ════════════════ TRIGGER ADMIN INVISÍVEL ════════════════ */
        #adminTrigger {
            position: fixed; bottom: 15px; right: 15px;
            width: 16px; height: 16px; background: transparent; border: none;
            border-radius: 50%; cursor: default; z-index: 9999; opacity: 0;
            transition: opacity .4s; padding: 0; font-size: 0;
        }
        #adminTrigger:hover { opacity: .2; background: var(--text-sub); cursor: pointer }

        /* ════════════════ PONTO PULSANTE ════════════════ */
        #adminDot {
            position: fixed; bottom: 19px; right: 18px; width: 8px; height: 8px;
            background: var(--red); border-radius: 50%; display: none;
            z-index: 9997; pointer-events: none; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{ opacity:.6; transform:scale(1) } 50%{ opacity:1; transform:scale(1.5) } }
        body.admin-mode #adminDot { display: block }

        /* ════════════════ BOTÃO SAIR ════════════════ */
        #exitBtn {
            display: none; position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
            background: var(--red); color: #fff; border: none; border-radius: 30px;
            padding: 12px 28px; font: 700 1em/1 'Poppins',sans-serif;
            cursor: pointer; z-index: 9998; box-shadow: 0 4px 16px rgba(234,67,53,.45);
            transition: background .2s, transform .2s, box-shadow .2s;
            align-items: center; gap: 8px; white-space: nowrap;
        }
        #exitBtn:hover { background: var(--red-d); transform: translateX(-50%) translateY(-2px); box-shadow: 0 6px 20px rgba(234,67,53,.55) }
        body.admin-mode #exitBtn { display: flex }

        /* ════════════════ SYNC BAR ════════════════ */
        #syncBar {
            position: fixed; top: 68px; right: 12px; background: var(--white);
            border: 1px solid var(--border); border-radius: 10px; padding: 6px 12px;
            font-size: .76em; color: var(--text-sub); z-index: 880;
            box-shadow: 0 2px 8px var(--sh-sm); display: flex; align-items: center; gap: 6px;
        }
        #syncBar .sdot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0 }
        #syncBar.syncing { color: var(--primary) } #syncBar.syncing .sdot { background: var(--primary); animation: pulse 1s infinite }
        #syncBar.ok  { color: var(--green) } #syncBar.ok  .sdot { background: var(--green) }
        #syncBar.err { color: var(--red)   } #syncBar.err .sdot { background: var(--red)   }

        /* ════════════════ ADMIN SECTIONS ════════════════ */
        .admin-section {
            display: none; background: var(--white); padding: 32px; border-radius: 15px;
            box-shadow: 0 8px 24px var(--sh-lg); max-width: 740px; margin: 36px auto;
            text-align: left; border: 1px solid var(--border);
            opacity: 0; transform: translateY(18px); transition: opacity .4s, transform .4s;
        }
        .admin-section.active { display: block; opacity: 1; transform: translateY(0) }
        .admin-section h2 {
            font-family: 'Poppins', sans-serif; color: var(--primary-d);
            margin: 0 0 14px; font-size: 1.45em;
            border-bottom: 2px solid var(--primary); padding-bottom: 9px;
        }
        .admin-section p { color: var(--text-sub); margin-bottom: 16px; font-size: .95em }

        label { display: block; margin-bottom: 6px; font-weight: 600; color: var(--text); font-size: .95em }
        input[type=text], input[type=email], select {
            width: 100%; padding: 12px 14px; margin-bottom: 16px;
            border: 1px solid var(--border); border-radius: 10px;
            font: 1em 'Roboto',sans-serif; background: #fff;
            transition: border-color .3s, box-shadow .3s;
        }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,115,232,.2); outline: none }

        .btn {
            padding: 12px 24px; border: none; border-radius: 30px; cursor: pointer;
            font: 700 .97em/1 'Poppins',sans-serif;
            transition: background .2s, transform .2s; margin-right: 8px; margin-top: 4px;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-green  { background: var(--green);   color: #fff } .btn-green:hover  { background: var(--green-d);   transform: translateY(-2px) }
        .btn-blue   { background: var(--primary);  color: #fff } .btn-blue:hover   { background: var(--primary-d); transform: translateY(-2px) }
        .btn-yellow { background: var(--yellow);   color: #222 } .btn-yellow:hover { background: #e0a000;          transform: translateY(-2px) }

        .msg { margin: 4px 0 12px; padding: 10px 14px; border-radius: 8px; font-size: .88em; font-weight: 500; display: none }
        .msg.ok  { background: rgba(52,168,83,.1);  color: var(--green-d); border: 1px solid var(--green); display: block }
        .msg.err { background: rgba(234,67,53,.1);  color: var(--red-d);   border: 1px solid var(--red);   display: block }

        /* ════════════════ PAINEL DE ORDENAÇÃO ════════════════ */
        #orderPanel {
            display: none; background: var(--white); padding: 32px; border-radius: 15px;
            box-shadow: 0 8px 24px var(--sh-lg); max-width: 740px; margin: 0 auto 36px;
            text-align: left; border: 1px solid var(--border);
            opacity: 0; transform: translateY(18px); transition: opacity .4s, transform .4s;
        }
        #orderPanel.active { display: block; opacity: 1; transform: translateY(0) }
        #orderPanel h2 {
            font-family: 'Poppins', sans-serif; color: var(--primary-d);
            margin: 0 0 6px; font-size: 1.45em;
            border-bottom: 2px solid var(--primary); padding-bottom: 9px;
        }
        #orderPanel p { color: var(--text-sub); margin-bottom: 16px; font-size: .92em }

        #orderList { list-style: none; padding: 0; margin: 0 0 16px }
        #orderList li {
            display: flex; align-items: center; gap: 12px;
            background: var(--bg-light); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
            transition: box-shadow .2s, transform .15s;
        }
        #orderList li:hover { box-shadow: 0 4px 12px var(--sh-md) }

        .order-num {
            background: var(--primary); color: #fff;
            border-radius: 50%; width: 26px; height: 26px; min-width: 26px;
            display: flex; align-items: center; justify-content: center;
            font: 700 .8em/1 'Poppins',sans-serif;
        }
        .order-name { flex: 1; font-weight: 600; font-family: 'Poppins',sans-serif; font-size: .97em; color: var(--text) }
        .order-champ-count { font-size: .78em; color: var(--text-sub); white-space: nowrap }

        .order-btn-group { display: flex; gap: 4px }
        .order-btn {
            border: none; border-radius: 8px; width: 32px; height: 32px;
            cursor: pointer; font-size: .9em; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            transition: background .15s, transform .15s;
        }
        .order-btn:hover { transform: scale(1.12) }
        .order-btn:disabled { opacity: .28; cursor: default; transform: none }
        .order-up   { background: var(--primary); color: #fff }
        .order-up:hover:not(:disabled)   { background: var(--primary-d) }
        .order-down { background: #5f6368; color: #fff }
        .order-down:hover:not(:disabled) { background: #3c4043 }

        /* ════════════════ GRID COLUNAS ════════════════ */
        .cols-wrap {
            flex-grow: 1; display: flex; flex-wrap: wrap; justify-content: center;
            gap: 28px; max-width: 1600px; margin: 36px auto; padding: 28px;
            background: var(--white); border-radius: 20px;
            box-shadow: 0 10px 28px var(--sh-lg); min-height: 240px; border: 1px solid var(--border);
        }

        /* ════════════════ COLUNA ════════════════ */
        .column {
            flex: 1; min-width: 280px; max-width: 410px; background: var(--bg-light);
            border: 1px solid var(--border); border-radius: 14px; padding: 22px;
            box-shadow: 0 5px 14px var(--sh-sm); display: flex; flex-direction: column;
            align-items: center; min-height: 210px;
            transition: box-shadow .25s, border-color .25s; position: relative;
        }
        .column.card-drag-over { background: rgba(26,115,232,.07); border: 2px dashed var(--primary) }

        /* Badge de posição */
        .col-badge {
            display: none; position: absolute; top: 7px; left: 8px;
            background: var(--primary); color: #fff; border-radius: 50%;
            width: 22px; height: 22px;
            font: 700 .72em/1 'Poppins',sans-serif;
            align-items: center; justify-content: center; box-shadow: 0 2px 5px var(--sh-md);
        }
        body.admin-mode .col-badge { display: flex }

        /* Cabeçalho da coluna */
        .col-head { display: flex; align-items: center; justify-content: center; width: 100%; position: relative; margin-bottom: 4px }
        .col-title {
            font-family: 'Poppins', sans-serif; color: var(--primary-d);
            font-size: 1.3em; font-weight: 700; margin: 0; flex: 1; text-align: center;
            transition: color .2s; padding: 3px 28px; cursor: default;
        }
        body.admin-mode .col-title { cursor: pointer }
        body.admin-mode .col-title:hover { color: var(--primary) }

        .col-rename-input {
            font-family: 'Poppins', sans-serif; font-size: 1.2em; font-weight: 700;
            color: var(--primary-d); border: 2px solid var(--primary); border-radius: 8px;
            padding: 4px 10px; text-align: center; outline: none; flex: 1; display: none; width: 100%;
            margin-bottom: 0;
        }
        .col-rename-input.active { display: block }

        .col-actions { display: none; position: absolute; right: 0; top: 0; flex-direction: column; gap: 3px }
        body.admin-mode .col-actions { display: flex }
        .ca-btn {
            border: none; border-radius: 6px; width: 26px; height: 26px;
            font-size: .75em; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: transform .15s, filter .15s;
        }
        .ca-btn:hover { transform: scale(1.18); filter: brightness(.85) }
        .ca-rename { background: var(--primary); color: #fff }
        .ca-delete  { background: var(--red);    color: #fff }

        .col-hint { font-size: .68em; color: var(--primary); opacity: .72; display: none; margin-bottom: 3px }
        body.admin-mode .col-hint { display: block }

        /* ════════════════ CARDS ════════════════ */
        .champs-list {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 18px; width: 100%; margin-top: 14px; min-height: 150px; flex-grow: 1;
        }
        .champ-card {
            background: var(--white); border: 1px solid var(--border); border-radius: 12px;
            padding: 16px; width: 190px; box-shadow: 0 4px 12px var(--sh-sm);
            transition: all .25s; text-decoration: none; color: inherit;
            display: flex; flex-direction: column; align-items: center;
            position: relative; cursor: grab;
        }
        .champ-card.dragging { opacity: .55; border: 2px dashed var(--primary); transform: scale(.97) }
        .champ-card:hover { transform: translateY(-6px); box-shadow: 0 10px 20px var(--sh-md); border-color: var(--primary) }
        .champ-card img {
            max-width: 100%; height: 105px; object-fit: contain; border-radius: 8px;
            margin-bottom: 11px; background: #f8f8f8; padding: 5px; border: 1px solid #eee;
        }
        .champ-card h3 {
            font-size: 1em; margin: 0; color: var(--text); text-align: center;
            min-height: 2.5em; overflow: hidden;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; font-weight: 500;
        }
        .del-card-btn {
            background: var(--red); color: #fff; border: none; border-radius: 50%;
            width: 26px; height: 26px; font-size: 1.1em; font-weight: 700; cursor: pointer;
            position: absolute; top: 7px; right: 7px; display: none;
            align-items: center; justify-content: center;
            transition: background .2s, transform .2s; box-shadow: 0 2px 5px rgba(0,0,0,.25); line-height: 1;
        }
        .del-card-btn:hover { background: var(--red-d); transform: scale(1.18) }
        body.admin-mode .del-card-btn { display: flex }

        /* ════════════════ RESPONSIVO ════════════════ */
        @media(max-width:992px){
            header h1{font-size:1.8em} .cols-wrap{padding:18px;gap:18px}
            .column{min-width:230px;max-width:330px} .champ-card{width:152px}
        }
        @media(max-width:768px){
            header{padding:12px 16px} header h1{font-size:1.5em}
            .cols-wrap{flex-direction:column;align-items:center;padding:14px;gap:18px}
            .column{width:93%;min-width:unset;max-width:93%}
            .champ-card{width:46%;max-width:190px}
        }
        @media(max-width:480px){
            header h1{font-size:1.3em} .admin-section,#orderPanel{margin:12px;padding:18px}
            .champ-card{width:100%;max-width:230px;margin:0 auto}
        }
    </style>
</head>
<body>

<header><h1>⚽ Campeonatos de Futebol</h1></header>

<!-- Trigger admin invisível -->
<button id="adminTrigger" title=""></button>
<div id="adminDot"></div>
<div id="syncBar"><div class="sdot"></div><span id="syncTxt">Aguardando...</span></div>

<!-- ═════ LOGIN ADMIN ═════ -->
<div id="adminLoginForm" class="admin-section">
    <h2>🔐 Modo Administrador</h2>
    <p>Preencha seus dados para gerenciar os campeonatos. Os acessos são registrados para auditoria.</p>
    <label>Nome completo:</label>
    <input type="text"   id="adminName"  placeholder="Seu nome completo">
    <label>Telefone:</label>
    <input type="text"   id="adminPhone" placeholder="(XX) XXXXX-XXXX">
    <label>E-mail:</label>
    <input type="email"  id="adminEmail" placeholder="seu@email.com">
    <div id="loginMsg" class="msg"></div>
    <button class="btn btn-blue" onclick="enterAdmin()">🚀 Entrar</button>
</div>

<!-- ═════ ADICIONAR CAMPEONATO ═════ -->
<div id="addChampSection" class="admin-section">
    <h2>➕ Adicionar Campeonato</h2>
    <label>Nome do Campeonato:</label>
    <input type="text" id="champName"  placeholder="Ex: Copa do Mundo">
    <label>URL da Imagem:</label>
    <input type="text" id="champImage" placeholder="https://...">
    <label>URL do Campeonato:</label>
    <input type="text" id="champLink"  placeholder="https://...">
    <label>Coluna de destino:</label>
    <select id="colSelect"></select>
    <div id="addChampMsg" class="msg"></div>
    <button class="btn btn-green" onclick="addChampionship()">✅ Adicionar Campeonato</button>
</div>

<!-- ═════ NOVA COLUNA ═════ -->
<div id="addColSection" class="admin-section">
    <h2>📂 Nova Coluna</h2>
    <label>Nome da Coluna:</label>
    <input type="text" id="newColName" placeholder="Ex: Campeonatos Estaduais">
    <div id="addColMsg" class="msg"></div>
    <button class="btn btn-blue" onclick="addColumn()">🗂️ Criar Coluna</button>
</div>

<!-- ═════ PAINEL DE ORDENAÇÃO ═════ -->
<div id="orderPanel">
    <h2>🔢 Ordenar Colunas</h2>
    <p>Use os botões ↑ ↓ para definir a sequência em que as colunas aparecem na tela.</p>
    <ul id="orderList"></ul>
    <button class="btn btn-yellow" onclick="applyOrder()">💾 Aplicar Ordem</button>
    <div id="orderMsg" class="msg"></div>
</div>

<!-- ═════ GRID ═════ -->
<div class="cols-wrap" id="colsWrap"></div>

<!-- Botão sair -->
<button id="exitBtn" onclick="exitAdmin()">🚪 Sair do Modo Admin</button>

<script>
// ════════════════════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzbsstKFIxJtAzCd61RicnIPxMG1gEKCTp9ViXxCfa9ZL8b3UPw2J0pSnVOawI5njpD/exec';

// ════════════════════════════════════════════════════════════════
//  ESTADO GLOBAL
//  cols = array de { key:string, name:string, order:int,
//                    championships: [{id:string, name, image, link}] }
//  A ÚNICA fonte de verdade são as strings de ID — nunca números.
// ════════════════════════════════════════════════════════════════
let cols   = [];
let isAdmin = false;
let cardDragId     = null;   // string id do card arrastado
let cardDragColKey = null;   // key da coluna de origem do card
let syncTimer = null;

// ─── Gerador de ID único (string, sem ponto flutuante) ───────────
function uid() {
    return 'c' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

// ════════════════════════════════════════════════════════════════
//  LOCAL STORAGE  (formato v4 = array)
// ════════════════════════════════════════════════════════════════
const STORE = 'camp_v4';

function sanitizeCols(raw) {
    if (!Array.isArray(raw)) return [];
    return raw
        .filter(c => c && c.key)
        .map((c, i) => ({
            key:   String(c.key),
            name:  String(c.name || ''),
            order: Number.isFinite(Number(c.order)) ? Number(c.order) : i,
            championships: Array.isArray(c.championships)
                ? c.championships.map(ch => ({
                    id:    ch.id ? String(ch.id) : uid(),
                    name:  String(ch.name  || ''),
                    image: String(ch.image || ''),
                    link:  String(ch.link  || '')
                  }))
                : []
        }))
        .sort((a, b) => a.order - b.order);
}

function loadLocal() {
    try {
        const raw = localStorage.getItem(STORE);
        if (raw) { cols = sanitizeCols(JSON.parse(raw)); return; }
        // tenta migrar formato antigo (objeto)
        migrateOld();
    } catch(e) { console.warn('loadLocal:', e) }
}

function saveLocal() {
    cols.forEach((c, i) => c.order = i);
    localStorage.setItem(STORE, JSON.stringify(cols));
}

function scheduleSave() {
    saveLocal();
    clearTimeout(syncTimer);
    syncTimer = setTimeout(pushSheets, 1400);
}

// ─── Migração formato antigo ──────────────────────────────────
function migrateOld() {
    for (const key of ['campeonatosData_v3', 'campeonatosData_v2', 'championshipsData']) {
        try {
            const raw = localStorage.getItem(key);
            if (!raw) continue;
            const p = JSON.parse(raw);
            if (!p?.columns || typeof p.columns !== 'object') continue;
            let order = 0;
            cols = [];
            for (const k in p.columns) {
                const c = p.columns[k];
                cols.push({
                    key: String(k), name: String(c.name || k), order: order++,
                    championships: (Array.isArray(c.championships) ? c.championships : []).map(ch => ({
                        id:    ch.id ? String(ch.id) : uid(),
                        name:  String(ch.name  || ''),
                        image: String(ch.image || ''),
                        link:  String(ch.link  || '')
                    }))
                });
            }
            if (cols.length) { saveLocal(); console.log('Migrado de', key); break; }
        } catch(e) {}
    }
}

// ════════════════════════════════════════════════════════════════
//  SYNC GOOGLE SHEETS
// ════════════════════════════════════════════════════════════════
function setSyncStatus(state, txt) {
    document.getElementById('syncBar').className = state;
    document.getElementById('syncTxt').textContent = txt;
}

function colsToSheetPayload() {
    const columns = {};
    cols.forEach((c, i) => {
        columns[c.key] = { name: c.name, order: i, championships: c.championships };
    });
    return { columns };
}

async function pushSheets() {
    if (!SCRIPT_URL || SCRIPT_URL.includes('YOUR_')) return;
    setSyncStatus('syncing', 'Salvando...');
    try {
        await fetch(SCRIPT_URL, {
            method: 'POST', mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'saveAll', payload: colsToSheetPayload() })
        });
        setSyncStatus('ok', 'Salvo ✓ ' + new Date().toLocaleTimeString('pt-BR'));
    } catch(e) { setSyncStatus('err', 'Erro ao salvar'); }
}

async function pullSheets() {
    if (!SCRIPT_URL || SCRIPT_URL.includes('YOUR_')) {
        setSyncStatus('err', 'URL não configurada'); return false;
    }
    setSyncStatus('syncing', 'Carregando...');
    try {
        const r = await fetch(SCRIPT_URL + '?action=getAll');
        const json = await r.json();
        if (json?.columns && Object.keys(json.columns).length) {
            const arr = [];
            for (const k in json.columns) {
                const c = json.columns[k];
                arr.push({
                    key:   String(k),
                    name:  String(c.name || k),
                    order: Number.isFinite(Number(c.order)) ? Number(c.order) : arr.length,
                    championships: (Array.isArray(c.championships) ? c.championships : []).map(ch => ({
                        id:    ch.id ? String(ch.id) : uid(),
                        name:  String(ch.name  || ''),
                        image: String(ch.image || ''),
                        link:  String(ch.link  || '')
                    }))
                });
            }
            cols = arr.sort((a, b) => a.order - b.order);
            saveLocal();
            setSyncStatus('ok', 'Sincronizado ✓ ' + new Date().toLocaleTimeString('pt-BR'));
            return true;
        }
        setSyncStatus('ok', 'Local (Sheets vazio)');
        return false;
    } catch(e) { setSyncStatus('err', 'Falha ao carregar'); return false; }
}

// ════════════════════════════════════════════════════════════════
//  RENDER PRINCIPAL
// ════════════════════════════════════════════════════════════════
function renderAll() {
    renderCols();
    if (isAdmin) {
        renderColSelect();
        renderOrderPanel();
    }
}

// ─── Select de colunas (sempre sincronizado com `cols`) ──────────
function renderColSelect() {
    const sel = document.getElementById('colSelect');
    const prev = sel.value;
    sel.innerHTML = '<option value="">— Selecione —</option>';
    cols.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.key; opt.textContent = c.name;
        sel.appendChild(opt);
    });
    // mantém seleção se ainda válida
    if (cols.find(c => c.key === prev)) sel.value = prev;
}

// ─── Painel de ordenação ─────────────────────────────────────────
function renderOrderPanel() {
    const list = document.getElementById('orderList');
    list.innerHTML = '';
    cols.forEach((col, idx) => {
        const li = document.createElement('li');

        const num = document.createElement('div');
        num.className = 'order-num';
        num.textContent = idx + 1;

        const name = document.createElement('span');
        name.className = 'order-name';
        name.textContent = col.name;

        const count = document.createElement('span');
        count.className = 'order-champ-count';
        count.textContent = col.championships.length + ' camp.';

        const btnGroup = document.createElement('div');
        btnGroup.className = 'order-btn-group';

        const up = document.createElement('button');
        up.className = 'order-btn order-up';
        up.innerHTML = '↑'; up.title = 'Mover para cima';
        up.disabled = idx === 0;
        up.addEventListener('click', () => {
            if (idx === 0) return;
            [cols[idx - 1], cols[idx]] = [cols[idx], cols[idx - 1]];
            renderOrderPanel(); // atualiza só o painel
        });

        const down = document.createElement('button');
        down.className = 'order-btn order-down';
        down.innerHTML = '↓'; down.title = 'Mover para baixo';
        down.disabled = idx === cols.length - 1;
        down.addEventListener('click', () => {
            if (idx === cols.length - 1) return;
            [cols[idx], cols[idx + 1]] = [cols[idx + 1], cols[idx]];
            renderOrderPanel();
        });

        btnGroup.appendChild(up);
        btnGroup.appendChild(down);
        li.appendChild(num);
        li.appendChild(name);
        li.appendChild(count);
        li.appendChild(btnGroup);
        list.appendChild(li);
    });
}

function applyOrder() {
    scheduleSave();
    renderCols();          // refaz o grid na nova ordem
    renderColSelect();     // atualiza o select
    showMsg(document.getElementById('orderMsg'), '✅ Ordem aplicada!', 'ok');
}

// ─── Grid de colunas ────────────────────────────────────────────
function renderCols() {
    const wrap = document.getElementById('colsWrap');
    wrap.innerHTML = '';
    cols.forEach((col, idx) => wrap.appendChild(buildColDiv(col, idx)));
}

function buildColDiv(col, idx) {
    const colDiv = document.createElement('div');
    colDiv.className = 'column';
    colDiv.id = 'col-' + col.key;
    colDiv.dataset.key = col.key;

    // Drop de cards
    colDiv.addEventListener('dragover', e => {
        if (cardDragId !== null) { e.preventDefault(); colDiv.classList.add('card-drag-over'); }
    });
    colDiv.addEventListener('dragleave', e => {
        if (!colDiv.contains(e.relatedTarget)) colDiv.classList.remove('card-drag-over');
    });
    colDiv.addEventListener('drop', handleCardDrop);

    // Badge de posição
    const badge = document.createElement('div');
    badge.className = 'col-badge';
    badge.textContent = idx + 1;
    colDiv.appendChild(badge);

    // ── Cabeçalho ──
    const head = document.createElement('div');
    head.className = 'col-head';

    const title = document.createElement('h3');
    title.className = 'col-title';
    title.textContent = col.name;

    const renInput = document.createElement('input');
    renInput.type = 'text';
    renInput.className = 'col-rename-input';
    renInput.value = col.name;

    const actions = document.createElement('div');
    actions.className = 'col-actions';

    const renBtn = document.createElement('button');
    renBtn.className = 'ca-btn ca-rename';
    renBtn.innerHTML = '✏️'; renBtn.title = 'Renomear';

    const delBtn = document.createElement('button');
    delBtn.className = 'ca-btn ca-delete';
    delBtn.innerHTML = '🗑️'; delBtn.title = 'Excluir coluna';

    actions.appendChild(renBtn);
    actions.appendChild(delBtn);
    head.appendChild(title);
    head.appendChild(renInput);
    head.appendChild(actions);

    const hint = document.createElement('span');
    hint.className = 'col-hint';
    hint.textContent = '✏ clique no título para renomear';

    // Renomear
    const startRen = () => {
        if (!isAdmin) return;
        renInput.value = col.name;
        title.style.display = 'none';
        renInput.classList.add('active');
        setTimeout(() => { renInput.focus(); renInput.select(); }, 10);
    };
    const commitRen = () => {
        const n = renInput.value.trim();
        title.style.display = '';
        renInput.classList.remove('active');
        if (n && n !== col.name) {
            col.name = n;
            title.textContent = n;
            scheduleSave();
            renderColSelect();
            renderOrderPanel();
        }
    };
    renBtn.addEventListener('click', e => { e.stopPropagation(); startRen(); });
    title.addEventListener('click', startRen);
    renInput.addEventListener('blur', commitRen);
    renInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); commitRen(); }
        if (e.key === 'Escape') { title.style.display = ''; renInput.classList.remove('active'); }
    });

    // Excluir coluna
    delBtn.addEventListener('click', e => {
        e.stopPropagation();
        if (!isAdmin) return;
        const n = col.championships.length;
        const msg = n > 0
            ? `Excluir "${col.name}"?\nEla tem ${n} campeonato(s) que também serão removidos!`
            : `Excluir a coluna "${col.name}"?`;
        if (confirm(msg)) {
            cols = cols.filter(c => c.key !== col.key);
            scheduleSave();
            renderAll();
        }
    });

    colDiv.appendChild(head);
    colDiv.appendChild(hint);

    // Lista de cards
    const list = document.createElement('div');
    list.className = 'champs-list';
    list.id = 'list-' + col.key;
    colDiv.appendChild(list);

    buildCards(col, list);
    return colDiv;
}

function buildCards(col, listEl) {
    listEl.innerHTML = '';
    if (!col.championships.length) {
        const p = document.createElement('p');
        p.style.cssText = 'color:var(--text-sub);font-size:.86em;padding:18px;';
        p.textContent = 'Nenhum campeonato nesta coluna.';
        listEl.appendChild(p);
        return;
    }
    col.championships.forEach(ch => {
        const card = document.createElement('a');
        card.href = ch.link || '#';
        card.target = '_blank';
        card.className = 'champ-card';
        card.draggable = true;
        // Guarda o ID exato (string) no dataset para recuperação sem ambiguidade
        card.dataset.champId  = ch.id;
        card.dataset.champCol = col.key;

        card.addEventListener('dragstart', e => {
            if (!isAdmin) { e.preventDefault(); return; }
            cardDragId     = ch.id;      // string exata
            cardDragColKey = col.key;
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', ch.id);
            setTimeout(() => card.classList.add('dragging'), 0);
        });
        card.addEventListener('dragend', () => {
            card.classList.remove('dragging');
            cardDragId = null; cardDragColKey = null;
            document.querySelectorAll('.card-drag-over').forEach(d => d.classList.remove('card-drag-over'));
        });

        const img = document.createElement('img');
        img.src = ch.image || '';
        img.alt = ch.name;
        img.onerror = function () { this.src = 'https://placehold.co/105x105?text=⚽'; };
        card.appendChild(img);

        const h3 = document.createElement('h3');
        h3.textContent = ch.name;
        card.appendChild(h3);

        const del = document.createElement('button');
        del.className = 'del-card-btn';
        del.innerHTML = '&times;';
        del.title = 'Excluir ' + ch.name;
        del.addEventListener('click', e => {
            e.preventDefault(); e.stopPropagation();
            deleteChampionship(col.key, ch.id);
        });
        card.appendChild(del);
        listEl.appendChild(card);
    });
}

function refreshList(colKey) {
    const col  = cols.find(c => c.key === colKey);
    const list = document.getElementById('list-' + colKey);
    if (col && list) buildCards(col, list);
}

// ════════════════════════════════════════════════════════════════
//  DRAG-AND-DROP DE CARDS  (mover entre colunas)
// ════════════════════════════════════════════════════════════════
function handleCardDrop(e) {
    e.preventDefault();
    const tgtDiv = e.currentTarget;
    tgtDiv.classList.remove('card-drag-over');
    if (!isAdmin || cardDragId === null) return;

    const tgtKey = tgtDiv.dataset.key;
    const srcKey = cardDragColKey;
    if (!tgtKey || srcKey === tgtKey) return;

    const srcCol = cols.find(c => c.key === srcKey);
    const tgtCol = cols.find(c => c.key === tgtKey);
    if (!srcCol || !tgtCol) return;

    // Busca pelo ID string — correspondência exata, sem coerção numérica
    const idx = srcCol.championships.findIndex(c => c.id === cardDragId);
    if (idx === -1) return;

    const [moved] = srcCol.championships.splice(idx, 1);
    tgtCol.championships.push(moved);
    scheduleSave();
    refreshList(srcKey);
    refreshList(tgtKey);
    renderOrderPanel();  // atualiza contagem
}

// ════════════════════════════════════════════════════════════════
//  CRUD
// ════════════════════════════════════════════════════════════════
function addChampionship() {
    const name   = document.getElementById('champName').value.trim();
    const image  = document.getElementById('champImage').value.trim();
    const link   = document.getElementById('champLink').value.trim();
    // IMPORTANTE: lemos a key do select no momento exato do clique
    const colKey = document.getElementById('colSelect').value;
    const msgEl  = document.getElementById('addChampMsg');

    if (!name || !image || !link)  { showMsg(msgEl, 'Preencha nome, imagem e link!', 'err'); return; }
    if (!colKey)                   { showMsg(msgEl, 'Selecione uma coluna de destino!', 'err'); return; }

    // Encontra a coluna pelo key (string) — busca no array, nunca em objeto
    const col = cols.find(c => c.key === colKey);
    if (!col) { showMsg(msgEl, 'Coluna não encontrada. Recarregue a página.', 'err'); return; }

    // ID seguro: string com prefixo 'c' + timestamp base36 + random
    const newChamp = { id: uid(), name, image, link };
    col.championships.push(newChamp);
    scheduleSave();

    // Atualiza apenas a lista desta coluna (sem re-render total que dessincroniza select)
    refreshList(colKey);
    renderOrderPanel();

    showMsg(msgEl, `✅ "${name}" adicionado em "${col.name}"!`, 'ok');
    document.getElementById('champName').value  = '';
    document.getElementById('champImage').value = '';
    document.getElementById('champLink').value  = '';
    // Mantém a coluna selecionada para facilitar adição em série
}

function deleteChampionship(colKey, champId) {
    if (!isAdmin) return;
    const col = cols.find(c => c.key === colKey);
    if (!col) return;
    const idx = col.championships.findIndex(c => c.id === champId);
    if (idx === -1) return;
    const name = col.championships[idx].name;
    if (confirm(`Excluir "${name}"?`)) {
        col.championships.splice(idx, 1);
        scheduleSave();
        refreshList(colKey);
        renderOrderPanel();
    }
}

function addColumn() {
    const name  = document.getElementById('newColName').value.trim();
    const msgEl = document.getElementById('addColMsg');
    if (!name) { showMsg(msgEl, 'Digite um nome para a coluna!', 'err'); return; }

    const key = 'col_' + Date.now().toString(36);
    cols.push({ key, name, order: cols.length, championships: [] });
    scheduleSave();
    renderAll();
    showMsg(msgEl, `✅ Coluna "${name}" criada!`, 'ok');
    document.getElementById('newColName').value = '';
}

// ════════════════════════════════════════════════════════════════
//  MODO ADMIN
// ════════════════════════════════════════════════════════════════
document.getElementById('adminTrigger').addEventListener('click', () => {
    if (isAdmin) exitAdmin(); else showLogin();
});

function showLogin() {
    document.getElementById('addChampSection').classList.remove('active');
    document.getElementById('addColSection').classList.remove('active');
    document.getElementById('orderPanel').classList.remove('active');
    document.getElementById('adminLoginForm').classList.add('active');
}

async function enterAdmin() {
    const name  = document.getElementById('adminName').value.trim();
    const phone = document.getElementById('adminPhone').value.trim();
    const email = document.getElementById('adminEmail').value.trim();
    const msgEl = document.getElementById('loginMsg');

    if (!name || !phone || !email) { showMsg(msgEl, 'Preencha todos os campos.', 'err'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showMsg(msgEl, 'E-mail inválido.', 'err'); return; }

    // Log de acesso
    if (SCRIPT_URL && !SCRIPT_URL.includes('YOUR_')) {
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'logAdmin', name, phone, email, timestamp: new Date().toLocaleString('pt-BR') })
            });
        } catch(e) {}
    }

    isAdmin = true;
    document.body.classList.add('admin-mode');
    document.getElementById('adminLoginForm').classList.remove('active');
    document.getElementById('addChampSection').classList.add('active');
    document.getElementById('addColSection').classList.add('active');
    document.getElementById('orderPanel').classList.add('active');

    // Puxa dados frescos do Sheets
    const loaded = await pullSheets();
    if (loaded) renderAll(); else renderAll();

    showMsg(document.getElementById('addChampMsg'), `Bem-vindo, ${name}! ✓`, 'ok');
}

function exitAdmin() {
    isAdmin = false;
    document.body.classList.remove('admin-mode');
    ['adminLoginForm', 'addChampSection', 'addColSection', 'orderPanel']
        .forEach(id => document.getElementById(id).classList.remove('active'));
    document.getElementById('adminName').value  = '';
    document.getElementById('adminPhone').value = '';
    document.getElementById('adminEmail').value = '';
    renderCols();
}

// ════════════════════════════════════════════════════════════════
//  UTILITÁRIO
// ════════════════════════════════════════════════════════════════
function showMsg(el, txt, type) {
    el.textContent = txt;
    el.className = 'msg ' + type;
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.className = 'msg'; el.textContent = ''; }, 4500);
}

//  INICIALIZAÇÃO
// ════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
    loadLocal();
    if (!cols.length) {
        cols = DEFAULT_COLS.map(c => ({
            ...c, championships: c.championships.map(ch => ({ ...ch }))
        }));
    }
    renderCols();

    if (SCRIPT_URL && !SCRIPT_URL.includes('YOUR_')) {
        const loaded = await pullSheets();
        if (loaded) renderCols();
    } else {
        setSyncStatus('err', 'Configure a URL do Apps Script');
    }
});
