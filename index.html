<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campeonatos de Futebol</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a73e8;
            --primary-dark: #0f48a1;
            --accent-color: #ffb300;
            --success-color: #34a853;
            --success-dark: #2b8443;
            --danger-color: #ea4335;
            --danger-dark: #bb3328;
            --light-bg: rgba(240, 243, 245, 0.95);
            --dark-text: #202124;
            --light-text: #5f6368;
            --white-bg: rgba(255, 255, 255, 0.98);
            --border-color: #dadce0;
            --shadow-light: rgba(0,0,0,0.05);
            --shadow-medium: rgba(0,0,0,0.12);
            --shadow-heavy: rgba(0,0,0,0.2);
        }
        html, body { height: 100%; min-height: 100vh; margin: 0; padding: 0; overflow-x: hidden; }
        body {
            font-family: 'Roboto', sans-serif;
            text-align: center;
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ_nKWFUu62dYTds0SG-X4A1e5FEkHToj1pHA&s');
            background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed;
            color: var(--dark-text); padding-bottom: 80px; line-height: 1.6; display: flex; flex-direction: column;
        }

        /* HEADER */
        header {
            background-color: var(--white-bg); padding: 18px 30px;
            box-shadow: 0 4px 15px var(--shadow-medium);
            display: flex; justify-content: center; align-items: center;
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(5px);
        }
        header h1 { font-family: 'Poppins', sans-serif; margin: 0; font-size: 2.2em; color: var(--primary-dark); }

        /* TRIGGER ADMIN INVISÍVEL */
        #adminTrigger {
            position: fixed; bottom: 16px; right: 16px;
            width: 18px; height: 18px; background: transparent; border: none;
            border-radius: 50%; cursor: default; z-index: 9999; opacity: 0;
            transition: opacity 0.4s; padding: 0; font-size: 0;
        }
        #adminTrigger:hover { opacity: 0.2; background: var(--light-text); cursor: pointer; }

        /* PONTO PULSANTE */
        #adminDot {
            position: fixed; bottom: 21px; right: 19px; width: 8px; height: 8px;
            background: var(--danger-color); border-radius: 50%; display: none;
            z-index: 9997; pointer-events: none; animation: pulseDot 2s infinite;
        }
        @keyframes pulseDot { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.5)} }
        body.admin-mode #adminDot { display: block; }

        /* BOTÃO SAIR (VISÍVEL QUANDO ADMIN ATIVO) */
        #exitAdminBtn {
            display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--danger-color); color: white; border: none; border-radius: 30px;
            padding: 13px 30px; font-size: 1em; font-weight: 700; font-family: 'Poppins', sans-serif;
            cursor: pointer; z-index: 9998; box-shadow: 0 4px 16px rgba(234,67,53,.45);
            transition: background .2s, transform .2s, box-shadow .2s;
            align-items: center; gap: 8px;
        }
        #exitAdminBtn:hover { background: var(--danger-dark); transform: translateX(-50%) translateY(-2px); box-shadow: 0 6px 20px rgba(234,67,53,.55); }
        body.admin-mode #exitAdminBtn { display: flex; }

        /* STATUS SYNC */
        #syncStatus {
            position: fixed; top: 78px; right: 14px; background: var(--white-bg);
            border: 1px solid var(--border-color); border-radius: 10px; padding: 7px 12px;
            font-size: 0.78em; color: var(--light-text); z-index: 998;
            box-shadow: 0 2px 8px var(--shadow-light); display: flex; align-items: center; gap: 6px;
        }
        #syncDot { width: 8px; height: 8px; border-radius: 50%; background: var(--border-color); flex-shrink: 0; }
        #syncStatus.syncing { color: var(--primary-color); }
        #syncStatus.syncing #syncDot { background: var(--primary-color); animation: pulseDot 1s infinite; }
        #syncStatus.synced  { color: var(--success-color); }
        #syncStatus.synced  #syncDot { background: var(--success-color); }
        #syncStatus.error   { color: var(--danger-color); }
        #syncStatus.error   #syncDot { background: var(--danger-color); }

        /* SEÇÕES ADMIN */
        .admin-section {
            display: none; background-color: var(--white-bg); padding: 35px; border-radius: 15px;
            box-shadow: 0 8px 25px var(--shadow-heavy); max-width: 750px; margin: 40px auto;
            text-align: left; border: 1px solid var(--border-color);
            opacity: 0; transform: translateY(20px); transition: opacity .4s, transform .4s;
        }
        .admin-section.active { display: block; opacity: 1; transform: translateY(0); }
        .admin-section h2 {
            font-family: 'Poppins', sans-serif; color: var(--primary-dark);
            margin-top: 0; margin-bottom: 16px; font-size: 1.5em;
            border-bottom: 2px solid var(--primary-color); padding-bottom: 10px;
        }
        .admin-section p { color: var(--light-text); margin-bottom: 18px; font-size: .97em; }

        label { display: block; margin-bottom: 7px; font-weight: 600; color: var(--dark-text); font-size: .98em; }
        input[type="text"], input[type="email"], select {
            width: calc(100% - 28px); padding: 13px 14px; margin-bottom: 18px;
            border: 1px solid var(--border-color); border-radius: 10px;
            font-size: 1em; font-family: 'Roboto', sans-serif; background: white;
            transition: border-color .3s, box-shadow .3s;
        }
        input:focus, select:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(26,115,232,.2); outline: none; }

        .btn { padding: 13px 26px; border: none; border-radius: 30px; cursor: pointer; font-size: 1em; font-weight: 700; font-family: 'Poppins', sans-serif; transition: background .2s, transform .2s, box-shadow .2s; margin-right: 8px; margin-top: 4px; }
        .btn-success { background: var(--success-color); color: white; }
        .btn-success:hover { background: var(--success-dark); transform: translateY(-2px); }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }

        .form-message { margin-top: 4px; margin-bottom: 12px; padding: 10px 14px; border-radius: 8px; font-size: .9em; font-weight: 500; display: none; }
        .form-message.success { background: rgba(52,168,83,.1); color: var(--success-dark); border: 1px solid var(--success-color); display: block; }
        .form-message.error   { background: rgba(234,67,53,.1); color: var(--danger-dark);  border: 1px solid var(--danger-color);   display: block; }

        /* GRID COLUNAS */
        .columns-container {
            flex-grow: 1; display: flex; flex-wrap: wrap; justify-content: center;
            gap: 30px; max-width: 1600px; margin: 40px auto; padding: 30px;
            background: var(--white-bg); border-radius: 20px;
            box-shadow: 0 10px 30px var(--shadow-heavy); min-height: 250px; border: 1px solid var(--border-color);
        }
        .column {
            flex: 1; min-width: 290px; max-width: 420px; background: var(--light-bg);
            border: 1px solid var(--border-color); border-radius: 15px; padding: 25px;
            box-shadow: 0 6px 15px var(--shadow-light); display: flex; flex-direction: column;
            align-items: center; min-height: 220px; transition: all .3s;
        }
        .column.drag-over { background: rgba(26,115,232,.1); border: 2px dashed var(--primary-color); box-shadow: 0 0 0 6px rgba(26,115,232,.2); }

        /* CABEÇALHO DA COLUNA */
        .column-header { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; position: relative; margin-bottom: 4px; }
        .column-title {
            font-family: 'Poppins', sans-serif; color: var(--primary-dark);
            font-size: 1.35em; font-weight: 700; margin: 0; flex: 1; text-align: center;
            transition: color .2s; padding: 4px 30px; cursor: default;
        }
        body.admin-mode .column-title { cursor: pointer; }
        body.admin-mode .column-title:hover { color: var(--primary-color); }
        .column-rename-input {
            font-family: 'Poppins', sans-serif; font-size: 1.2em; font-weight: 700;
            color: var(--primary-dark); border: 2px solid var(--primary-color); border-radius: 8px;
            padding: 4px 10px; text-align: center; outline: none; flex: 1; display: none;
            width: calc(100% - 30px);
        }
        .column-rename-input.active { display: block; }

        .column-actions { display: none; position: absolute; right: 0; top: 0; flex-direction: column; gap: 3px; }
        body.admin-mode .column-actions { display: flex; }
        .col-btn { border: none; border-radius: 6px; width: 26px; height: 26px; font-size: .78em; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform .15s, filter .15s; }
        .col-btn:hover { transform: scale(1.15); filter: brightness(.85); }
        .col-rename-btn { background: var(--primary-color); color: white; }
        .col-delete-btn { background: var(--danger-color); color: white; }
        .col-hint { font-size: .7em; color: var(--primary-color); opacity: .7; display: none; margin-bottom: 4px; }
        body.admin-mode .col-hint { display: block; }

        /* CARDS */
        .championships-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; width: 100%; margin-top: 14px; min-height: 160px; flex-grow: 1; }
        .championship-card {
            background: var(--white-bg); border: 1px solid var(--border-color); border-radius: 12px;
            padding: 18px; width: 200px; box-shadow: 0 4px 12px var(--shadow-light);
            transition: all .25s; text-decoration: none; color: inherit;
            display: flex; flex-direction: column; align-items: center; position: relative; cursor: grab;
        }
        .championship-card.dragging { opacity: .65; border: 2px dashed var(--primary-color); transform: scale(.97); }
        .championship-card:hover { transform: translateY(-7px); box-shadow: 0 10px 22px var(--shadow-medium); border-color: var(--primary-color); }
        .championship-card img { max-width: 100%; height: 110px; object-fit: contain; border-radius: 8px; margin-bottom: 12px; background: #f8f8f8; padding: 6px; border: 1px solid #eee; }
        .championship-card h3 { font-size: 1.05em; margin: 0; color: var(--dark-text); text-align: center; min-height: 2.6em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; font-weight: 500; }
        .delete-card-btn {
            background: var(--danger-color); color: white; border: none; border-radius: 50%;
            width: 28px; height: 28px; font-size: 1.1em; font-weight: 700; cursor: pointer;
            position: absolute; top: 8px; right: 8px; display: none;
            align-items: center; justify-content: center; transition: background .2s, transform .2s;
            box-shadow: 0 2px 5px rgba(0,0,0,.25); line-height: 1;
        }
        .delete-card-btn:hover { background: var(--danger-dark); transform: scale(1.15); }
        body.admin-mode .delete-card-btn { display: flex; }

        /* RESPONSIVO */
        @media(max-width:992px){ header h1{font-size:1.9em} .columns-container{padding:20px;gap:20px} .column{min-width:240px;max-width:340px} .championship-card{width:165px} }
        @media(max-width:768px){ header{padding:14px 20px} header h1{font-size:1.6em} .columns-container{flex-direction:column;align-items:center;padding:15px;gap:20px} .column{width:90%;min-width:unset;max-width:90%} .championship-card{width:46%;max-width:200px} }
        @media(max-width:480px){ header h1{font-size:1.4em} .admin-section{margin:15px;padding:20px} .championship-card{width:100%;max-width:240px;margin:0 auto} }
    </style>
</head>
<body>

<header><h1>⚽ Campeonatos de Futebol</h1></header>

<!-- Gatilho admin oculto -->
<button id="adminTrigger" title=""></button>
<div id="adminDot"></div>
<div id="syncStatus"><div id="syncDot"></div><span id="syncText">Aguardando...</span></div>

<!-- LOGIN ADMIN -->
<div id="adminLoginForm" class="admin-section">
    <h2>🔐 Modo Administrador</h2>
    <p>Preencha seus dados para gerenciar os campeonatos. Os dados serão registrados para auditoria.</p>
    <label for="adminName">Nome completo:</label>
    <input type="text" id="adminName" placeholder="Seu nome completo">
    <label for="adminPhone">Telefone:</label>
    <input type="text" id="adminPhone" placeholder="(XX) XXXXX-XXXX">
    <label for="adminEmail">E-mail:</label>
    <input type="email" id="adminEmail" placeholder="seu@email.com">
    <div id="loginMessage" class="form-message"></div>
    <button class="btn btn-primary" onclick="enterAdminMode()">🚀 Entrar no Modo Admin</button>
</div>

<!-- ADICIONAR CAMPEONATO -->
<div id="addChampionshipSection" class="admin-section">
    <h2>➕ Adicionar Campeonato</h2>
    <label for="championshipName">Nome do Campeonato:</label>
    <input type="text" id="championshipName" placeholder="Ex: Copa do Mundo">
    <label for="imageLink">URL da Imagem:</label>
    <input type="text" id="imageLink" placeholder="https://...">
    <label for="championshipLink">URL do Campeonato:</label>
    <input type="text" id="championshipLink" placeholder="https://...">
    <label for="columnSelect">Coluna de destino:</label>
    <select id="columnSelect"></select>
    <div id="addChampMessage" class="form-message"></div>
    <button class="btn btn-success" onclick="addChampionship()">✅ Adicionar</button>
</div>

<!-- ADICIONAR COLUNA -->
<div id="addColumnSection" class="admin-section">
    <h2>📂 Nova Coluna</h2>
    <label for="newColumnName">Nome da Coluna:</label>
    <input type="text" id="newColumnName" placeholder="Ex: Campeonatos Estaduais">
    <div id="addColumnMessage" class="form-message"></div>
    <button class="btn btn-primary" onclick="addColumn()">🗂️ Criar Coluna</button>
</div>

<!-- GRID -->
<div class="columns-container" id="columnsContainer"></div>

<!-- BOTÃO SAIR DO ADMIN -->
<button id="exitAdminBtn" onclick="exitAdminMode()">🚪 Sair do Modo Admin</button>

<script>
// ================================================================
//  CONFIGURAÇÃO — cole aqui a URL do seu Web App do Apps Script
// ================================================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzbsstKFIxJtAzCd61RicnIPxMG1gEKCTp9ViXxCfa9ZL8b3UPw2J0pSnVOawI5njpD/exec';

// ================================================================
//  DADOS PADRÃO
// ================================================================
let data = {
    columns: {
        "brasileiros": {
            name: "Campeonatos Brasileiros",
            championships: [
                { id: 1001, name: "Brasileirão Série A", image: "https://p2.trrsf.com/image/fget/cf/1200/1200/middle/images.terra.com/2023/02/18/919177108-brasileirao-a.jpg", link: "https://www.google.com/search?q=Brasileirão+Série+A" },
                { id: 1002, name: "Brasileirão Série B", image: "https://upload.wikimedia.org/wikipedia/pt/f/f4/Campeonato_Brasileiro_S%C3%A9rie_B_logo.png", link: "https://www.google.com/search?q=Brasileirão+Série+B" },
                { id: 1003, name: "Brasileirão Série C", image: "https://admin.cnnbrasil.com.br/wp-content/uploads/sites/12/2024/06/brasileiro-serie-c.jpg", link: "https://www.google.com/search?q=Brasileirão+Série+C" },
                { id: 1004, name: "Brasileirão Série D", image: "https://upload.wikimedia.org/wikipedia/pt/thumb/e/e6/Campeonato_Brasileiro_de_Futebol_de_2022_-_S%C3%A9rie_D.png/250px-Campeonato_Brasileiro_de_Futebol_de_2022_-_S%C3%A9rie_D.png", link: "https://www.google.com/search?q=Brasileirão+Série+D" }
            ]
        },
        "mundiais": {
            name: "Campeonatos Mundiais",
            championships: []
        }
    },
    adminInfo: { name: "", phone: "", email: "" }
};

let isAdminMode = false;
let draggedItem = null;
let syncTimeout = null;

// ================================================================
//  ELEMENTOS
// ================================================================
const columnsContainer = document.getElementById('columnsContainer');
const columnSelect     = document.getElementById('columnSelect');
const adminLoginForm   = document.getElementById('adminLoginForm');
const addChampSection  = document.getElementById('addChampionshipSection');
const addColumnSection = document.getElementById('addColumnSection');
const loginMessage     = document.getElementById('loginMessage');
const addChampMessage  = document.getElementById('addChampMessage');
const addColumnMessage = document.getElementById('addColumnMessage');

// ================================================================
//  ARMAZENAMENTO LOCAL
// ================================================================
function loadLocal() {
    try {
        const saved = localStorage.getItem('campeonatosData_v3');
        if (!saved) return;
        const parsed = JSON.parse(saved);
        if (!parsed || !parsed.columns) return;
        // Sanitiza estrutura
        for (const k in parsed.columns) {
            if (!parsed.columns[k].championships) parsed.columns[k].championships = [];
            // Garante ID numérico único em todos
            parsed.columns[k].championships = parsed.columns[k].championships.map((c, i) => ({
                ...c, id: Number(c.id) || (Date.now() + i)
            }));
        }
        data = parsed;
    } catch(e) { console.warn('loadLocal erro:', e); }
}

function saveLocal() {
    localStorage.setItem('campeonatosData_v3', JSON.stringify(data));
}

// ================================================================
//  SINCRONIZAÇÃO BIDIRECIONAL COM GOOGLE SHEETS
// ================================================================
function setSyncStatus(state, text) {
    document.getElementById('syncStatus').className = state;
    document.getElementById('syncText').textContent = text;
}

function scheduleSave() {
    saveLocal();
    clearTimeout(syncTimeout);
    syncTimeout = setTimeout(pushToSheets, 1500);
}

async function pushToSheets() {
    if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes('YOUR_')) return;
    setSyncStatus('syncing', 'Salvando no Sheets...');
    try {
        await fetch(APPS_SCRIPT_URL, {
            method: 'POST', mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'saveAll', payload: data })
        });
        setSyncStatus('synced', 'Salvo ✓ ' + new Date().toLocaleTimeString('pt-BR'));
    } catch(e) {
        setSyncStatus('error', 'Erro ao salvar no Sheets');
    }
}

async function pullFromSheets() {
    if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes('YOUR_')) {
        setSyncStatus('error', 'URL do Apps Script não configurada');
        return false;
    }
    setSyncStatus('syncing', 'Carregando do Sheets...');
    try {
        const resp = await fetch(APPS_SCRIPT_URL + '?action=getAll');
        const json = await resp.json();
        if (json && json.columns && Object.keys(json.columns).length > 0) {
            // Sanitiza antes de aplicar
            for (const k in json.columns) {
                if (!json.columns[k].championships) json.columns[k].championships = [];
                json.columns[k].championships = json.columns[k].championships.map((c, i) => ({
                    ...c, id: Number(c.id) || (Date.now() + i)
                }));
            }
            data = json;
            saveLocal();
            setSyncStatus('synced', 'Sincronizado ✓ ' + new Date().toLocaleTimeString('pt-BR'));
            return true;
        }
        setSyncStatus('synced', 'Dados locais (Sheets vazio)');
        return false;
    } catch(e) {
        setSyncStatus('error', 'Falha ao carregar do Sheets');
        return false;
    }
}

// ================================================================
//  RENDERIZAÇÃO
// ================================================================
function renderColumns() {
    columnsContainer.innerHTML = '';
    columnSelect.innerHTML = '<option value="">Selecione uma coluna</option>';

    for (const key in data.columns) {
        if (!Object.prototype.hasOwnProperty.call(data.columns, key)) continue;
        const col = data.columns[key];

        // Option no select
        const opt = document.createElement('option');
        opt.value = key; opt.textContent = col.name;
        columnSelect.appendChild(opt);

        // Wrapper da coluna
        const colDiv = document.createElement('div');
        colDiv.classList.add('column');
        colDiv.id = 'column-' + key;
        colDiv.addEventListener('dragover', dragOver);
        colDiv.addEventListener('dragleave', dragLeave);
        colDiv.addEventListener('drop', drop);

        // -- CABEÇALHO --
        const colHeader = document.createElement('div');
        colHeader.classList.add('column-header');

        const colTitle = document.createElement('h3');
        colTitle.classList.add('column-title');
        colTitle.textContent = col.name;

        const renameInput = document.createElement('input');
        renameInput.type = 'text';
        renameInput.classList.add('column-rename-input');
        renameInput.value = col.name;

        const colActions = document.createElement('div');
        colActions.classList.add('column-actions');

        const renameBtn = document.createElement('button');
        renameBtn.classList.add('col-btn', 'col-rename-btn');
        renameBtn.innerHTML = '✏️'; renameBtn.title = 'Renomear coluna';

        const deleteColBtn = document.createElement('button');
        deleteColBtn.classList.add('col-btn', 'col-delete-btn');
        deleteColBtn.innerHTML = '🗑️'; deleteColBtn.title = 'Excluir esta coluna';

        colActions.appendChild(renameBtn);
        colActions.appendChild(deleteColBtn);

        colHeader.appendChild(colTitle);
        colHeader.appendChild(renameInput);
        colHeader.appendChild(colActions);

        const hint = document.createElement('span');
        hint.classList.add('col-hint');
        hint.textContent = '✏ clique no título para renomear';

        // Funções de renomear
        function activateRename() {
            if (!isAdminMode) return;
            renameInput.value = data.columns[key].name;
            colTitle.style.display = 'none';
            renameInput.classList.add('active');
            setTimeout(() => { renameInput.focus(); renameInput.select(); }, 10);
        }

        function confirmRename() {
            const newName = renameInput.value.trim();
            colTitle.style.display = '';
            renameInput.classList.remove('active');
            if (newName && newName !== data.columns[key].name) {
                data.columns[key].name = newName;
                scheduleSave();
                renderColumns();
            }
        }

        renameBtn.addEventListener('click', e => { e.stopPropagation(); activateRename(); });
        colTitle.addEventListener('click', activateRename);
        renameInput.addEventListener('blur', confirmRename);
        renameInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); confirmRename(); }
            if (e.key === 'Escape') { colTitle.style.display = ''; renameInput.classList.remove('active'); }
        });

        // Excluir coluna
        deleteColBtn.addEventListener('click', e => {
            e.stopPropagation();
            if (!isAdminMode) return;
            // Captura o nome atual do objeto data (não da closure)
            const currentCol = data.columns[key];
            if (!currentCol) return;
            const n = currentCol.championships.length;
            const msg = n > 0
                ? `Excluir a coluna "${currentCol.name}"?\nEla contém ${n} campeonato(s) que também serão removidos!`
                : `Excluir a coluna "${currentCol.name}"?`;
            if (confirm(msg)) {
                delete data.columns[key];
                scheduleSave();
                renderColumns();
            }
        });

        colDiv.appendChild(colHeader);
        colDiv.appendChild(hint);

        // -- LISTA DE CAMPEONATOS --
        const listDiv = document.createElement('div');
        listDiv.classList.add('championships-list');
        listDiv.id = 'list-' + key;
        colDiv.appendChild(listDiv);

        columnsContainer.appendChild(colDiv);
        renderChampionships(key);
    }
}

function renderChampionships(columnKey) {
    const col = data.columns[columnKey];
    const listDiv = document.getElementById('list-' + columnKey);
    if (!col || !listDiv) return;

    listDiv.innerHTML = '';

    const champs = col.championships;
    if (!Array.isArray(champs) || champs.length === 0) {
        const empty = document.createElement('p');
        empty.style.cssText = 'color:var(--light-text);font-size:.88em;padding:20px;';
        empty.textContent = 'Nenhum campeonato nesta coluna.';
        listDiv.appendChild(empty);
        return;
    }

    champs.forEach(champ => {
        const card = document.createElement('a');
        card.href = champ.link || '#';
        card.target = '_blank';
        card.classList.add('championship-card');
        card.draggable = true;
        card.dataset.id = champ.id;
        card.dataset.column = columnKey;
        card.addEventListener('dragstart', dragStart);

        const img = document.createElement('img');
        img.src = champ.image || '';
        img.alt = champ.name;
        img.onerror = function() { this.src = 'https://placehold.co/110x110?text=⚽'; };
        card.appendChild(img);

        const h3 = document.createElement('h3');
        h3.textContent = champ.name;
        card.appendChild(h3);

        const delBtn = document.createElement('button');
        delBtn.classList.add('delete-card-btn');
        delBtn.innerHTML = '&times;';
        delBtn.title = 'Excluir ' + champ.name;
        delBtn.addEventListener('click', e => {
            e.preventDefault(); e.stopPropagation();
            deleteChampionship(columnKey, champ.id);
        });
        card.appendChild(delBtn);

        listDiv.appendChild(card);
    });
}

// ================================================================
//  CRUD CAMPEONATOS / COLUNAS
// ================================================================
function addChampionship() {
    const name  = document.getElementById('championshipName').value.trim();
    const image = document.getElementById('imageLink').value.trim();
    const link  = document.getElementById('championshipLink').value.trim();
    const col   = columnSelect.value;

    if (!name || !image || !link || !col) {
        showMessage(addChampMessage, 'Preencha todos os campos!', 'error'); return;
    }
    if (!data.columns[col]) {
        showMessage(addChampMessage, 'Coluna não encontrada!', 'error'); return;
    }

    const newChamp = { id: Date.now() + Math.random(), name, image, link };
    data.columns[col].championships.push(newChamp);
    scheduleSave();
    renderChampionships(col);
    showMessage(addChampMessage, `✅ "${name}" adicionado!`, 'success');
    document.getElementById('championshipName').value = '';
    document.getElementById('imageLink').value = '';
    document.getElementById('championshipLink').value = '';
    columnSelect.value = '';
}

function deleteChampionship(columnKey, champId) {
    if (!isAdminMode) return;
    const col = data.columns[columnKey];
    if (!col || !Array.isArray(col.championships)) return;
    const idx = col.championships.findIndex(c => c.id === champId);
    if (idx === -1) return;
    const name = col.championships[idx].name;
    if (confirm(`Excluir "${name}"?`)) {
        col.championships.splice(idx, 1);
        scheduleSave();
        renderChampionships(columnKey);
    }
}

function addColumn() {
    const name = document.getElementById('newColumnName').value.trim();
    if (!name) { showMessage(addColumnMessage, 'Digite um nome para a coluna!', 'error'); return; }
    // Usa timestamp como chave para garantir unicidade
    const key = 'col_' + Date.now();
    data.columns[key] = { name, championships: [] };
    scheduleSave();
    renderColumns();
    showMessage(addColumnMessage, `✅ Coluna "${name}" criada!`, 'success');
    document.getElementById('newColumnName').value = '';
}

// ================================================================
//  DRAG AND DROP
// ================================================================
function dragStart(e) {
    if (!isAdminMode) { e.preventDefault(); return; }
    draggedItem = e.currentTarget;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', draggedItem.dataset.id);
    setTimeout(() => { if(draggedItem) draggedItem.classList.add('dragging'); }, 0);
}
function dragOver(e) {
    e.preventDefault();
    if (isAdminMode) e.currentTarget.classList.add('drag-over');
}
function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function drop(e) {
    e.preventDefault();
    const target = e.currentTarget;
    target.classList.remove('drag-over');
    if (!isAdminMode || !draggedItem) return;
    const champId  = parseFloat(draggedItem.dataset.id);
    const srcKey   = draggedItem.dataset.column;
    const tgtKey   = target.id.replace('column-', '');
    if (srcKey === tgtKey) { draggedItem.classList.remove('dragging'); draggedItem = null; return; }
    const src = data.columns[srcKey];
    const idx = src.championships.findIndex(c => c.id === champId);
    if (idx > -1) {
        const [moved] = src.championships.splice(idx, 1);
        moved.id = Date.now() + Math.random();
        data.columns[tgtKey].championships.push(moved);
        scheduleSave();
        renderChampionships(srcKey);
        renderChampionships(tgtKey);
    }
    draggedItem.classList.remove('dragging'); draggedItem = null;
}

// ================================================================
//  MODO ADMIN
// ================================================================
document.getElementById('adminTrigger').addEventListener('click', () => {
    if (isAdminMode) exitAdminMode(); else showAdminLogin();
});

function showAdminLogin() {
    addChampSection.classList.remove('active');
    addColumnSection.classList.remove('active');
    adminLoginForm.classList.add('active');
}

async function enterAdminMode() {
    const name  = document.getElementById('adminName').value.trim();
    const phone = document.getElementById('adminPhone').value.trim();
    const email = document.getElementById('adminEmail').value.trim();
    if (!name || !phone || !email) { showMessage(loginMessage, 'Preencha todos os campos.', 'error'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showMessage(loginMessage, 'E-mail inválido.', 'error'); return; }

    data.adminInfo = { name, phone, email };
    saveLocal();

    // Log de acesso
    if (APPS_SCRIPT_URL && !APPS_SCRIPT_URL.includes('YOUR_')) {
        try {
            await fetch(APPS_SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'logAdmin', name, phone, email, timestamp: new Date().toLocaleString('pt-BR') })
            });
        } catch(e) {}
    }

    isAdminMode = true;
    document.body.classList.add('admin-mode');
    adminLoginForm.classList.remove('active');
    addChampSection.classList.add('active');
    addColumnSection.classList.add('active');

    // Carrega dados frescos do Sheets
    const loaded = await pullFromSheets();
    if (loaded) renderColumns();
    showMessage(addChampMessage, `Bem-vindo, ${name}! ✓`, 'success');
}

function exitAdminMode() {
    isAdminMode = false;
    document.body.classList.remove('admin-mode');
    adminLoginForm.classList.remove('active');
    addChampSection.classList.remove('active');
    addColumnSection.classList.remove('active');
    document.getElementById('adminName').value = '';
    document.getElementById('adminPhone').value = '';
    document.getElementById('adminEmail').value = '';
    renderColumns();
}

// ================================================================
//  UTILITÁRIO
// ================================================================
function showMessage(el, msg, type) {
    el.textContent = msg;
    el.className = 'form-message ' + type;
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.className = 'form-message'; el.textContent = ''; }, 4500);
}

// ================================================================
//  INICIALIZAÇÃO
// ================================================================
document.addEventListener('DOMContentLoaded', async () => {
    loadLocal();
    renderColumns();
    if (APPS_SCRIPT_URL && !APPS_SCRIPT_URL.includes('YOUR_')) {
        const loaded = await pullFromSheets();
        if (loaded) renderColumns();
    } else {
        setSyncStatus('error', 'Configure a URL do Apps Script');
    }
});
</script>
